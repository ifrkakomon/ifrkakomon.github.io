ザー周波数により発信されている。", "ローカライザー信号のコース幅は滑走路進入端で約210 m（700 ft）になるように調整されているので、滑走路の長さによって異なる。"], "a": 1, "e": "解説：AIM-J 131.\n(1) × 無指向性→指向性\n(2) (3) (4) ○\n(4) ローカライザー信号のコース幅は滑走路進入端で約210 m (700ft) になるように調整されているので、滑走路の長さによって異なる。"}, {"id": "R0501P4013", "term": "R0501", "q": "離陸の最低気象条件について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）単発機の場合及び離陸の代替飛行場を設定しない多発機において、利用できる進入方式がCAT-Ⅰ精密進入の場合にあっては、非精密進入のMDHに等しい雲高（100ft単位に切り上げ）及び最低気象条件の値に等しい地上視程を適用する。\n（ｂ）単発機の場合及び離陸の代替飛行場を設定しない多発機において、利用できる    進入方式が非精密進入の場合にあっては、非精密進入のMDHに200ftを加えた雲高（100ft単位に切り上げ）及び最低気象条件に対して1,000mを加えた地上視程を適用する。\n（ｃ）単発機の場合及び離陸の代替飛行場を設定しない多発機において、利用できる進入方式が周回進入の場合にあっては、周回進入のMDHに等しい雲高（100ft単位に切り上げ）及び最低気象条件の値に等しい地上視程を適用する。\n（ｄ）RVRが利用できない場合にあっては、地上視程通報値をCMVに変換することができる。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": "解説：AIM-J 304. ★第18項 404.b\n(b)(c) ○の2つ\n(a) × 双発機は2時間、3発以上の航空機は3時間→双発機は1時間、3発以上の航空機は2時間\n(d) × 代替飛行場名とZZZZ（離陸からの所要時間）→代替飛行場名または位置"}, {"id": "R0501P4014", "term": "R0501", "q": "航空路及び経路について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）計器飛行方式により飛行する航空機はやむを得ない場合を除き、航空路の中心線上を飛行しなければならない。\n（ｂ）計器飛行方式による飛行において悪天候を回避するために飛行経路を逸脱する必要がある場合は、管制承認を要求し承認を得なければならない。\n（ｃ）VORを使用した国内航空路においては、中心線の両側にそれぞれ最小４マイル幅の一次区域とその外側に最小４マイル幅の二次区域を有している。\n（ｄ）直行経路とはSIDの最終フィックスと航空路を結ぶ経路のことである。", "c": ["１", "２", "３", "４", "なし"], "a": 3, "e": "解説：AIM-J 501. ATSルート\n(a)(b)(c) ○の3つ\n(d) × 直行経路：航法無線施設を利用して比較的短距離の直行飛行を行うときの飛行経路であって航空路、洋上転移経路およびRNAV経路以外のものであり、AIPに公示されている。 P1-12, AIM-J 501.f)"}, {"id": "R0501P4015", "term": "R0501", "q": "計器飛行方式で飛行中に通信機が故障した場合の飛行方法について誤りはどれか。", "c": ["有視界気象状態にある場合は、これを維持して安全に着陸できると思われる最寄りの飛行場に着陸する。", "計器気象状態にある場合は、承認された経路に従って目的地上空（目的飛行場の 上空又は計器進入方式の開始点として特定の航空保安無線施設若しくはフィックスがある場合はその上空）まで飛行を継続する。", "計器気象状態にある場合で、通信機が故障する以前に目的地上空に到着し、かつ、当該地点の上空で待機する指示を受け、進入開始予定時刻を受領していた場合はその時刻まで当該地点の上空で待機した後、降下を開始する。", "計器進入方式が設定されている飛行場では指向信号灯が使用されるため、着陸は灯光による信号に従って行う。"], "a": 4, "e": ""}, {"id": "R0501P4016", "term": "R0501", "q": "計器飛行方式における位置通報について（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）AIPチャートの▲で示された地点は非義務位置通報点である。\n（ｂ）レーダー管制業務を受けている場合は、特に指示されない限り位置通報を行う必要はない。\n（ｃ）位置通報はACCまたはATMCに対して行うか、直接交信できなければ最寄りのレディオかタワーなどを通じて行う。\n（ｄ）国内を飛行する場合の位置通報は、コールサイン、位置通報点名、速度、残存燃料、次の予定位置通報点及び予定通過時刻の順に行う。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": "解説：AIM-J 552.a, 550, 551, 553.a.\n(b)(c) ○の2つ\n(a) × 非義務位置通報点→義務位置通報点\n(d) × 速度、残存燃料は通報不要"}, {"id": "R0501P4017", "term": "R0501", "q": "操縦士は、進入限界高度において適切な目視物標を少なくとも1つ視認し、継続的に識別の維持が可能である場合のみ、進入限界高度未満へ着陸のための進入を行うことができる。非精密進入、ILS（CAT-Ⅰ）及びPAR進入における適切な目視物標について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）接地帯灯\n（ｂ）滑走路末端識別灯\n（ｃ）進入角指示灯\n（ｄ）指向信号灯", "c": ["１", "２", "３", "４", "なし"], "a": 3, "e": "解説：AIP 6.10. 最低気象条件等に係る一般適用事項 6.10.、最低気象条件 6.10.1.1、絶則2）操縦士は、進入限界高度(DA/H又はMDA/H)において適切な目視物標を少なくとも1つ視認し、継続的に識別の維持が可能である場合のみ、進入限界高度未満へ着陸のための進入を行うことができる。\ni) 進入灯の一部\nii) 滑走路進入端\niii) 滑走路進入端標識\niv) 滑走路末端灯\nv) 滑走路末端識別灯\nvi) 進入角指示灯\nvii) 接地帯または接地帯標識\nviii) 接地帯灯\nix) 滑走路灯\nx) 滑走路と同時昼用として直線進入用進入路指示灯\nxi) 指示標識"}, {"id": "R0501P4018", "term": "R0501", "q": "目視降下点について正しいものはどれか。", "c": ["レーダー着陸誘導を継続しうる限界の位置をいう。", "PAR進入を行う場合において、適切な目視物標を視認できたときに、決心高度以下に降下を開始する位置をいう。", "ILS（CAT-Ⅰ）を行う場合において、適切な目視物標を視認できたときに、決心高度以下に降下を開始する位置をいう。", "非精密進入により直線進入を通常降下により行う場合において、進入灯又は滑走路末端を識別できる視覚援助施設を視認できたときに、最低降下高度以下に降下を開始する位置をいう。"], "a": 4, "e": "解説：AIM-J 634.a.d\n(a)(c)(d) ○の3つ\n(b) × （飛行方式設定基準 I-4-5-14）"}, {"id": "R0501P4019", "term": "R0501", "q": "乱気流に遭遇した場合の対処法について（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）「FLY ATTITUDE」が大切であり、エンジン出力と機首姿勢（ピッチ）の修正は最小限にとどめる。\n（ｂ）航法計器の監視とエンジン計器のチェックを行う。\n（ｃ）雲の観察、気象レーダー、外気温度、他機からの情報などにより、大気の状態を把握し乱気流空域の広がりや規模を考えて、必要なら離脱方法を検討する。\n（ｄ）強度にかかわらず、航空機の運航に影響すると判断した場合は、できるだけ早く管制機関等に通報する。", "c": ["１", "２", "３", "４", "なし"], "a": 4, "e": "解説：AIM-J 834\n4つすべて正しい。"}, {"id": "R0501P4020", "term": "R0501", "q": "強い着氷に遭遇した場合の注意事項で誤りはどれか。", "c": ["着氷はまず風防やエンジン空気取入口から始まるので、風防の状態によく気を付ける。", "ピトー管や静圧孔への着氷によりIASがおかしくなってきたら、なるべく一定の飛行姿勢を維持し減速を行う。", "非常に激しい着氷のおきる気層の厚さは200～500フィート程度が普通であるから、高度の変更が有効である。", "強い着氷状態ではオートパイロットを使用せずに、操縦系統が凍結しないように常時動かしておく方がよい。"], "a": 2, "e": "解説：AIM-J 856. C. (1) × 舵の効きを良くするため増速する→少し減速する"}, {"id": "R0503P4007", "term": "R0503", "q": "計器飛行を行う航空機乗組員に求められる最近の飛行経験について正しいものはどれか。", "c": ["操縦する日からさかのぼって半年までの間に３時間以上の計器飛行（模擬計器飛行を含む。）", "操縦する日からさかのぼって180日までの間に６時間以上の計器飛行（模擬計器飛行を含む。）", "操縦する日からさかのぼって半年までの間に３時間以上の計器航法による飛行", "操縦する日からさかのぼって180日までの間に６時間以上の計器航法による飛行"], "a": 2, "e": "解説：AIM-J 1018.d. 航空法施行規則 第161条"}, {"id": "R0503P4008", "term": "R0503", "q": "次の飛行場灯火と説明の組み合わせで誤りはどれか。", "c": ["ABN: 航行中の航空機に空港等の位置を示すために空港等又はその周辺の地域に設置する灯火で補助飛行場灯台以外のもの", "ALB: 着陸しようとする航空機に進入区域内の要点を示すために設置する灯火で進入灯以外のもの", "ALS: 着陸しようとする航空機にその最終進入の経路を示すために進入区域内及び着陸帯内に設置する灯火", "REDL: 離陸し、又は着陸しようとする航空機に滑走路の末端を示すために滑走路の両末端に設置する灯火で非常用滑走路灯以外のもの"], "a": 4, "e": "解説：AIM-J 154.\nREDL(Runway Edge Light)滑走路灯は、離陸しまたは着陸しようとする航空機に滑走路を示すための灯火。\nRTHL：滑走路末端灯。(4)はRTHL (Runway Threshold Lights)の説明"}, {"id": "R0503P4009", "term": "R0503", "q": "法に定める計器飛行等を行う航空機に装備しなければならない装置について\n（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）ジャイロ式姿勢指示器\n（ｂ）マグネティックコンパス\n（ｃ）精密速度計\n（ｄ）分刻み時計", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": "精密速度計→精密高度計"}, {"id": "R0503P4010", "term": "R0503", "q": "ブロックアルティチュードの説明について正しいものはどれか。", "c": ["気圧が標準大気圧以下になってもQNHで飛行している航空機との必要な垂直間隔を維持するために最低利用可能フライトレベルを下回るフライトレベルをブロックすること", "乱気流や編隊飛行等の理由により、２つ（またはそれ以上）のIFR高度の空間を占有して飛行するために複数にわたる高度間を同時使用すること", "計器進入において各ブロックに応じてステップダウンフィックスと高度が指定され各フィックスで指定されている高度まで階段状に降下すること", "自衛隊高高度訓練空域／試験空域が存在し、その空域内で通過が制限される高度帯のこと"], "a": 2, "e": "解説：AIM-J 962.【高高度の影響】\n(3) × 30～40分→5～12分"}, {"id": "R0503P4011", "term": "R0503", "q": "計器飛行証明を受けていなければ行ってはならない飛行方法について（ａ）～（ｄ）のうち、該当するものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）有視界気象状態のもと航空機の位置および針路の測定を計器のみに依存して行う飛行で国土交通省令で定める距離又は時間を超えて行うもの\n（ｂ）計器気象状態のもと国土交通大臣の許可を受けて行う特別有視界飛行方式による飛行\n（ｃ）雲中において航空機の姿勢、高度、位置および針路の測定を計器のみに依存して行う飛行\n（ｄ）有視界気象状態のもと管制圏、管制区内を国土交通大臣が定める経路又は国土交通大臣が与える指示による経路により、かつその他の飛行の方法について国土交通大臣の指示に常時従って行う飛行", "c": ["１", "２", "３", "４", "なし"], "a": 3, "e": "bは計器飛行等に含まれない"}, {"id": "R0503P4012", "term": "R0503", "q": "管制用語の意味について（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～\n（５）の中から選べ。\n \n（ａ）HOLD ON THE GROUND: 着陸後に滑走路上で待機してください。\n（ｂ）RECLEARED DIRECT XAC: XACへの直行を承認します。\n（ｃ）CLEARED FOR APPROACH: 進入および着陸を許可します。\n（ｄ）DESCEND AT PILOT'S DISCRETION : 直ちに降下を開始してください。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": "解説：AIM-J 562. 降下クリアランスに\"AT PILOT'S DISCRETION\"の用語が付された場合は、降下を開始する時期がパイロットの判断に任される。そして降下を開始した後も一時的な水平飛行を含む降下率の調整を通脱なくて行うことができる。ただし一度通過した高度に再び上昇してはいけない。"}, {"id": "R0503P4013", "term": "R0503", "q": "通信機が故障した場合の飛行方法について、計器気象状態においてレーダー誘導指示を受けている場合の対処で誤りはどれか。", "c": ["誘導開始の際、誘導目標としてフィックスが指示された場合は当該フィックスに直行する。", "誘導開始の際、誘導目標として航空路、経路等が指示された場合は当該経路にある目的地に向かって最寄りのフィックスに直行する。", "誘導目標の指示がない場合は、誘導開始前において最後に承認された経路にある目的地に向かって最寄りのフィックスに直行する。", "フィックスに直行する際は、制限空域等を回避せず最短の経路を飛行すること。"], "a": 4, "e": "解説：AIM-J 781.\n(4) × 制限空域等を回避せず最短の経路を飛行すること → 制限空域に入ってはならない"}, {"id": "R0503P4014", "term": "R0503", "q": "計器飛行方式における位置通報について（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）AIPチャートの▲で示された地点は非義務位置通報点である。\n（ｂ）レーダー管制業務を受けている場合は、特に指示されない限り位置通報を行う必要はない。\n（ｃ）位置通報は通常、現に通信を行っている管制機関に対して実施する。\n（ｄ）国内を飛行する場合の位置通報は、コールサイン、位置通報点名、高度、速度、残存燃料、次の予定位置通報点及び予定通過時刻の順に行う。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": "解説：AIM-J 552.a, 550, 551, 553.a.\n(b)(c) ○の2つ\n(a) × 非義務位置通報点→義務位置通報点\n(d) × 速度、残存燃料は通報不要"}, {"id": "R0503P4015", "term": "R0503", "q": "エンルートチャートに記載されている用語について（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n\n \n（ａ）NAV GAP　航空路において当該航空路を構成する無線航法施設の信号が良好に受信できないおそれがある空域や受信できない空域\n（ｂ）MRA　無線航法施設（VOR/DME､VORTAC､TACANに限る。）を利用して設定されたフィックスにおいて同フィックスを構成する無線航法施設の信号を良好に受信することが可能な最低高度\n（ｃ）MCA　航空路においてレーダー誘導を受けることができる最低高度\n（ｄ）COP　航空路を飛行する航空機が、MEAにおいて経路を構成する無線航法施設の信号を継続して良好に受信するために、無線航法施設の信号を後方から前方へ切り換える地点", "c": ["１", "２", "３", "４", "なし"], "a": 3, "e": "解説：AIM-J 112. 機上のVOR受信機は、VOR電波を受信してVOR局への方位を針路盤上に示したり、CI (Course Indicator) またはCDI (Course Deviation Indicator) によって設定コースとの関係位置を示すことができる。"}, {"id": "R0503P4016", "term": "R0503", "q": "下表に示すアプローチチャート（VORを使用する非精密進入方式）の断面図例から読取れる情報について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n\n\n\n\n\n\n\n\n（ａ）基礎旋回はTHEから11.0DMEまでに旋回を開始しなければならない。\n（ｂ）基礎旋回終了時までに3,300 ftに降下するよう指定高度が設定されている。\n（ｃ）進入復行はFAFからの時間経過により行うこともできるように設定されている。\n（ｄ）最終進入フィックスから滑走路末端上50 ftまでの降下角は、PAPIの公示角と同じく3.5°である。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": "解説：AIM-J 第6章 P6-3 アプローチチャート記載例\n(c) の1つ\n(a) × 4,000→5,000\n(d) × 通常PAPI の角度は3.0°で設定されています。図ではパスが3.2°となっており、MISSED APPROACHの手順下部に「PAPI and descent angles are not coincident.」の表記があり同じではない。（例：RJFU VOR RWY 32）"}, {"id": "R0503P4017", "term": "R0503", "q": "レーダー誘導について誤りはどれか。", "c": ["旋回方向の指示がない場合は指示されたヘディングに近い方向へ旋回する。", "レーダー誘導はヘディングの指示によって開始され、指示されるヘディングは常に磁方位である。", "レーダー誘導は、原則として MEA 以上の高度で行われる。", "管制機関は当該機の現針路が不明で、かつ、それを確認する余裕がない場合、旋回の度数及び旋回方向を指定する。"], "a": 3, "e": "解説：AIM-J 450.\n(1)(2)(4) ○の3つ\n(3) × MEA→MVA(minimum vectoring altitude)"}, {"id": "R0503P4018", "term": "R0503", "q": "空港等付近の航行方法についての記述（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）計器飛行方式による進入の方式その他当該空港等について定められた飛行の方式に従うこと。\n（ｂ）計器飛行方式により離陸しようとする場合であって、空港等における気象状態が離陸することができる最低の気象条件未満であるときは、離陸しないこと。ただし適切な目視物標を視認し経路上の安全を確保できる場合はこの限りではない。\n（ｃ）計器飛行方式により着陸しようとする場合であって、進入限界高度よりも高い高度の特定の地点を通過する時点において空港等における気象状態が当該空港等への着陸のための進入を継続することができる最低の気象条件未満であるときは、着陸のための進入を継続しないこと。\n（ｄ）計器飛行方式により着陸しようとする場合であって、進入限界高度以下の高度において目視物標を引き続き視認かつ識別することによる当該航空機の位置の確認ができなくなったときは、着陸のための進入を継続しないこと。", "c": ["１", "２", "３", "４", "なし"], "a": 3, "e": ""}, {"id": "R0503P4019", "term": "R0503", "q": "スノータムについて誤りはどれか。", "c": ["滑走路状態コードは０～６の数値で記載される。", "雪氷等の割合については、9%以下は「NR」、10～25%は「25」、26～50%は「50」、51～75％は「75」、76%以上は「100」と記載される。", "誘導路またはエプロンの雪氷等の情報もスノータムとして通知される。", "有効時間は評価日時から８時間である。有効中のスノータムは、新たなスノータムの発行によって無効となる。"], "a": 3, "e": "解説：AIM-J 11章 P11-20 AIP ADI.2-1 スノータム\n(3) × エプロンの雪氷等の情報はスノータムではなく、ノータムによって通知される。\n滑走路面状態評価に関する情報が、スノータムにより通知される。\n1) スノータムでは、滑走路三分の一毎の滑走路状態コード(RWYCC: Runway Condition Code)、雪氷等の割合、雪氷等の深さ及び雪氷等の種類が、滑走路少数方から見た順に斜線(/)で区切って記載される。\n2) スノータムの有効時間は、評価日時から8時間である。有効中のスノータムは、新たなスノータムの発行によって無効となる。\n3) スノータムでは、次の記号が使用される。（以降、AIP参照）"}, {"id": "R0503P4020", "term": "R0503", "q": "低酸素症に関する記述で正しいものはどれか。", "c": ["低酸素症の兆候が現れたら、呼吸の速さと深さを自分で意識的に調整していけば通常は２～３分で治まる。鼻から息を吸い込み、唇を強めに締めて口からできるだけ時間をかけて吐き出す腹式呼吸が効果的である。", "低酸素症は血液の酸素運搬能力が大きく関係するため、通常、飲酒や服薬、体調並びに精神状態の影響は受けにくい。", "大気中に酸素の占める割合は、地上からはるか上空に至るまで一定であるため飛行高度の増大に対応して低酸素症の傾向も増大する。", "低酸素症の兆候は個人差が大きく、通常それらがゆっくり進行するとき、その影響を自ら認識することは容易である。"], "a": 3, "e": "解説：AIM-J 962.\n(1) × 10,000→5,000\n(2) × 18,000→12,000\n(3) × 40分から50分 → 5～12分"}, {"id": "R0505P4007", "term": "R0505", "q": "最低利用可能フライトレベルが145になる場合のQNHはどれか。", "c": ["29.45 inHg", "28.97 inHg", "28.82 inHg", "28.39 inHg"], "a": 1, "e": "解説：AIP ENR 1.7 高度計規正方式 2. 高度計規正方式の基本 福岡FIR内を飛行する航空機の高度又はフライトレベルは下記の方式により維持するものとする。\n2.1一般方式 平均海面上14,000ft(FL140)以上→標準気圧値29.92インチ(1013.2ヘクトパスカル)により規正する。\n0.1インチHgの変化が100フィートに相当するため、0.5インチHgの変化は、高度に換算すると約500フィートになる。0.1インチHg ≒ 100フィート0.5インチHg ≒ 500フィート\nAIM-J 522.a.\n29.92以上 140\n29.91～29.42 145\n29.41～28.92 150\n28.91～28.42 155\n28.41～27.92 160"}, {"id": "R0505P4008", "term": "R0505", "q": "ATSルートについて（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）国内航空路は航空法施行規則により指定されている。\n（ｂ）RNAV経路以外の航空路であってVORによって構成される航空路で国内（内陸）航空路の保護空域は中心線の両側に最小４マイル幅の一次空域とその外側に二次空域を有する。\n（ｃ）航空路は各区間でMEAが設定され、航法無線施設で構成される経路にあっては常に MRAと等しい高度で設定されている。\n（ｄ）突発的な事故や悪天候により空港の処理容量が低下した場合にエンルートでの待機を行うために進入管制区外にエンルート待機経路が設定されている。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": ""}, {"id": "R0505P4009", "term": "R0505", "q": "航空情報用略語と意義の組み合わせで誤りはどれか。", "c": ["ARSR: 航空路監視レーダー", "ASR: 空港監視レーダー", "SMR(ASDE) : 空港面探知レーダー", "SSR\t: 洋上航空路監視レーダー"], "a": 4, "e": "解説：AIM-J 第11章 航空情報用略語表\n空港面探知レーダー：ASDE (Airport surface detection equipment)"}, {"id": "R0505P4010", "term": "R0505", "q": "計器飛行方式で出発し、香川 VOR（KTE）から有視界飛行方式に変更して真対気速度160ktで飛行する場合、飛行計画書の第15項「経路」について、香川 VOR以降の記入例として適切なものはどれか。", "c": ["KTE / N0160VFR VFR", "KTE / N0160 IFR\tVFR", "KTE / IFR N0160VFR", "KTE / IFR N0160VFR VFR"], "a": 1, "e": "解説：AIM-J 304. 第15項\n（参考）VFRからIFRに切り替える場合は「地点/KTEN160A090 IFR」"}, {"id": "R0505P4011", "term": "R0505", "q": "RNAVに関する説明について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）RNAV経路における航行は航空法で定める「特別な方式による航行」なので国土交通大臣の許可が必要である。\n（ｂ）RNAV経路はVOR/DME等の地上無線施設のみを結んで設定されている。\n（ｃ）RNAV経路を飛行する場合のラテラル・ナビゲーション（飛行する針路の決定）は基本的に自動操縦装置及びFMSに依存することなくパイロットが手動により行わなければならない。\n（ｄ）パイロットはRNAV経路を飛行中に求められる航法要件を満足しない事態が生じたときには、管制機関にその旨を通報しなければならない。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": "a：〇\nc：フライトディレクターに従うかオートパイロットによる"}, {"id": "R0505P4012", "term": "R0505", "q": "ILSについて誤りはどれか。", "c": ["地上施設は基本的にローカライザーおよびグライドスロープの２つの無指向性電波を発射する送信装置とDMEにより構成されている。", "ILS進入の運用にあたっては、視覚情報施設として進入灯、接地帯灯、滑走路灯、滑走路中心線灯等が設置されている。", "ILSの識別符号はモールス信号で、I（･ ･）で始まる３文字から成りローカライザー周波数により発信されている。", "ローカライザー信号のコース幅は滑走路進入端で約210m（700ft）になるように調整されているので、滑走路の長さによって異なる。"], "a": 1, "e": "解説：AIM-J 131.\n(1) × 無指向性→指向性\n(2) (3) (4) ○\n(4) ローカライザー信号のコース幅は滑走路進入端で約210 m (700ft) になるように調整されているので、滑走路の長さによって異なる。"}, {"id": "R0505P4013", "term": "R0505", "q": "出発時のフローコントロールについて正しいものはどれか。", "c": ["管制用語の「EDCT\tCANCELLED」とはEDCTが失効される場合に用いられる。", "EDCTが指定されるのはタワー空港のみである。", "EDCT有効時間帯(EDCT valid Window)が適用されている空港において、 EDCTの失効が通報された場合およびEDCT有効時間帯の間に離陸できなかった場合は、新たなEDCTが指定されるまでの間、出発待機となる。", "フローコントロールは航空交通管理センターにより実施される。対象空域を飛行する予定のある航空機はIFR、VFRによらず、出発の制限を受ける。"], "a": 3, "e": "解説：AIM-J 316. AIP ENR 1.9 航空交通流管理 1.3 実施方法\n(3) ○ EDCT有効時間帯(valid window) AIP ENR1.9-29 航空交通流管理3.3.2(1)のリストにあるものはすべてタワー空港でEDCT valid windowが適用される。\n(1) × EDCT CANCELLED＝取消→EDCT VOID＝失効\n(2) × タワー空港のみ→タワー空港だけではない\n(4) × IFR, VFRによらず、出発の制限を受ける→IFR機のみ制限を受ける"}, {"id": "R0505P4014", "term": "R0505", "q": "計器進入のセグメントについて（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）初期進入セグメントとは初期進入FIX（IF）から最終進入FIX（FAF）までの部分である。\n（ｂ）最終進入セグメントとは最終進入FIX（FAF）から決心高度または最低降下高度に至る部分である。\n（ｃ）中間進入セグメントの長さは5マイル以上15マイル以下で、初期進入からの旋回角に応じて設定される。\n（ｄ）初期進入区域は一次区域のみで構成されている。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": "解説：AIM-J 631.\n(a) × 最終進入FIX → 中間進入フィックスまたは中間進入開始点\n(b) × 決心高度または最低降下高度→進入復行点(MAPt)\n(d) × 一次区域のみで構成されている→次区域と飛行経路の中心線の両側にそれぞれ2.5マイルの幅を有する二次区域から構成されている（飛行方式設定基準第I部 第4編、第3章 初期進入セグメント 3,3,3区域）"}, {"id": "R0505P4015", "term": "R0505", "q": "ホールディングについて（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）スタンダードパターンでの旋回方向は左周りである。\n（ｂ）14,000ft以下の高度でのアウトバゥンドレグ飛行時間は１分である。\n（ｃ）管制用語の「EFC」とは進入予定時刻のことである。\n（ｄ）最低待機高度（MHA）は待機区域内の地上障害物から最小984ftの垂直間隔 を確保し、さらに待機区域周辺4 nmの緩衝区域内の障害物に対する間隔も考慮されている。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": "a:右回り\nb:〇\nd:×4nm→〇5nm"}, {"id": "R0505P4016", "term": "R0505", "q": "次の飛行場灯火に係る略語とその説明の組み合わせで誤りはどれか。", "c": ["ALS: 着陸しようとする航空機にその最終進入の経路を示す灯火である。", "PAPI: 着陸しようとする航空機にその着陸の進入角の良否を示す灯火である。", "RTHL: 滑走路を走行中の航空機に滑走路の先方の末端からの距離を示す灯火である。", "RCLL: 離陸し、または着陸しようとする航空機に滑走路の中心線を示す灯火である。"], "a": 3, "e": ""}, {"id": "R0505P4017", "term": "R0505", "q": "レーダー誘導について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）レーダー誘導はヘディングの指示によって開始され、指示されるヘディングは常に磁方位である。\n（ｂ）旋回方向の指示がない場合は指示されたヘディングに近い方向へ旋回する。\n（ｃ）「LEAVE (FIX) HEADING (DEGREES)」の用語で指示された場合は、指定されたフィックスまで指定されたヘディングで飛行する。\n（ｄ）レーダー誘導は、原則として MRA 以上の高度で行われる。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": "cは？"}, {"id": "R0505P4018", "term": "R0505", "q": "CMV（地上視程換算値）への変換が適用できる最低気象条件はどれか。", "c": ["離陸", "CAT-Ⅰ精密進入", "航空機区分Hの周回進入", "目的地の代替飛行場"], "a": 2, "e": "解説：AIM-J 642.\nCMVは、離陸、周回進入（航空機区分B以下の場合に限る）、代替飛行場には適用されない。"}, {"id": "R0505P4019", "term": "R0505", "q": "計器飛行方式で飛行中に通信機が故障した場合の飛行方法について誤りはどれか。", "c": ["有視界気象状態にある場合は、これを維持して安全に着陸できる最寄りの空港等に着陸する。", "計器気象状態にある場合は、承認された経路に従って目的地上空（目的飛行場の 上空又は計器進入方式の開始点として特定の航空保安無線施設若しくはフィックスがある場合はその上空）まで飛行を継続する。", "計器気象状態にある場合で目的地上空に到着したとき、故障前に進入許可を受けている場合は、進入は行わず離陸時刻に飛行計画書の所要時間を加えた時刻に降下を開始する。", "計器気象状態にある場合で目的地上空に到着したとき、待機指示と進入予定 時刻を受領している場合は、指示に従って待機した後、進入予定時刻に降下を開始する。"], "a": 3, "e": "解説：航空法施行規則 第206条【通信機の故障の場合の飛行】AIM-J 781.\n(a)(c)(d) ○の3つ\n(3) × 故障前に進入許可を受けていても安全のため進入は行わず→故障前に進入許可を受けていれば、進入は行い離陸時刻に飛行計画書の所要時間を加えた時刻に進入を開始する。"}, {"id": "R0505P4020", "term": "R0505", "q": "飛行中の錯覚について誤りはどれか。", "c": ["傾いた雲の稜線、不明瞭な水平線、地上の灯火と星の光とが入り混った暗闇、地上灯火のある種の幾何学的な配列などによって、飛行機の姿勢が実際の水平線に正しくアラインしていないように錯覚しがちである。", "地上物標のない場所、たとえば水面、暗い地域又は積雪に覆われた地形ではパイロットは実際の高度よりも低く飛んでいるように錯覚しがちである。", "暗闇の中で静止している灯光を何十秒間も見つめていると、その灯光が動きまわるような錯覚に陥り、パイロットがその灯光の見せかけの動きにだまされて飛行機の制御を失うことがある。", "飛行中に遭遇する各種の複雑な運動と外力及び外景の視認などによって、運動と位置の錯覚を生ずることがある。これらの錯覚に基づく空間識失調は、信頼できる地上の固定物標又は飛行計器を確実に視認することにより防止できる。"], "a": 2, "e": "解説：AIM-J 965.\n(2) × 低い→高い → 実際の高度よりも高く"}, {"id": "R0507P4007", "term": "R0507", "q": "航空情報用略語と意義の組み合わせで誤りはどれか。", "c": ["ARSR : 航空路監視レーダー", "ASR\t: 空港監視レーダー", "ASDA : 空港面探知レーダー", "ORSR : 洋上航空路監視レーダー"], "a": 3, "e": "解説：AIM-J 第11章 航空情報用略語表\n空港面探知レーダー：ASDE (Airport surface detection equipment)"}, {"id": "R0507P4008", "term": "R0507", "q": "TAFについて（a）～（d）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）1日4回（00・06・12・18UTC）に発表される。\n（ｂ）CAVOKも報じられることがある。\n（ｃ）予想卓越視程は1800 m以下が予想される場合、RVR値で報じられる。\n（ｄ）予想風は2分間平均の風向と風速が報じられる。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": ""}, {"id": "R0507P4009", "term": "R0507", "q": "航空法について（a）～（d）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）計器気象状態とは、視程及び雲の状況を考慮して国土交通省令で定める視界上不良な気象状態をいう。\n（ｂ）計器飛行とは、航空機の姿勢、高度、速度及び距離の測定を計器にのみ依存して行う飛行をいう。\n（ｃ）航空機は、計器飛行方式により、航空交通管制圏若しくは航空交通情報圏に係る空港等から出発し、又は航空交通管制区、航空交通管制圏若しくは航空交通情報圏を飛行しようとするときは、国土交通省令で定めるところにより国土交通大臣に飛行計画を通報し、その承認を受けなければならない。\n（ｄ）航空機は、航空交通管制区若しくは航空交通管制圏のうち国土交通大臣が告示で指定する空域又は国土交通省令で定める高さ以上の空域においては、計器飛行方式により飛行してはならない。ただし、国土交通大臣の許可を受けた場合は、この限りでない。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": "解説：航空法93条\n(b)(c)(d) ○の3つ\n(a) × 計器飛行方式→計器飛行又は計器航法"}, {"id": "R0507P4010", "term": "R0507", "q": "レーダー管制下における速度調整について（a）～（d）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）離陸後の加速を制限する場合、「DO\tNOT\tEXCEED\t[specified\tspeed] KNOTS」の用語が使用される。\n（ｂ）速度調整は各管制機関で指示されるため、他管制機関にレーダーハンドオフされた場合は、前に指定された速度調整は無効となる。\n（ｃ）速度調整を受けた場合は、指定された速度の±20 ktの範囲内で飛行すべきである。\n（ｄ）減速と降下の指示が同時に発出される場合は、どちらの操作を先に行うべきか指示される。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": ""}, {"id": "R0507P4011", "term": "R0507", "q": "通信機が故障した場合の飛行方法について、計器気象状態においてレーダー誘導指示を受けている場合の対処で誤りはどれか。", "c": ["誘導開始の際、誘導目標としてフィックスが指示された場合は当該フィックスに直行する。", "誘導開始の際、誘導目標として航空路、経路等が指示された場合は当該経路にある目的地に向かって最寄りのフィックスに直行する。", "誘導目標の指示がない場合は、誘導開始前において最後に承認された経路にある目的地に向かって最寄りのフィックスに直行する。", "フィックスに直行する際は、制限空域等を回避せず最短の経路を飛行すること。"], "a": 4, "e": "解説：AIM-J 781.\n(4) × 制限空域等を回避せず最短の経路を飛行すること → 制限空域に入ってはならない"}, {"id": "R0507P4012", "term": "R0507", "q": "下表に示すアプローチチャートに記載される最低気象条件及び進入限界高度の例から読み取れる情報について（a）～（e）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n\n\n\n\n\n\n\n\n\n\n（ａ）接地点の標高は、586 ftである。\n（ｂ）CAT Ⅰにおいて進入灯が不作動の場合、カテゴリーＡの航空機はRVR/CMV 900 mが最低気象条件となる。\n（ｃ）LOC単独進入（直線進入）の最低気象条件の値は、すべての航空機区分同一である。\n（ｄ）CIRCLINGによる着陸のための最低気象条件は地上視程が適用される。\n（ e ）周回進入は北側に限定する。", "c": ["１", "２", "３", "４", "５"], "a": 2, "e": "解説：AIM-J 第6章 P6-3 アプローチチャート記載例\n(c) の1つ\n(a) × 接地点→THR = Threshold elevation\n(b) × 900→1,000\n(c) × 同一→であるが一同一ではない"}, {"id": "R0507P4013", "term": "R0507", "q": "最終進入経路について誤りはどれか。", "c": ["基礎旋回もしくは方式旋回の開始点から進入復行点（MAPt）に至る部分。", "最終進入FIX（FAF）から進入復行点（MAPt）に至る部分。", "ILS進入ではFAPから進入復行点（MAPt）に至る部分。", "計器進入方式はすべて最終進入のセグメントを有している。"], "a": 1, "e": "解説：AIM-J 631.d.\n(1) × 開始点から→終了する点から"}, {"id": "R0507P4014", "term": "R0507", "q": "計器進入について（a）～（d）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）非精密進入とは最終進入を水平方向のみの航法情報によって行う計器進入である。\n（ｂ）最終進入における最低高度を最低降下高度といいDAと表記される。DAに至った地点を進入復行点として進入復行方式が設定されている。\n（ｃ）最終進入の途中にフィックスを設け、階段状に降下することによって低い最低降下高度を設定できる場合は、ステップダウンフィックスが設けられることがある。\n（ｄ）ローカライザー単独進入とは、ローカライザーとアウターマーカー等の位置情報を使用して行う計器進入であり、精密進入である。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": ""}, {"id": "R0507P4015", "term": "R0507", "q": "飛行計画書の第８項「飛行方式および飛行の種類」のうち、飛行方式の記入要領で誤りはどれか。", "c": ["Y: IFRで出発し途中でVFRに変更する場合", "X: IFRで出発し途中でVFRに変更し再びIFRに変更する場合", "Z: VFRで出発し途中でIFRに変更する場合", "Z: VFRで出発し途中でIFRに変更し再びVFRに変更する場合"], "a": 2, "e": "解説：AIM-J 304. 第8項 飛行方式および飛行の種類\n飛行方式は次の4種類\nIFRで飛行する場合・・・I\nVFRで飛行する場合・・・V\nIFRで出発し途中で飛行方式を変更する場合・・Y\nVFRで出発し途中で飛行方式を変更する場合・・Z\n飛行の種類は問題の中に含まれていない。種類はS（定期便）、N（定期便以外の航空運送事業）、G（使用事業、訓練、訓練等）、M（Military）、Xその他"}, {"id": "R0507P4016", "term": "R0507", "q": "計器飛行方式による航空路の飛行について（a）～（d）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n \n（ａ）COPとは管制区管制所のセクター移行の際に周波数を変更する地点である。\n（ｂ）管制官から「RADAR\tCONTACT」と通報されてレーダー管制業務が開始された後「RADAR\tSERVICE\tTERMINATED」あるいは「RADAR\tCONTACT LOST」と通報されるまでは、特に指示されない限り位置通報を行う必要はない。\n（ｃ）AIPチャートに▲で示された地点は非義務位置通報点である。\n（ｄ）航法間隙（NAVIGATION\tGAP）とは機体の帯電や電子装置の磁気により、航空機に装備された航法機材に発生する誤差のことである。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": ""}, {"id": "R0507P4017", "term": "R0507", "q": "CMV（地上視程換算値）への変換が適用できる最低気象条件はどれか。", "c": ["離陸", "CAT-Ⅰ精密進入", "周回進入", "代替飛行場"], "a": 2, "e": "解説：AIM-J 642.\nCMVは、離陸、周回進入（航空機区分B以下の場合に限る）、代替飛行場には適用されない。"}, {"id": "R0507P4018", "term": "R0507", "q": "計器進入について（a）～（d）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）操縦士は、計器進入開始前において、目的飛行場の気象状態が公示、又は自己の進入を継続することができる最低気象条件を満たさない場合は、管制機関又は 飛行場対空援助業務実施機関にその旨通報するとともに、待機又は代替飛行場へのクリアランスを要求しなければならない。\n（ｂ）操縦士は、計器進入方式開始後（最終進入フィックス、アウターマーカー、飛行場標高から1,000 ftの地点、又は特に認められた地点における進入継続の可否判断を行った後）に当該飛行場の気象状態が公示、又は自己の最低気象条件を満たさなくなった場合であっても計器進入を継続することができる。\n（ｃ）操縦士は、最終進入を開始した後MAPtに到達するまでに進入復行を指示された 場合、又は気象状態悪化等のため進入継続を中止した場合は、MAPtまで計器飛行方式により飛行した後、公示又は事前に通報された進入復行方式に従って飛行しなければならない。この場合操縦士は降下を中止して決心高若しくは最低降下高度以上での水平飛行又は公示若しくは事前に通報された進入復行方式に規定 された高度までの上昇を行うことができる。\n（ｄ）操縦士は、最終進入を開始した後MAPtに到達するまでに気象状態悪化等のために進入継続を中止した場合は、その後の飛行（公示又は事前に通報された進入復行方式以外の飛行、待機、代替飛行場への飛行等）につきクリアランスを得てMAPtの手前から計器進入経路を離脱することができる。", "c": ["１", "２", "３", "４", "なし"], "a": 4, "e": ""}, {"id": "R0507P4019", "term": "R0507", "q": "非与圧機における高高度飛行の影響について正しいものはどれか。", "c": ["夜間視力の低下が発生し始めるのは機内気圧が10,000 ft以上に相当する高度に達してからである。", "普通の健康なパイロットの場合18,000 ftまでは、低酸素症の影響は表れない。", "20,000 ftでは40～50分で修正操作と回避操作を行う能力が失われ、間もなく失神する。", "喫煙は低酸素症の発症高度を下げることがある。"], "a": 4, "e": "解説：AIM-J 962.【高高度の影響】\n(3) × 30～40分→5～12分"}, {"id": "R0507P4020", "term": "R0507", "q": "飛行中の錯覚について誤りはどれか。", "c": ["傾いた雲の稜線、不明瞭な水平線、地上の灯火と星の光とが入り混った暗闇、 地上灯火のある種の幾何学的な配列などによって、飛行機の姿勢が実際の水平線に正しくアラインしていないように錯覚しがちである。", "地上物標のない場所、たとえば水面、暗い地域又は積雪に覆われた地形ではパイロットは実際の高度よりも高く飛んでいるように錯覚しがちである。", "暗闇の中で静止している灯光を何十秒間も見つめていると、その灯光が動きまわるような錯覚に陥り、パイロットがその灯光の見せかけの動きにだまされて飛行機の制御を失うことがある。", "飛行中に遭遇する各種の複雑な運動と外力及び外景の視認などによって、運動と位置の錯覚を生ずることがある。これらの錯覚に基づく空間識失調は、信頼できる地上の固定物標又は飛行計器を確実に視認しても防止することはできない。"], "a": 4, "e": ""}, {"id": "R0509P4007", "term": "R0509", "q": "受領したクリアランスが変更される場合に前置される用語で正しいものはどれか。", "c": ["RECLEARANCE", "REVISED CLEARANCE", "AMENDED CLEARANCE", "CHANGED CLEARANCE"], "a": 2, "e": "解説：AIM-J 433.\n(1)(3)(4) × これらの用語は定義されていない。"}, {"id": "R0509P4008", "term": "R0509", "q": "次の飛行場灯火と説明の組み合わせで誤りはどれか。", "c": ["滑走路末端灯: 離陸し、又は着陸しようとする航空機に滑走路の末端を示すために滑走路進入端及び滑走路終端に設置する灯火で非常用滑走路灯以外のもの", "滑走路中心線灯: 離陸し、又は着陸しようとする航空機に滑走路の中心線を示すためにその中心線に設置する灯火", "旋回灯: 滞空旋回中の航空機に滑走路の位置を示すために滑走路の外側に設置する灯火で滑走路の外側上方に灯光を発するもの", "進入灯: 離陸した航空機にその離陸後の飛行の経路を、又は着陸しようとする航空機にその最終進入の経路に至るまでの進入の経路を示すために設置する灯火"], "a": 4, "e": "解説：AIM-J 152, 157.c.\n(4) × は進入灯ではなく、進入角指示灯 (AGL: approach guidance lights) の説明"}, {"id": "R0509P4009", "term": "R0509", "q": "航空法第６９条（最近の飛行経験）に定める、計器飛行を行う航空機乗組員の飛行経験について正しいものはどれか。", "c": ["操縦する日からさかのぼって半年までの間に３回以上の計器着陸", "操縦する日からさかのぼって180日までの間に６回以上の計器着陸", "操縦する日からさかのぼって半年までの間に３時間以上の計器飛行（模擬計器飛行を含む。）", "操縦する日からさかのぼって180日までの間に６時間以上の計器飛行（模擬計器飛行を含む。）"], "a": 4, "e": "解説：AIM-J 1018.d. 航空法施行規則 第161条"}, {"id": "R0509P4010", "term": "R0509", "q": "航空情報用略語と意義の組み合わせで正しいものはどれか。", "c": ["MSA: 平均海面上", "MEA: 最低経路高度", "MRA: 最高受信可能高度", "MHA: 最低降下高度"], "a": 2, "e": "解説：AIP GEN 2.2 AIS出版物に使用される略語 AIM-J 11章「航空情報用略語表」\nMSA：最低扇形別高度 Minimum sector altitude\nMRA：最低受信可能高度 Minimum reception altitude\nMHA：最低待機高度 Minimum holding altitude"}, {"id": "R0509P4011", "term": "R0509", "q": "滑走路視距離（RVR）について誤りはどれか。", "c": ["変化傾向を示す記号は、対象とした10分間の前半5分間と後半5分間の平均値を 比較し、100メートル以上上昇した場合はU、100メートル以上下降した場合はＤ差が100メートル未満の場合はSが使われる。\n例：R34/1400U\t例：R34/0200D", "観測時間10分間における1分間平均値の極値が、10分間平均値から50メートルまたは平均値の20％のいずれか大きい値以上変動しているときは、10分間の  平均値に代えて1分間の最小値と最大値が示される。\n例：R34/0400V0800D", "観測値が得られない場合、および滑走路灯/滑走路中心線灯の輝度情報を観測シ\nステムに取り込んでいる飛行場において滑走路灯または滑走路中心線灯が消灯した\n（灯火の要件を満たさない）場合は、当該滑走路番号を前置して/////が示される。例：R34/////", "RVR値が測定範囲の上限を超えている場合はPに続いて測定範囲の上限値が、下限を下廻っている場合はMに続いて測定範囲の下限値が示される。\n例：R34/P2000U\t例：R34/M0200D"], "a": 1, "e": "解説：AIM-J 811.7\n(1) × S→N(no change)"}, {"id": "R0509P4012", "term": "R0509", "q": "最低利用可能フライトレベルが145になる場合のQNHはどれか。", "c": ["29.91 inHg ～ 29.42 inHg", "29.41 inHg ～ 28.92 inHg", "28.91 inHg ～ 28.42 inHg", "28.41 inHg ～ 27.92 inHg"], "a": 1, "e": "解説：AIP ENR 1.7 高度計規正方式 2. 高度計規正方式の基本 福岡FIR内を飛行する航空機の高度又はフライトレベルは下記の方式により維持するものとする。\n2.1一般方式 平均海面上14,000ft(FL140)以上→標準気圧値29.92インチ(1013.2ヘクトパスカル)により規正する。\n0.1インチHgの変化が100フィートに相当するため、0.5インチHgの変化は、高度に換算すると約500フィートになる。0.1インチHg ≒ 100フィート0.5インチHg ≒ 500フィート\nAIM-J 522.a.\n29.92以上 140\n29.91～29.42 145\n29.41～28.92 150\n28.91～28.42 155\n28.41～27.92 160"}, {"id": "R0509P4013", "term": "R0509", "q": "IFRによる到着で速度調整について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）速度調整を受けたまま、他の管制機関にレーダーハンドオフされた場合、前に指定された速度調整は移管後自動的に終了される。\n（ｂ）ホールディングが指示された場合、それまでの速度調整は引き続き有効である。\n（ｃ）速度調整中に進入許可が発出された場合には、それまでの速度調整は自動的に終了される。\n（ｄ）レーダー進入に際して速度調整が指示されていた場合は、接地点から5 nmの地点または最終降下開始点のうちいずれか接地点から近い方の地点を通過した時点で、速度調整は自動的に終了される。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": "c速度調整に係る指示が新しく又は繰り返して行われなかった場合"}, {"id": "R0509P4014", "term": "R0509", "q": "離陸の最低気象条件について誤りはどれか。", "c": ["離陸の最低気象条件に、地上視程通報値のCMVへの変換は適用されない。", "通常運航を前提とするものであり、離陸中断及び臨界発動機不作動時の運航を勘案するものではない。", "多発機であって離陸の代替飛行場を設定し、出発飛行場においてCAT-Ⅰ精密進入を利用できる場合、離陸の最低気象条件として非精密進入のMDH（100 ft単位に切り上げ）に等しい雲高、及び公示された最低気象条件のRVR値に等しい地上視程が適用される。", "離陸の代替飛行場を指定した場合、必要に応じ飛行場名または位置をフライトプランに記入する。"], "a": 3, "e": "解説：AIM-J 304. ★第18項 404.b\n(b)(c) ○の2つ\n(a) × 双発機は2時間、3発以上の航空機は3時間→双発機は1時間、3発以上の航空機は2時間\n(d) × 代替飛行場名とZZZZ（離陸からの所要時間）→代替飛行場名または位置"}, {"id": "R0509P4015", "term": "R0509", "q": "下表に示すアプローチチャート（VORを使用する非精密進入方式）の断面図例から読取れる情報について（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n\n\n\n\n\n\n\n\n\n\n\n\n（ａ）MISSED APPROACH後は、指示がない場合5,000 ftまで上昇する。\n（ｂ）最終進入フィックスは接地点から5.0 NMの位置にある。\n（ｃ）最終進入フィックスまでのOCHは1,670 ftである。\n（ｄ）最終進入フィックスから滑走路末端上50 ftまでの降下角は、PAPIの公示角と同じく3.2°である。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": "解説：AIM-J 第6章 P6-3 アプローチチャート記載例\n(c) の1つ\n(a) × 4,000→5,000\n(d) × 通常PAPI の角度は3.0°で設定されています。図ではパスが3.2°となっており、MISSED APPROACHの手順下部に「PAPI and descent angles are not coincident.」の表記があり同じではない。（例：RJFU VOR RWY 32）"}, {"id": "R0509P4016", "term": "R0509", "q": "CAT-Ⅰ精密進入方式の最低気象条件を決定するためのファシリティについて、飛行場灯火および飛行場標識の構成で正しいものはどれか。", "c": ["フル\t： 滑走路中心線標識、滑走路灯、滑走路末端灯、720 m未満の進入灯", "インター： 滑走路中心線標識、滑走路灯、滑走路末端灯、420 m以上 719 m以下の滑走路中心線灯\nミディェット", "ベーシック： 滑走路中心線標識、滑走路灯、滑走路末端灯、サイドバレットが運用されている420 m未満の進入灯", "進入灯等なし： ファシリティの要件を満たさない場合"], "a": 4, "e": "解説：AIM-J 152, 157.c.\n(4) × は進入灯ではなく、進入角指示灯 (AGL: approach guidance lights) の説明"}, {"id": "R0509P4017", "term": "R0509", "q": "非精密進入について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n \n（ａ）非精密進入とは最終進入を水平方向のみの航法情報によって行う計器進入であリ、捜索レーダー進入は含まれない。\n（ｂ）最終進入における最低高度を最低降下高度といいDAと表記される。DAに至った地点を進入復行点として進入復行方式が設定されている。\n（ｃ）最終進入の途中にフィックスを設け、階段状に降下することによって低い最低降下高度を設定できる場合は、ステップダウンフィックスが設けられることがある。\n（ｄ）ストレートインランディングを行う最終進入経路上には、航空機が接地点に向けて適切な降下を行うために必ずVDPが設定されている。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": "解説：AIM-J 634.\n(a)(c) ○の2つ\n(b) × 非精密進入の最終進入における最低高度は最低降下高度(MDA)が表記される。\n(d) × 必ず→必ずではない 前問（例題724223）参照"}, {"id": "R0509P4018", "term": "R0509", "q": "待機（HOLDING）中において、待機終了となる指示で（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）進入許可\n（ｂ）待機フィックス以遠への直行指示\n（ｃ）磁針路の指示\n（ｄ）追加管制承認の発出", "c": ["１", "２", "３", "４", "なし"], "a": 4, "e": "解説：AIM-J 571.e\n4つすべて正しい\n待機が必要なくなった場合には、次の管制承認等が発出される\n1) 進入許可\n2) 待機フィックス以遠のフィックスへの直行指示\n3) 追加管制承認\n4) 待機フィックス以遠への直行指示\n5) PROCEED VIA LAST ROUTING CLEARED の指示"}, {"id": "R0509P4019", "term": "R0509", "q": "低酸素症に関する説明のうち正しいものはどれか。", "c": ["ハイパーベンチレーションと呼ばれ、人間の脳および他の機能に障害をきたす程に体内の酸素が不足する状態をいう。", "大気中に含まれる酸素の割合は一定であるため、飛行高度の増大、大気圧の減少に関わらず低酸素症の傾向は変化しない。", "普通の健康なパイロットであれば、12,000 フィート未満では低酸素症による夜間視力の低下以外の顕著な影響は表れないとされている。", "最も適切な酸素の使用方法としては、昼間においては15,000 フィートを超えたならばパイロットが補助酸素を使用することである。"], "a": 3, "e": "解説：AIM-J 962.\n(1) × ハイパーベンチレーション → ハイポキシャ\n(2) × 大気圧の減少に関わらず低酸素症の傾向は変化しない→大気圧の減少に対応して低酸素症の傾向は増大する\n(4) × 15,000→10,000"}, {"id": "R0509P4020", "term": "R0509", "q": "着陸失敗をもたらす錯覚について誤りはどれか。", "c": ["通常より狭い幅の滑走路に進入するときは、航空機が実際の高さよりも高い高度にあるような錯覚を生じやすい。", "上り勾配の滑走路または上り勾配の地形のいずれかまたは両方の場合、事実上の高さよりも低いところにいるような錯覚を起こす。", "風防に当たる雨はより高い高度にいるように見せかけ、大気の霞は滑走路までの距離をより遠くにいるように見せかける錯覚の原因となる。", "明るく輝く滑走路灯や進入灯が周囲の地形を照らしているようなときは、航空機が滑走路に実際よりも近づいているような錯覚を生じやすい。"], "a": 2, "e": "解説：AIM-J 965.\n(2) × 低い→高い"}, {"id": "EX2025P4001", "term": "EX2025", "q": "計器飛行を行う航空機乗組員に求められる最近の飛行経験について、航空機乗組員飛行日誌に記載する時間のうち最近の飛行経験として認められる時間で誤りはどれか。", "c": ["計器飛行訓練を行った場合において衝突防止の見張りのために乗り組んでその業務を行った「その他の飛行時間」の時間", "国土交通大臣の指定する方式により操作した「飛行訓練装置」の時間（ただし、国土交通大臣が認定した飛行訓練装置で操縦を行った時間に限る。）", "航空機に乗り組んで視野制限装置を使用して計器飛行の訓練を実施した「フード」の時間", "計器飛行方式で飛行した時間のうち計器飛行を実施した「計器飛行」の時間"], "a": 1, "e": "解説：AIM-J 1018.d.\n「その他の飛行時間」は最近の飛行経験とはならない。"}, {"id": "EX2025P4002", "term": "EX2025", "q": "航空機に装備された磁気コンパスについて誤りはどれか。", "c": ["加速中に誤差を生じることがある。", "磁気コンパスの「Ｎ」は真北を示す。", "旋回中に誤差を生じることがある。", "方位により異なった数値の自差がある。"], "a": 2, "e": "解説：AIM-J 第11章 航空計器 日本航空技術協会\n(1) ○ 加速度誤差 (Acceleration Error)\n(2) × 真北→磁北 (Variation)\n(3) ○ 北旋誤差 (Turning Error)\n(4) ○ 自差（機内の装備による誤差）(Deviation)"}, {"id": "EX2025P4003", "term": "EX2025", "q": "雷雲付近の飛行について誤りはどれか。", "c": ["雷雲の上方5000フィート以上を飛行できない場合は迂回したほうが良い。", "綿状に並んだセルに沿ったコースはできるだけ風上側を飛行する。", "Ｃｂの雲頂の風下にあるＣｉやＣｓの雲層の中や下方は避ける。", "気温が-8℃～+8℃の高度では落雷が発生しにくい。"], "a": 4, "e": "解説：AIM-J 851. 統計では気温が-8℃～+8℃で90%の落雷があるとされている。"}, {"id": "EX2025P4004", "term": "EX2025", "q": "火山灰について誤りはどれか。", "c": ["噴火直後の噴煙は粒径の大きな火山灰粒子が含まれているため航空管制用レーダーや機上レーダーで確認できる可能性がある。", "高々度で広がった火山灰雲と高層雲（氷の結晶）とは容易に判別できる。", "火山灰が空気中の水蒸気を吸収すると硫酸になるため、機体に付着すると腐食させる。", "火山灰雲には高電位の静電気があり、航空機の無線通信に影響を与える。"], "a": 2, "e": "解説：AIM-J 859. (2) × 容易に判別できる→容易には判別できない。"}, {"id": "EX2025P4005", "term": "EX2025", "q": "次の用語の組み合わせで正しいものはどれか。", "c": ["目視進入：ターミナル管制所のレーダー管制下にあるIFR機が所定の進入方式によらないで飛行場または先行機を視認しながら行う進入", "最低扇形別高度：飛行場中心から半径25マイルの範囲を複数(通常４つ)の扇形区域に分け、それぞれの区域にある障害物に対し少なくとも2000フィートの間隔が得られる高度", "RUNWAY INCURSION：離着陸に使用されている滑走路に航空機、車両等が不適切に侵入すること", "NO-GYRO APPROACH：航空機の姿勢指示器が故障した際、パイロットに対し管制官がレーダー航跡を見ながら適宜旋回を指示する誘導方式"], "a": 3, "e": "解説：AIM-J 12章 用語の解説 P12-32, 33\n(1) × 目視進入→視認進入\n(2) P12-25 2,000ft→平野部1,000ft、山岳部2,000ft\n(3) P12-14\n(4) × 姿勢指示器→方向指示器"}, {"id": "EX2025P4007", "term": "EX2025", "q": "ラディアル090（R-090）の標準待機経路が公示されているA VORで待機する場合の飛行要領等について（a）～（d）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。ただし、待機高度は無風とする。\n（a）HOLD EAST OF A VORの指示に従って待機を開始した。\n（b）針路197°でA VORの上空を通過したのでダイレクトエントリーで進入した。\n（c）速度調整を受けていたが管制機関に通報することなく待機速度に変更した。\n（d）エントリー確立後はインバゥンドレグ1分間の左旋回パターンで待機した。", "c": ["１つ", "２つ", "３つ", "４つ", "無し"], "a": 3, "e": "解説：AIM-J 572, 573.\n(a)(b)(c) ○の3つ\n(d) × インバウンドレグ1分間の左旋回→アウトインバウンドレグ1分間の右旋回"}, {"id": "EX2025P4008", "term": "EX2025", "q": "ミストアプローチについて正しいものはどれか。", "c": ["ミストアプローチプロシージュアは進入許可に含まれていないため別途クリアランスが必要である。", "ミストアプローチプロシージュアはMAPtから開始することを前提としているが、MAPtを過ぎた後でもその経路に従って飛行すれば障害物との間隔は保障されている。", "MAPtに至る前に進入の継続を断念した場合は、特に指示が無い限り速やかに最終進入経路から離脱しなければならない。", "レーダー進入では通常ミストアプローチプロシージュアがその都度管制官から示される。"], "a": 4, "e": "解説：AIM-J 694.\n(4) 第5管制業務処理規程10レーダー進入 (IV)-10-3【進入復行方式の通報】"}, {"id": "EX2025P4009", "term": "EX2025", "q": "ILS（CAT-Ⅰ）進入の決心高（DH）の設定条件に含まれないのはどれか。", "c": ["ILS施設が使用可能な最低の高さ", "進入方式について算出された航空機区分別の障害物間隔高（OCH）", "グライドスロープ上の滑走路進入端における高さ", "対地200 ft"], "a": 3, "e": "解説：飛行方式設定基準 第V部 第4章 精密進入方式（カテゴリーI）の最低気象条件 4.2 DH\nカテゴリーI精密進入方式に係るDHは、次の各号のうち最も高いものとする。\na) 当該進入方式を構成する航行援助施設が利用可能な最低高\nb) 当該進入方式について算出された航空機区分別の障害物間隔高度(OCH)\nc) 200ft"}, {"id": "EX2025P4011", "term": "EX2025", "q": "飛行方式設定基準における離陸の最低気象条件について誤りはどれか。", "c": ["RVRが複数設置されている空港では、すべてのRVR計測機器が正常運用されているときに限り、最も大きいRVR値を最低気象条件に適用できる。", "滑走路灯、滑走路中心線灯、滑走路中心線標識の運用および設置状況ごとに最低気象条件が示される。", "離陸の最低気象条件に示された飛行場灯火及び標識がすべて利用できない場合は昼間のみ離陸が可能となる。", "離陸の代替空港を設定する多発機以外の航空機で出発空港においてCAT-Ⅰ精密進入が利用できる場合は、当該進入の最低気象条件の値に等しいRVR（RVRが使用できない場合にあっては地上視程）が離陸の最低気象条件になる。"], "a": 1, "e": "解説：AIM-J 335.c.\n(1) × 最も大きいRVR値を最低気象条件に適用できる（このRVRが適用できない場合は地上視程を適用する）飛行方式設定基準第V部 第1編 第2章 2.2 RVR"}, {"id": "EX2025P4012", "term": "EX2025", "q": "IFR機相互間の垂直間隔について正しいものはどれか。", "c": ["フライトレベル410を超える高度では1000フィート", "フライトレベル290～410の高度ではRVSM適合機相互間は500フィート", "RVSM適合機がフライトレベル290～410を巡航中、RVSM航行の要件に適合しなくなった場合、近辺との航空機間は2000フィート", "フライトレベル280以下の高度では2000フィート"], "a": 3, "e": "解説：AIM-J 511.\n(1) × 1,000→2,000\n(2) × 500→1,000\n(4) × 2,000→1,000"}, {"id": "EX2025P4013", "term": "EX2025", "q": "飛行計画書の第10項「使用する無線設備」欄に記入する記号と種類の組み合わせについて（a）～（d）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（a）E：ELT\n（b）G：GPWS\n（c）I：ILS\n（d）O：VOR", "c": ["１つ", "２つ", "３つ", "４つ", "無し"], "a": 1, "e": "正答(1) → cのみ正しい\n飛行計画書第10項の記号（AIM-J）：\n(a)E＝FMC/WPR ACARS → ELTではない→誤り。\n(b)G＝GNSS → GPWSではない→誤り。\n(c)I＝ILS → 正しい。\n(d)O＝VOR → 正しい。\n→c, dが正しいので2つ…ただし正答は(1)=1つ。OがVORかどうかはAIM-J版により確認が必要。O=VORは旧版の対応。現行ではO=VOR。出題の正答に従い1つ。"}, {"id": "EX2025P4014", "term": "EX2025", "q": "目視進入について誤りはどれか。", "c": ["目視進入とは計器飛行方式によって飛行する航空機が行う進入の方法であって、計器進入方式の全部又は一部を所定の方式によらないで飛行場を視認しながら行う進入である。", "目視進入は操縦士から要求があった場合であって、地上視程が1,500ｍ以上あるときに交通状況を考慮して管制官により許可される。", "目視進入は「CLEARED FOR CONTACT APPROACH」の用語により許可される。ただし、計器進入方式の種類を指定しない進入が許可されている場合は目的飛行場に飛行場アドバイザリー業務実施機関があるときは目視進入を行う旨の通報でよいが、飛行場管制所があるときは当該管制所の許可が新しく必要である。", "目視進入は航空機が飛行場及び地上物標を確認することが可能な時であって、シーリングが最終進入開始高度以下でない場合に実施することができる。"], "a": 4, "e": "解説：AIM-J 671. (4) シーリングが最終進入開始高度以下でない場合、又は、進入開始高度または進入中において飛行視程が良好で目視による進入が可能であり、安全に着陸できる確信が持てる場合。"}, {"id": "EX2025P4015", "term": "EX2025", "q": "IFR機が出発する前に与えられる管制承認に含まれる事項について（a）～（d）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（a）管制承認限界点（クリアランスリミット）\n（b）出発方式（SID又はトランジション）\n（c）飛行経路\n（d）進入予定時刻", "c": ["１つ", "２つ", "３つ", "４つ", "無し"], "a": 3, "e": "解説：AIM-J 420.\n(a)(b)(c) ○の3つ\n(d) は含まれない。"}, {"id": "EX2025P4016", "term": "EX2025", "q": "降下方法の指示について誤りはどれか。", "c": ["STARに公示された高度制限または速度に従って降下する場合\n「FOLLOW STAR TO［高度］AS PUBLISH」", "特定フィックスから降下を開始させる場合\n「AFTER PASSING [フィックス]. DESCEND AND MAINTAIN [高度]」", "直ちに維持高度を離れる必要がある場合\n「BEGIN DESCENT IMMEDIATELY」", "特定フィックスを特定高度で通過すべき場合\n「DESCEND AND MAINTAIN [高度]. CROSS [フィックス] AT OR BELOW[高度]」"], "a": 1, "e": "解説：AIM-J 612\n(1) × FOLLOW STAR TO [高度] AS PUBLISHED → Descend via STAR to [高度]\nAIM-J 563.e.\n(2)(3) d)(4)"}, {"id": "EX2025P4017", "term": "EX2025", "q": "STARに関する記述（a）～（d）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（a）STARの高度制限はすべてat or above[高度]で指定されている。\n（b）STARの承認に進入許可を伴わない場合、STARの承認のみによって降下を行うことはできない。\n（c）STARの承認に進入許可を伴う場合、STARの開始点までMEAを守り高度制限に従って進入開始高度まで降下して進入を開始する。\n（d）STARの承認に進入許可を伴う場合、STARが承認される前の高度制限は引き続き有効である。", "c": ["１つ", "２つ", "３つ", "４つ", "無し"], "a": 2, "e": "解説：AIM-J 612.\n(b)(c) ○の2つ\n(a) × at or below [altitude] で指定されている場合もある。\n(d) × 有効→無効"}, {"id": "EX2025P4018", "term": "EX2025", "q": "最終進入中の航空機に管制官が必要と判断した場合に通報される気象情報等について（a）～（d）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（a）RVRが測定されている場合、当該RVR値が変化したとき\n（b）着陸した先行機から通報があった場合、ブレーキングアクション\n（c）着陸した先行機から通報があった場合、滑走路等を視認できた高度\n（d）RVRが測定されていない場合で、新たな地上視程が観測され最後に通報された値と変化しているときは最新の地上視程", "c": ["１つ", "２つ", "３つ", "４つ", "無し"], "a": 4, "e": "解説：AIM-J 685.\nすべて○の4つ"}];

/* ---------- storage (使えない環境ではメモリに退避) ---------- */
const store = (()=>{ try{ localStorage.setItem('__t','1'); localStorage.removeItem('__t'); return localStorage; }
  catch(e){ const m={}; return {getItem:k=>(k in m?m[k]:null), setItem:(k,v)=>{m[k]=String(v)}, removeItem:k=>{delete m[k]}}; } })();
const HKEY='irdrill-hist-v1';
function loadHist(){ try{ return JSON.parse(store.getItem(HKEY))||{}; }catch(e){ return {}; } }
function saveHist(h){ try{ store.setItem(HKEY, JSON.stringify(h)); }catch(e){} }
let hist = loadHist();

/* ---------- start screen ---------- */
const TERMS = [...new Set(QUESTIONS.map(q=>q.term))];
const termLabel = t => t==='EX2025' ? 'EX2025' : '令和'+String(+t.slice(1,3))+'年'+String(+t.slice(3))+'月';
const termsEl = document.getElementById('terms');
TERMS.forEach(t=>{
  const b=document.createElement('button');
  b.className='chip on'; b.textContent=termLabel(t); b.dataset.term=t;
  b.onclick=()=>{ b.classList.toggle('on'); updateCount(); };
  termsEl.appendChild(b);
});
function allTerms(on){ termsEl.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',on)); updateCount(); }
document.querySelectorAll('#pool input,#order input,#num input').forEach(i=>i.onchange=updateCount);

function selectedTerms(){ return [...termsEl.querySelectorAll('.chip.on')].map(c=>c.dataset.term); }
function poolMode(){ return document.querySelector('#pool input:checked').value; }
function buildPool(){
  const ts = new Set(selectedTerms()); const mode = poolMode();
  return QUESTIONS.filter(q=>{
    if(!ts.has(q.term)) return false;
    const h = hist[q.id];
    if(mode==='unseen') return !h;
    if(mode==='weak')   return h && h.lastNG;
    return true;
  });
}
function updateCount(){
  const n = buildPool().length;
  document.getElementById('poolCount').textContent = n;
  document.getElementById('startBtn').disabled = n===0;
  const answered = Object.keys(hist).length;
  const ok = Object.values(hist).reduce((s,h)=>s+h.ok,0);
  const tot = Object.values(hist).reduce((s,h)=>s+h.n,0);
  document.getElementById('histLine').textContent =
    answered ? `回答済 ${answered}/${QUESTIONS.length}問 ・ 正答率 ${Math.round(100*ok/tot)}%` : 'まだ記録がありません';
}
function resetHist(){ if(confirm('この端末の学習履歴を消去します。よろしいですか？')){ hist={}; store.removeItem(HKEY); updateCount(); } }

/* ---------- quiz flow ---------- */
let deck=[], pos=0, results=[]; // results: {q, sel, ok}
function startQuiz(){
  let pool = buildPool();
  const order = document.querySelector('#order input:checked').value;
  if(order==='random'){ pool=[...pool]; for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];} }
  else { const key=q=>(q.id.startsWith('R')?'0':'1')+q.id; pool=[...pool].sort((a,b)=>key(a)<key(b)?-1:1); }
  const n = +document.querySelector('#num input:checked').value;
  deck = n? pool.slice(0,n) : pool;
  if(!deck.length){ alert('条件に合う問題がありません。範囲を広げてください。'); return; }
  pos=0; results=[]; show('quiz'); renderQ();
}
function retryWrong(){
  const wrong = results.filter(r=>!r.ok).map(r=>r.q);
  if(!wrong.length) return;
  deck=wrong; pos=0; results=[]; show('quiz'); renderQ();
}
function show(name){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById('scr-'+name).classList.add('on'); window.scrollTo(0,0); }

const CIRC=['（１）','（２）','（３）','（４）','（５）'];
function renderQ(){
  const q=deck[pos];
  document.getElementById('qpos').textContent = `第 ${pos+1} 問 / ${deck.length} 問`;
  document.getElementById('qid').textContent = q.id;
  document.getElementById('qtext').textContent = q.q;
  document.getElementById('feedback').innerHTML='';
  document.getElementById('nextBtn').disabled=true;
  document.getElementById('nextBtn').textContent = (pos===deck.length-1)?'採点する':'次の問題へ';
  const box=document.getElementById('choices'); box.innerHTML='';
  q.c.forEach((c,i)=>{
    const b=document.createElement('button'); b.className='choice';
    b.innerHTML=`<span class="n">${i+1}</span><span>${esc(c)}</span>`;
    b.onclick=()=>answer(i+1,b);
    box.appendChild(b);
  });
  drawGP();
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function answer(sel,btn){
  const q=deck[pos];
  if(results.length>pos) return; // already answered
  const ok = sel===q.a;
  results.push({q, sel, ok});
  const h = hist[q.id]||{n:0,ok:0,lastNG:false};
  h.n++; if(ok)h.ok++; h.lastNG=!ok; hist[q.id]=h; saveHist(hist);
  document.querySelectorAll('#choices .choice').forEach((c,i)=>{
    c.disabled=true;
    if(i+1===sel) c.classList.add(ok?'sel-ok':'sel-ng');
    else if(i+1===q.a) c.classList.add('is-ans');
    else c.classList.add('dim');
  });
  const fb=document.getElementById('feedback');
  fb.innerHTML = `<div class="verdict ${ok?'ok':'ng'}">${ok?'○ 正解':'× 不正解'}<span style="font-size:.8rem;font-weight:600;color:var(--sub)">　正解：（${q.a}）</span></div>`
    + (q.e ? `<div class="expl"><span class="tag">解説・出典</span>${esc(q.e)}</div>`
           : `<div class="expl none"><span class="tag">解説・出典</span>この問題の解説は未整備です（正解のみ表示）。</div>`);
  document.getElementById('nextBtn').disabled=false;
  drawGP();
}
function nextQ(){ if(pos===deck.length-1){ finishQuiz(false); } else { pos++; renderQ(); } }
function finishQuiz(interrupted){
  if(!results.length){ show('start'); updateCount(); return; }
  const okn=results.filter(r=>r.ok).length, n=results.length;
  const pct=Math.round(100*okn/n);
  const p=document.getElementById('pct'); p.textContent=pct+'%';
  p.className='pct '+(pct>=70?'ok':'ng');
  document.getElementById('scoreLine').textContent=`${okn} / ${n} 問 正解${interrupted?'（中断）':''}`;
  document.getElementById('minima').textContent = pct>=70 ? 'PASSING LINE 70% — CLEARED' : 'PASSING LINE 70% — BELOW MINIMA';
  const ul=document.getElementById('rlist'); ul.innerHTML='';
  results.forEach((r,i)=>{
    const li=document.createElement('li');
    li.innerHTML=`<span class="m ${r.ok?'ok':'ng'}">${r.ok?'○':'×'}</span><span class="rid">${r.q.id}</span><span class="rq">${esc(r.q.q.split('\n')[0])}</span>`;
    li.onclick=()=>review(r);
    ul.appendChild(li);
  });
  document.getElementById('retryWrong').style.display = results.some(r=>!r.ok) ? 'block':'none';
  show('result'); updateCount();
}
function review(r){
  const q=r.q;
  document.getElementById('rvid').textContent=q.id;
  document.getElementById('rvtext').textContent=q.q;
  const box=document.getElementById('rvchoices'); box.innerHTML='';
  q.c.forEach((c,i)=>{
    const d=document.createElement('div'); d.className='choice';
    if(i+1===r.sel) d.classList.add(r.ok?'sel-ok':'sel-ng');
    else if(i+1===q.a) d.classList.add('is-ans');
    else d.classList.add('dim');
    d.innerHTML=`<span class="n">${i+1}</span><span>${esc(c)}</span>`;
    box.appendChild(d);
  });
  document.getElementById('rvfeedback').innerHTML =
    q.e ? `<div class="expl"><span class="tag">解説・出典</span>${esc(q.e)}</div>`
        : `<div class="expl none"><span class="tag">解説・出典</span>この問題の解説は未整備です。</div>`;
  show('review');
}

/* ---------- glidepath progress (signature) ---------- */
function drawGP(){
  const svg=document.getElementById('gpsvg'); const W=640,H=56;
  const x0=8, x1=W-46, y0=10, y1=H-16;
  const n=deck.length||1;
  const px = x0+(x1-x0)*(results.length/n), py=y0+(y1-y0)*(results.length/n);
  let dots='';
  results.forEach((r,i)=>{
    const f=(i+1)/n, dx=x0+(x1-x0)*f, dy=y0+(y1-y0)*f;
    dots+=`<circle cx="${dx}" cy="${dy}" r="3.4" fill="${r.ok?'#17754A':'#B4256E'}"/>`;
  });
  svg.innerHTML=`
    <line x1="${x0}" y1="${y0}" x2="${x1}" y2="${y1}" stroke="#C9D6DD" stroke-width="2" stroke-dasharray="1 6" stroke-linecap="round"/>
    <rect x="${x1+6}" y="${y1-3}" width="30" height="8" rx="1.5" fill="#16283C"/>
    <rect x="${x1+9}" y="${y1-1}" width="3" height="4" fill="#F5F8F9"/><rect x="${x1+15}" y="${y1-1}" width="3" height="4" fill="#F5F8F9"/><rect x="${x1+21}" y="${y1-1}" width="3" height="4" fill="#F5F8F9"/>
    ${dots}
    <g transform="translate(${px},${py}) rotate(4)">
      <path d="M -9 0 L 7 0 M 0 -6 L 0 3 M -4 4 L 4 4" stroke="#0B5E8E" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    </g>`;
}

updateCount();
</script>
