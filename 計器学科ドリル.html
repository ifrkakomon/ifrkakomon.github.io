<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>計器学科ドリル P40 — 計器飛行証明 学科試験 過去問演習</title>
<style>
:root{
  --paper:#F5F8F9; --card:#FFFFFF; --ink:#16283C; --sub:#5A6B7A;
  --blue:#0B5E8E; --blue-deep:#083F60; --magenta:#B4256E; --green:#17754A;
  --line:#C9D6DD; --soft:#E7EEF2; --amber:#8F6612;
  --mono:"SF Mono","Roboto Mono",Consolas,Menlo,monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic UI",Meiryo,sans-serif;
  background:var(--paper); color:var(--ink); line-height:1.7;
  min-height:100dvh;
}
.wrap{max-width:640px;margin:0 auto;padding:0 16px 48px}
/* ---------- header ---------- */
header{
  border-bottom:2px solid var(--ink);
  padding:14px 0 10px; margin-bottom:16px;
  display:flex;align-items:baseline;justify-content:space-between;gap:8px;
}
header h1{font-size:1.15rem;font-weight:800;letter-spacing:.06em}
header h1 small{display:block;font-size:.68rem;font-weight:600;color:var(--sub);letter-spacing:.14em;margin-top:2px}
.hnum{font-family:var(--mono);font-size:.7rem;color:var(--blue);letter-spacing:.05em;text-align:right}
/* ---------- glidepath progress (signature) ---------- */
.gp{margin:4px 0 14px}
.gp svg{width:100%;height:56px;display:block}
/* ---------- cards & sections ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px}
.sec{font-size:.72rem;font-weight:800;letter-spacing:.18em;color:var(--blue-deep);
  border-left:4px solid var(--blue);padding-left:8px;margin-bottom:10px}
/* chips */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  border:1.5px solid var(--line);background:var(--card);color:var(--sub);
  border-radius:999px;padding:6px 13px;font-size:.85rem;font-weight:600;cursor:pointer;
}
.chip.on{border-color:var(--blue);background:var(--blue);color:#fff}
.chipctl{display:flex;gap:14px;margin-top:10px}
.chipctl button{background:none;border:none;color:var(--blue);font-size:.8rem;font-weight:700;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
/* radio rows */
.opt{display:flex;flex-wrap:wrap;gap:8px}
.opt label{
  border:1.5px solid var(--line);border-radius:8px;padding:8px 14px;font-size:.88rem;font-weight:600;
  cursor:pointer;color:var(--sub);background:var(--card)
}
.opt input{display:none}
.opt label:has(input:checked){border-color:var(--ink);background:var(--ink);color:#fff}
.note{font-size:.76rem;color:var(--sub);margin-top:8px}
.count{font-family:var(--mono);color:var(--blue);font-weight:700}
/* big buttons */
.btn{
  display:block;width:100%;border:none;border-radius:10px;cursor:pointer;
  font-size:1rem;font-weight:800;padding:15px;letter-spacing:.08em;
  font-family:inherit;
}
.btn.primary{background:var(--blue);color:#fff}
.btn.primary:active{background:var(--blue-deep)}
.btn.ghost{background:var(--card);color:var(--blue);border:1.5px solid var(--blue);margin-top:10px}
.btn.quiet{background:var(--soft);color:var(--sub);margin-top:10px}
.btn:disabled{background:var(--soft);color:#A8B6C0;cursor:default}
/* ---------- quiz ---------- */
.qmeta{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);
  font-size:.74rem;color:var(--sub);margin-bottom:8px}
.qmeta .qid{color:var(--blue);font-weight:700}
.qtext{font-size:.98rem;white-space:pre-wrap;margin-bottom:16px}
.choices{display:flex;flex-direction:column;gap:10px}
.choice{
  display:flex;gap:12px;align-items:flex-start;text-align:left;width:100%;
  background:var(--card);border:1.5px solid var(--line);border-radius:10px;
  padding:12px 14px;font-size:.95rem;line-height:1.6;cursor:pointer;font-family:inherit;color:var(--ink)
}
.choice .n{
  flex:none;font-family:var(--mono);font-weight:800;font-size:.9rem;
  width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;color:var(--sub);margin-top:1px
}
.choice.sel-ok{border-color:var(--green);background:#EDF7F1}
.choice.sel-ok .n{border-color:var(--green);background:var(--green);color:#fff}
.choice.sel-ng{border-color:var(--magenta);background:#FBEFF5}
.choice.sel-ng .n{border-color:var(--magenta);background:var(--magenta);color:#fff}
.choice.is-ans{border-color:var(--green)}
.choice.is-ans .n{border-color:var(--green);color:var(--green)}
.choice.dim{opacity:.45}
.verdict{font-size:1.3rem;font-weight:900;margin:14px 0 4px;letter-spacing:.1em}
.verdict.ok{color:var(--green)} .verdict.ng{color:var(--magenta)}
.expl{border-top:1px dashed var(--line);margin-top:10px;padding-top:12px;
  font-size:.88rem;white-space:pre-wrap}
.expl .tag{font-size:.68rem;font-weight:800;letter-spacing:.16em;color:var(--amber);display:block;margin-bottom:4px}
.expl.none{color:var(--sub);font-style:normal}
/* ---------- result ---------- */
.scorebox{text-align:center;padding:22px 16px}
.scorebox .pct{font-family:var(--mono);font-size:3rem;font-weight:800;line-height:1.1}
.scorebox .pct.ok{color:var(--green)} .scorebox .pct.ng{color:var(--magenta)}
.scorebox .sub2{font-size:.8rem;color:var(--sub);margin-top:4px}
.minima{font-size:.76rem;font-family:var(--mono);color:var(--sub);margin-top:10px}
.rlist{list-style:none}
.rlist li{display:flex;gap:10px;align-items:center;padding:9px 2px;border-bottom:1px solid var(--soft);font-size:.85rem;cursor:pointer}
.rlist .m{font-family:var(--mono);font-weight:900;width:20px;text-align:center}
.rlist .m.ok{color:var(--green)} .rlist .m.ng{color:var(--magenta)}
.rlist .rid{font-family:var(--mono);font-size:.72rem;color:var(--blue);flex:none}
.rlist .rq{color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* history strip on start */
.hist{display:flex;justify-content:space-between;align-items:center;font-size:.8rem;color:var(--sub)}
.hist b{font-family:var(--mono);color:var(--ink)}
.hist button{background:none;border:none;color:var(--sub);text-decoration:underline;cursor:pointer;font-size:.72rem}
.screen{display:none}.screen.on{display:block}
footer{font-size:.68rem;color:var(--sub);text-align:center;margin-top:28px;line-height:1.9}
@media(min-width:480px){html{font-size:17px}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>計器学科ドリル<small>INSTRUMENT RATING ・ 科目 P40</small></h1>
  <div class="hnum" id="hnum">254 QUESTIONS<br>R03–R05 / EX2025</div>
</header>

<!-- ============ START ============ -->
<section class="screen on" id="scr-start">
  <div class="card">
    <div class="sec">出題範囲（試験期）</div>
    <div class="chips" id="terms"></div>
    <div class="chipctl">
      <button onclick="allTerms(true)">すべて選択</button>
      <button onclick="allTerms(false)">すべて解除</button>
    </div>
  </div>

  <div class="card">
    <div class="sec">出題対象</div>
    <div class="opt" id="pool">
      <label><input type="radio" name="pool" value="all" checked>すべて</label>
      <label><input type="radio" name="pool" value="unseen">未回答のみ</label>
      <label><input type="radio" name="pool" value="weak">間違えた問題のみ</label>
    </div>
    <div class="note">「未回答」「間違えた問題」は、この端末での学習履歴をもとに絞り込みます。</div>
  </div>

  <div class="card">
    <div class="sec">出題順・問題数</div>
    <div class="opt" id="order" style="margin-bottom:10px">
      <label><input type="radio" name="order" value="random" checked>ランダム</label>
      <label><input type="radio" name="order" value="seq">番号順</label>
    </div>
    <div class="opt" id="num">
      <label><input type="radio" name="num" value="10">10問</label>
      <label><input type="radio" name="num" value="20" checked>20問（本試験と同数）</label>
      <label><input type="radio" name="num" value="0">全問</label>
    </div>
    <div class="note">対象：<span class="count" id="poolCount">–</span> 問</div>
  </div>

  <button class="btn primary" id="startBtn" onclick="startQuiz()">出題開始</button>

  <div class="card" style="margin-top:14px">
    <div class="hist">
      <span>この端末の通算：<b id="histLine">–</b></span>
      <button onclick="resetHist()">履歴を消去</button>
    </div>
  </div>

  <footer>
    出典：令和3〜5年 計器飛行証明 学科試験（科目P40）過去問・サンプル問題・EX2025<br>
    解説の参照：AIM-J／AIP Japan／航空法・同施行規則 ほか（解説未整備の問題があります）
  </footer>
</section>

<!-- ============ QUIZ ============ -->
<section class="screen" id="scr-quiz">
  <div class="gp"><svg id="gpsvg" viewBox="0 0 640 56" preserveAspectRatio="none" aria-hidden="true"></svg></div>
  <div class="qmeta">
    <span id="qpos"></span><span class="qid" id="qid"></span>
  </div>
  <div class="card">
    <div class="qtext" id="qtext"></div>
    <div class="choices" id="choices"></div>
    <div id="feedback"></div>
  </div>
  <button class="btn primary" id="nextBtn" onclick="nextQ()" disabled>次の問題へ</button>
  <button class="btn quiet" onclick="finishQuiz(true)">中断してここまでを採点</button>
</section>

<!-- ============ RESULT ============ -->
<section class="screen" id="scr-result">
  <div class="card scorebox">
    <div class="pct" id="pct"></div>
    <div class="sub2" id="scoreLine"></div>
    <div class="minima" id="minima"></div>
  </div>
  <div class="card">
    <div class="sec">結果一覧（タップで解説）</div>
    <ul class="rlist" id="rlist"></ul>
  </div>
  <button class="btn primary" id="retryWrong" onclick="retryWrong()">間違えた問題だけもう一度</button>
  <button class="btn ghost" onclick="startQuiz()">同じ設定でもう一度</button>
  <button class="btn quiet" onclick="show('start')">出題設定に戻る</button>
</section>

<!-- ============ REVIEW (single) ============ -->
<section class="screen" id="scr-review">
  <div class="qmeta"><span>復習</span><span class="qid" id="rvid"></span></div>
  <div class="card">
    <div class="qtext" id="rvtext"></div>
    <div class="choices" id="rvchoices"></div>
    <div id="rvfeedback"></div>
  </div>
  <button class="btn quiet" onclick="show('result')">結果一覧に戻る</button>
</section>
</div>

<script>
const QUESTIONS = [{"id": "R0301P4007", "term": "R0301", "q": "計器飛行証明を有していなければ行えない飛行で該当しないものはどれか。", "c": ["計器飛行", "110 km又は30分を超えて行う計器航法による飛行", "185 km又は30分を超えて行う夜間飛行", "計器飛行方式による飛行"], "a": 3, "e": "解説：AIM-J 1007.\n(3) × 夜間飛行についての時間は規定されていない。"}, {"id": "R0301P4008", "term": "R0301", "q": "最低利用可能フライトレベルが150になる場合のQNHはどれか。", "c": ["29.45 inHg", "28.97 inHg", "28.82 inHg", "28.39 inHg"], "a": 2, "e": ""}, {"id": "R0301P4009", "term": "R0301", "q": "METARに使用される記号と意味の組み合わせで誤りはどれか。", "c": ["VCFG:\t飛行場周辺のもや", "SHRA:\tしゅう雨性の雨", "DRSA:\t低い風じん", "FZDZ:\t着氷性のある霧雨"], "a": 1, "e": "解説：AIM-J 811.\n(1) × もや→霧"}, {"id": "R0301P4010", "term": "R0301", "q": "管制用語の意味として正しいものはどれか。", "c": ["HOLD ON THE GROUND:　\t待機の必要はありません。", "RECLEARED DIRECT SDE:\t　SDEへの直行を承認します。", "CLEARED FOR APPROACH:　\t着陸を許可します。", "NO DELAY EXPECTED:　\t速やかに行動してください。"], "a": 2, "e": "解説：AIM-J 第12章 主な管制用語\n(1) × 地上で待機してください\n(3) × 着陸→進入\n(4) × NO DELAY EXPECTED：遅延の予定ありません。第5管制業務処理規程6待機機 (Ⅱ)-6-2"}, {"id": "R0301P4011", "term": "R0301", "q": "飛行計画書の第８項「飛行方式および飛行の種類」のうち、飛行方式の記入要領で誤りはどれか。", "c": ["Y: IFRで出発し途中でVFRに変更する場合", "X: IFRで出発し途中でVFRに変更し再びIFRに変更する場合", "Z: VFRで出発し途中でIFRに変更する場合", "Z: VFRで出発し途中でIFRに変更し再びVFRに変更する場合"], "a": 2, "e": "解説：AIM-J 304. 第8項 飛行方式および飛行の種類\n飛行方式は次の4種類\nIFRで飛行する場合・・・I\nVFRで飛行する場合・・・V\nIFRで出発し途中で飛行方式を変更する場合・・Y\nVFRで出発し途中で飛行方式を変更する場合・・Z\n飛行の種類は問題の中に含まれていない。種類はS（定期便）、N（定期便以外の航空運送事業）、G（使用事業、訓練、訓練等）、M（Military）、Xその他"}, {"id": "R0301P4012", "term": "R0301", "q": "ILSについて誤りはどれか。", "c": ["地上施設は基本的にローカライザーおよびグライドスロープの２つの無指向性電波を発射する送信装置とDMEにより構成されている。", "ILS進入の運用にあたっては、視覚情報施設として進入灯、接地帯灯、滑走路灯、滑走路中心線灯等が設置されている。", "ILSの識別符号はモールス信号で、I（･ ･）で始まる３文字から成りローカライザー周波数により発信されている。", "ローカライザー信号のコース幅は滑走路進入端で約210 m（700 ft）になるように調整されているので、滑走路の長さによって異なる。"], "a": 1, "e": "解説：AIM-J 131.\n(1) × 無指向性→指向性\n(2) (3) (4) ○\n(4) ローカライザー信号のコース幅は滑走路進入端で約210 m (700ft) になるように調整されているので、滑走路の長さによって異なる。"}, {"id": "R0301P4013", "term": "R0301", "q": "離陸の最低気象条件について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）単発機の場合及び離陸の代替飛行場を設定しない多発機において、利用できる進入方式がCAT-Ⅰ精密進入の場合にあっては、非精密進入のMDHに等しい雲高（100ft単位に切り上げ）及び最低気象条件の値に等しい地上視程を適用する。\n（ｂ）単発機の場合及び離陸の代替飛行場を設定しない多発機において、利用できる進入方式が非精密進入の場合にあっては、非精密進入のMDHに200ftを加えた雲高（100ft単位に切り上げ）及び最低気象条件に対して1,000mを加えた地上視程を適用する。\n（ｃ）単発機の場合及び離陸の代替飛行場を設定しない多発機において、利用できる進入方式が周回進入の場合にあっては、周回進入のMDHに等しい雲高（100ft単位に切り上げ）及び最低気象条件の値に等しい地上視程を適用する。\n（ｄ）RVRが利用できない場合にあっては、地上視程通報値をCMVに変換することができる。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": "解説：AIM-J 304. ★第18項 404.b\n(b)(c) ○の2つ\n(a) × 双発機は2時間、3発以上の航空機は3時間→双発機は1時間、3発以上の航空機は2時間\n(d) × 代替飛行場名とZZZZ（離陸からの所要時間）→代替飛行場名または位置"}, {"id": "R0301P4014", "term": "R0301", "q": "航空路及び経路について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）計器飛行方式により飛行する航空機はやむを得ない場合を除き、航空路の中心線上を飛行しなければならない。\n（ｂ）計器飛行方式による飛行において悪天候を回避するために飛行経路を逸脱する必要がある場合は、管制承認を要求し承認を得なければならない。\n（ｃ）VORを使用した国内航空路においては、中心線の両側にそれぞれ最小４マイル幅の一次区域とその外側に最小４マイル幅の二次区域を有している。\n（ｄ）直行経路とはSIDの最終フィックスと航空路を結ぶ経路のことである。", "c": ["１", "２", "３", "４", "なし"], "a": 3, "e": "解説：AIM-J 501. ATSルート\n(a)(b)(c) ○の3つ\n(d) × 直行経路：航法無線施設を利用して比較的短距離の直行飛行を行うときの飛行経路であって航空路、洋上転移経路およびRNAV経路以外のものであり、AIPに公示されている。 P1-12, AIM-J 501.f)"}, {"id": "R0301P4015", "term": "R0301", "q": "計器飛行方式で飛行中に通信機が故障した場合の飛行方法について誤りはどれか。", "c": ["有視界気象状態にある場合は、これを維持して安全に着陸できると思われる最寄りの飛行場に着陸する。", "計器気象状態にある場合は、承認された経路に従って目的地上空（目的飛行場の 上空又は計器進入方式の開始点として特定の航空保安無線施設若しくはフィックスがある場合はその上空）まで飛行を継続する。", "計器気象状態にある場合で、通信機が故障する以前に目的地上空に到着し、かつ、当該地点の上空で待機する指示を受け、進入開始予定時刻を受領していた場合はその時刻まで当該地点の上空で待機した後、降下を開始する。", "計器進入方式が設定されている飛行場では指向信号灯が使用されるため、着陸は灯光による信号に従って行う。"], "a": 4, "e": ""}, {"id": "R0301P4016", "term": "R0301", "q": "次の飛行場灯火と説明の組み合わせで誤りはどれか。", "c": ["REDL: 離陸し、又は着陸しようとする航空機に滑走路の末端を示すために滑走路の両末端に設置する灯火で非常用滑走路灯以外のもの", "RCLL: 離陸し、又は着陸しようとする航空機に滑走路の中心線を示すためにその中心線に設置する灯火", "CGL: 滞空旋回中の航空機に滑走路の位置を示すために滑走路の外側に設置する灯火で滑走路の外側上方に灯光を発するもの", "AGL: 離陸した航空機にその離陸後の飛行の経路を、又は着陸しようとする航空機にその最終進入の経路に至るまでの進入の経路を示すために設置する灯火"], "a": 1, "e": ""}, {"id": "R0301P4017", "term": "R0301", "q": "操縦士は、進入限界高度において適切な目視物標を少なくとも1つ視認し、継続的に識別の維持が可能である場合のみ、進入限界高度未満へ着陸のための進入を行うことができる。非精密進入、ILS（CAT-Ⅰ）及びPAR進入における適切な目視物標について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）接地帯灯\n（ｂ）滑走路末端識別灯\n（ｃ）進入角指示灯\n（ｄ）滑走路灯", "c": ["１", "２", "３", "４", "なし"], "a": 4, "e": "解説：AIP 6.10. 最低気象条件等に係る一般適用事項 6.10.、最低気象条件 6.10.1.1、絶則2）操縦士は、進入限界高度(DA/H又はMDA/H)において適切な目視物標を少なくとも1つ視認し、継続的に識別の維持が可能である場合のみ、進入限界高度未満へ着陸のための進入を行うことができる。\ni) 進入灯の一部\nii) 滑走路進入端\niii) 滑走路進入端標識\niv) 滑走路末端灯\nv) 滑走路末端識別灯\nvi) 進入角指示灯\nvii) 接地帯または接地帯標識\nviii) 接地帯灯\nix) 滑走路灯\nx) 滑走路と同時昼用として直線進入用進入路指示灯\nxi) 指示標識"}, {"id": "R0301P4018", "term": "R0301", "q": "目視降下点について正しいものはどれか。", "c": ["レーダー着陸誘導を継続しうる限界の位置をいう。", "PAR進入を行う場合において、適切な目視物標を視認できたときに、決心高度以下に降下を開始する位置をいう。", "ILS（CAT-Ⅰ）を行う場合において、適切な目視物標を視認できたときに、決心高度以下に降下を開始する位置をいう。", "非精密進入により直線進入を通常降下により行う場合において、進入灯又は滑走路末端（滑走路進入端）を識別できる視覚援助施設を視認できたときに、最低降下高度以下に降下を開始する位置をいう。"], "a": 4, "e": "解説：AIM-J 634.a.d\n(a)(c)(d) ○の3つ\n(b) × （飛行方式設定基準 I-4-5-14）"}, {"id": "R0301P4019", "term": "R0301", "q": "乱気流に遭遇した場合の対処法について（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）「FLY ATTITUDE」が大切であり、エンジン出力と機首姿勢（ピッチ）の修正は最小限にとどめる。\n（ｂ）航法計器の監視とエンジン計器のチェックを行う。\n（ｃ）雲の観察、気象レーダー、外気温度、他機からの情報などにより、大気の状態を把握し乱気流空域の広がりや規模を考えて、必要なら離脱方法を検討する。\n（ｄ）強度にかかわらず、航空機の運航に影響すると判断した場合は、できるだけ早く管制機関等に通報する。", "c": ["１", "２", "３", "４", "なし"], "a": 4, "e": "解説：AIM-J 834\n4つすべて正しい。"}, {"id": "R0301P4020", "term": "R0301", "q": "飛行中の錯覚について誤りはどれか。", "c": ["傾いた雲の稜線、不明瞭な水平線、地上の灯火と星の光とが入り混った暗闇、地上灯火のある種の幾何学的な配列などによって、航空機の姿勢が実際の水平線に正しくアラインしていないように錯覚しがちである。", "地上物標のない場所、たとえば水面、暗い地域又は積雪に覆われた地形ではパイロットは実際の高度よりも低く飛んでいるように錯覚しがちである。", "暗闇の中で静止している灯光を何十秒間も見つめていると、その灯光が動きまわるような錯覚に陥り、パイロットがその灯光の見せかけの動きにだまされて航空機の制御を失うことがある。", "飛行中に遭遇する各種の複雑な運動と外力及び外景の視認などによって、運動と位置の錯覚を生ずることがある。これらの錯覚に基づく空間識失調は、信頼できる地上の固定物標又は飛行計器を確実に視認することにより防止できる。"], "a": 2, "e": "解説：AIM-J 965.\n(2) × 低い→高い → 実際の高度よりも高く"}, {"id": "R0303P4007", "term": "R0303", "q": "計器飛行を行う航空機乗組員に求められる最近の飛行経験について正しいものはどれか。", "c": ["操縦する日からさかのぼって半年までの間に３時間以上の計器飛行（模擬計器飛行を含む。）", "操縦する日からさかのぼって180日までの間に６時間以上の計器飛行（模擬計器飛行を含む。）", "操縦する日からさかのぼって半年までの間に３時間以上の計器航法による飛行", "操縦する日からさかのぼって180日までの間に６時間以上の計器航法による飛行"], "a": 2, "e": "解説：AIM-J 1018.d. 航空法施行規則 第161条"}, {"id": "R0303P4008", "term": "R0303", "q": "次の飛行場灯火と説明の組み合わせで誤りはどれか。", "c": ["ABN: 航行中の航空機に空港等の位置を示すために空港等又はその周辺の地域に設置する灯火で補助飛行場灯台以外のもの", "ALB: 着陸しようとする航空機に進入区域内の要点を示すために設置する灯火で進入灯以外のもの", "ALS: 着陸しようとする航空機にその最終進入の経路を示すために進入区域内及び着陸帯内に設置する灯火", "REDL: 離陸し、又は着陸しようとする航空機に滑走路の末端を示すために滑走路の両末端に設置する灯火で非常用滑走路灯以外のもの"], "a": 4, "e": "解説：AIM-J 154.\nREDL(Runway Edge Light)滑走路灯は、離陸しまたは着陸しようとする航空機に滑走路を示すための灯火。\nRTHL：滑走路末端灯。(4)はRTHL (Runway Threshold Lights)の説明"}, {"id": "R0303P4009", "term": "R0303", "q": "法に定める計器飛行等を行う航空機に装備しなければならない装置について\n（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）ジャイロ式姿勢指示器\n（ｂ）マグネティックコンパス\n（ｃ）精密速度計\n（ｄ）分刻み時計", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": ""}, {"id": "R0303P4010", "term": "R0303", "q": "ブロックアルティチュードの説明について正しいものはどれか。", "c": ["気圧が標準大気圧以下になってもQNHで飛行している航空機との必要な垂直間隔を維持するために最低利用可能フライトレベルを下回るフライトレベルをブロックすること", "乱気流や編隊飛行等の理由により、２つ（またはそれ以上）のIFR高度の空間を占有して飛行するために複数にわたる高度間を同時使用すること", "計器進入において各ブロックに応じてステップダウンフィックスと高度が指定され各フィックスで指定されている高度まで階段状に降下すること", "自衛隊高高度訓練空域／試験空域が存在し、その空域内で通過が制限される高度帯のこと"], "a": 2, "e": "解説：AIM-J 962.【高高度の影響】\n(3) × 30～40分→5～12分"}, {"id": "R0303P4011", "term": "R0303", "q": "計器飛行証明を受けていなければ行ってはならない飛行方法について（ａ）～（ｄ）のうち、該当するものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）有視界気象状態のもと航空機の位置および針路の測定を計器のみに依存して行う飛行で国土交通省令で定める距離又は時間を超えて行うもの\n（ｂ）計器気象状態のもと国土交通大臣の許可を受けて行う特別有視界飛行方式による飛行\n（ｃ）雲中において航空機の姿勢、高度、位置および針路の測定を計器のみに依存して行う飛行\n（ｄ）有視界気象状態のもと管制圏、管制区内を国土交通大臣が定める経路又は国土交通大臣が与える指示による経路により、かつその他の飛行の方法について国土交通大臣の指示に常時従って行う飛行", "c": ["１", "２", "３", "４", "なし"], "a": 3, "e": "bは不要"}, {"id": "R0303P4012", "term": "R0303", "q": "管制用語の意味として正しいものはいくつあるか。（１）～（５）の中から選べ。\n\n（ａ）HOLD ON THE GROUND: 着陸後に滑走路上で待機してくだい。\n（ｂ）RECLEARED DIRECT XAC: XACへの直行を承認します。\n（ｃ）CLEARED FOR APPROACH: 着陸を許可します。\n（ｄ）DESCEND AT PILOT'S DISCRETION : 直ちに降下を開始してください。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": "解説：AIM-J 562. 降下クリアランスに\"AT PILOT'S DISCRETION\"の用語が付された場合は、降下を開始する時期がパイロットの判断に任される。そして降下を開始した後も一時的な水平飛行を含む降下率の調整を通脱なくて行うことができる。ただし一度通過した高度に再び上昇してはいけない。"}, {"id": "R0303P4013", "term": "R0303", "q": "通信機が故障した場合の飛行方法について、計器気象状態においてレーダー誘導指示を受けている場合の対処で誤りはどれか。", "c": ["誘導開始の際、誘導目標としてフィックスが指示された場合は当該フィックスに直行する。", "誘導開始の際、誘導目標として航空路、経路等が指示された場合は当該経路にある目的地に向かって最寄りのフィックスに直行する。", "誘導目標の指示がない場合は、誘導開始前において最後に承認された経路にある目的地に向かって最寄りのフィックスに直行する。", "フィックスに直行する際は、制限空域等を回避せず最短の経路を飛行すること。"], "a": 4, "e": "解説：AIM-J 781.\n(4) × 制限空域等を回避せず最短の経路を飛行すること → 制限空域に入ってはならない"}, {"id": "R0303P4014", "term": "R0303", "q": "計器飛行方式における位置通報について（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）AIPチャートの▲で示された地点は非義務位置通報点である。\n（ｂ）レーダー管制業務を受けている場合は、特に指示されない限り位置通報を行う必要はない。\n（ｃ）位置通報は通常、現に通信を行っている管制機関に対して実施する。\n（ｄ）国内を飛行する場合の位置通報は、コールサイン、位置通報点名、高度、速度、残存燃料、次の予定位置通報点及び予定通過時刻の順に行う。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": "解説：AIM-J 552.a, 550, 551, 553.a.\n(b)(c) ○の2つ\n(a) × 非義務位置通報点→義務位置通報点\n(d) × 速度、残存燃料は通報不要"}, {"id": "R0303P4015", "term": "R0303", "q": "CMV（地上視程換算値）への変換が適用できる最低気象条件について（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）離陸\n（ｂ）CAT-Ⅱ/Ⅲ精密進入\n（ｃ）周回進入\n（ｄ）代替飛行場", "c": ["１", "２", "３", "４", "なし"], "a": 5, "e": "解説：AIM-J 642.\nCMVは、離陸、周回進入（航空機区分B以下の場合に限る）、代替飛行場には適用されない。"}, {"id": "R0303P4016", "term": "R0303", "q": "下表に示すアプローチチャート（VORを使用する非精密進入方式）の断面図例から読取れる情報について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n\n\n\n\n\n\n\n\n\n\n（ａ）基礎旋回はTHEから11.0DMEまでに旋回を開始しなければならない。\n（ｂ）基礎旋回終了時までに3,300 ftに降下するよう指定高度が設定されている。\n（ｃ）進入復行はFAFからの時間経過により行うこともできるように設定されている。\n（ｄ）最終進入フィックスから滑走路末端上50 ftまでの降下角は、PAPIの公示角と同じく3.5°である。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": "解説：AIM-J 第6章 P6-3 アプローチチャート記載例\n(c) の1つ\n(a) × 4,000→5,000\n(d) × 通常PAPI の角度は3.0°で設定されています。図ではパスが3.2°となっており、MISSED APPROACHの手順下部に「PAPI and descent angles are not coincident.」の表記があり同じではない。（例：RJFU VOR RWY 32）"}, {"id": "R0303P4017", "term": "R0303", "q": "レーダー誘導について誤りはどれか。", "c": ["旋回方向の指示がない場合は指示されたヘディングに近い方向へ旋回する。", "レーダー誘導はヘディングの指示によって開始され、指示されるヘディングは常に磁方位である。", "レーダー誘導は、原則として MEA 以上の高度で行われる。", "管制機関は当該機の現針路が不明で、かつ、それを確認する余裕がない場合、旋回の度数及び旋回方向を指定する。"], "a": 3, "e": "解説：AIM-J 450.\n(1)(2)(4) ○の3つ\n(3) × MEA→MVA(minimum vectoring altitude)"}, {"id": "R0303P4018", "term": "R0303", "q": "空港等付近の航行方法についての記述（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）計器飛行方式による進入の方式その他当該空港等について定められた飛行の方式に従うこと。\n（ｂ）計器飛行方式により離陸しようとする場合であって、空港等における気象状態が離陸することができる最低の気象条件未満であるときは、離陸しないこと。\n（ｃ）計器飛行方式により着陸しようとする場合であって、進入限界高度よりも高い高度の特定の地点を通過する時点において空港等における気象状態が当該空港等への着陸のための進入を継続することができる最低の気象条件未満であるときは、着陸のための進入を継続しないこと。\n（ｄ）計器飛行方式により着陸しようとする場合であって、進入限界高度以下の高度において目視物標を引き続き視認かつ識別することによる当該航空機の位置の確認ができなくなったときは、着陸のための進入を継続しないこと。", "c": ["１", "２", "３", "４", "なし"], "a": 4, "e": "b：AVBL LDG MINIMAを満足していても、T/O ALTN FIELDを満たしていなければ離陸できない"}, {"id": "R0303P4019", "term": "R0303", "q": "着氷に遭遇した場合の注意事項で誤りはどれか。", "c": ["舵面上に微細な氷が付着してコントロールフラッターが発生することがある。 巡航中、操縦桿に小刻みな振動を感じたら、舵の効きを良くするため増速する。", "ピトー管や静圧孔への着氷によりIASがおかしくなってきたら、なるべく一定の飛行姿勢を維持して飛行する。", "非常に激しい着氷の起きる気層の厚さは200～500フィート程度が普通であるから、高度の変更が有効である。", "強い着氷状態ではオートパイロットを使用せずに、操縦系統が凍結しないように常時動かしておく方がよい。"], "a": 1, "e": "解説：AIM-J 856. C. (1) × 舵の効きを良くするため増速する→少し減速する"}, {"id": "R0303P4020", "term": "R0303", "q": "低酸素症に関する記述で正しいものはどれか。", "c": ["低酸素症の兆候が現れたら、呼吸の速さと深さを自分で意識的に調整していけば通常は２～３分で治まる。鼻から息を吸い込み、唇を強めに締めて口からできるだけ時間をかけて吐き出す腹式呼吸が効果的である。", "低酸素症は血液の酸素運搬能力が大きく関係するため、通常、飲酒や服薬、体調並びに精神状態の影響は受けにくい。", "大気中に酸素の占める割合は、地上からはるか上空に至るまで一定であるため飛行高度の増大に対応して低酸素症の傾向も増大する。", "低酸素症の兆候は個人差が大きく、通常それらがゆっくり進行するとき、その影響を自ら認識することは容易である。"], "a": 3, "e": "解説：AIM-J 962.\n(1) × 10,000→5,000\n(2) × 18,000→12,000\n(3) × 40分から50分 → 5～12分"}, {"id": "R0305P4007", "term": "R0305", "q": "最低利用可能フライトレベルが145になる場合のQNHはどれか。", "c": ["29.45 inHg", "28.97 inHg", "28.82 inHg", "28.39 inHg"], "a": 1, "e": "解説：AIP ENR 1.7 高度計規正方式 2. 高度計規正方式の基本 福岡FIR内を飛行する航空機の高度又はフライトレベルは下記の方式により維持するものとする。\n2.1一般方式 平均海面上14,000ft(FL140)以上→標準気圧値29.92インチ(1013.2ヘクトパスカル)により規正する。\n0.1インチHgの変化が100フィートに相当するため、0.5インチHgの変化は、高度に換算すると約500フィートになる。0.1インチHg ≒ 100フィート0.5インチHg ≒ 500フィート\nAIM-J 522.a.\n29.92以上 140\n29.91～29.42 145\n29.41～28.92 150\n28.91～28.42 155\n28.41～27.92 160"}, {"id": "R0305P4008", "term": "R0305", "q": "ATSルートについて（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）国内航空路は航空法施行規則により指定されている。\n（ｂ）RNAV経路以外の航空路であってVORによって構成される航空路で国内（内陸）航空路の保護空域は中心線の両側に最小４マイル幅の一次空域とその外側に二次空域を有する。\n（ｃ）航空路は各区間でMEAが設定され、航法無線施設で構成される経路にあっては常に MRAと等しい高度で設定されている。\n（ｄ）突発的な事故や悪天候により空港の処理容量が低下した場合にエンルートでの待機を行うために進入管制区外にエンルート待機経路が設定されている。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": ""}, {"id": "R0305P4009", "term": "R0305", "q": "航空情報用略語と意義の組み合わせで誤りはどれか。", "c": ["ARSR : 航空路監視レーダー", "ASR\t: 空港監視レーダー", "ORSR : 洋上航空路監視レーダー", "ASDA : 空港面探知レーダー"], "a": 4, "e": "解説：AIM-J 第11章 航空情報用略語表\n空港面探知レーダー：ASDE (Airport surface detection equipment)"}, {"id": "R0305P4010", "term": "R0305", "q": "計器飛行方式で出発し、香川 VOR（KTE）から有視界飛行方式に変更して真対気速度160ktで飛行する場合、飛行計画書の第15項「経路」について、香川 VOR以降の記入例として適切なものはどれか。", "c": ["KTE / N0160VFR VFR", "KTE / N0160 IFR\tVFR", "KTE / IFR N0160VFR", "KTE / IFR N0160VFR VFR"], "a": 1, "e": "解説：AIM-J 304. 第15項\n（参考）VFRからIFRに切り替える場合は「地点/KTEN160A090 IFR」"}, {"id": "R0305P4011", "term": "R0305", "q": "RNAVに関する説明について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n \n（ａ）RNAV経路における航行は航空法で定める「特別な方式による航行」なので国土交通大臣の許可が必要である。\n（ｂ）RNAV経路はVOR/DME等の地上無線施設のみを結んで設定されている。\n（ｃ）RNAV経路を飛行する場合のラテラル・ナビゲーション（飛行する針路の決定）は基本的に自動操縦装置及びFMSに依存することなくパイロットが手動により行わなければならない。\n（ｄ）パイロットはRNAV経路を飛行中に求められる航法要件を満足しない事態が生じたときには、管制機関にその旨を通報しなければならない。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": ""}, {"id": "R0305P4012", "term": "R0305", "q": "ILSについて誤りはどれか。", "c": ["地上施設は基本的にローカライザーおよびグライドスロープの２つの無指向性電波を発射する送信装置とDMEにより構成されている。", "ILS進入の運用にあたっては、視覚情報施設として進入灯、接地帯灯、滑走路灯、滑走路中心線灯等が設置されている。", "ILSの識別符号はモールス信号で、I（･ ･）で始まる３文字から成りローカライザー周波数により発信されている。", "ローカライザー信号のコース幅は滑走路進入端で約210m（700ft）になるように調整されているので、滑走路の長さによって異なる。"], "a": 1, "e": "解説：AIM-J 131.\n(1) × 無指向性→指向性\n(2) (3) (4) ○\n(4) ローカライザー信号のコース幅は滑走路進入端で約210 m (700ft) になるように調整されているので、滑走路の長さによって異なる。"}, {"id": "R0305P4013", "term": "R0305", "q": "管制業務について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）日本が分担する管制空域は東京FIRである。\n（ｂ）航空路管制業務は札幌、東京、福岡、那覇の管制区管制所及び航空交通管理センターが管轄する空域に分割されている。\n（ｃ）各管制区管制所が管轄する空域はさらにセクターと呼ばれる空域に細分され、セクターごとに指定された特定の周波数により運用されている。\n（ｄ）管制区管制所が行う管制業務は、航空路管制業務と進入管制区外の飛行場に対する進入管制業務であり、一部においては広域レーダー進入管制業務を提供している。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": ""}, {"id": "R0305P4014", "term": "R0305", "q": "最終進入経路について誤りはどれか。", "c": ["基礎旋回もしくは方式旋回の開始点から進入復行点（MAPｔ）に至る部分。", "最終進入FIX（FAF）から進入復行点（MAPｔ）に至る部分。", "ILS進入ではFAPから進入復行点（MAPｔ）に至る部分。", "計器進入方式はすべて最終進入のセグメントを有している。"], "a": 1, "e": "解説：AIM-J 631.d.\n(1) × 開始点から→終了する点から"}, {"id": "R0305P4015", "term": "R0305", "q": "ホールディングについて（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）スタンダードパターンでの旋回方向は左周りである。\n（ｂ）14,000ft以下の高度でのアウトバゥンドレグ飛行時間は１分である。\n（ｃ）14,000ftを超える高度でのアウトバゥンドレグ飛行時間は２分である。\n（ｄ）最低待機高度（MHA）は待機区域内の地上障害物から最小984ftの垂直間隔 を確保し、さらに待機区域周辺4 nmの緩衝区域内の障害物に対する間隔も考慮されている。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": ""}, {"id": "R0305P4016", "term": "R0305", "q": "次の飛行場灯火に係る略語とその説明の組み合わせで誤りはどれか。", "c": ["ALS: 着陸しようとする航空機にその最終進入の経路を示す灯火である。", "PAPI: 着陸しようとする航空機にその着陸の進入角の良否を示す灯火である。", "RTHL: 滑走路を走行中の航空機に滑走路の先方の末端からの距離を示す灯火である。", "RCLL: 離陸し、または着陸しようとする航空機に滑走路の中心線を示す灯火である。"], "a": 3, "e": ""}, {"id": "R0305P4017", "term": "R0305", "q": "レーダー誘導について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n \n（ａ）レーダー誘導はヘディングの指示によって開始され、指示されるヘディングは常に磁方位である。\n（ｂ）旋回方向の指示がない場合は指示されたヘディングに近い方向へ旋回する。\n（ｃ）管制機関は当該機の現針路が不明で、かつ、それを確認する余裕がない場合、旋回の度数及び旋回方向を指定する。\n（ｄ）レーダー誘導は、原則として MRA 以上の高度で行われる。", "c": ["１", "２", "３", "４", "なし"], "a": 3, "e": ""}, {"id": "R0305P4018", "term": "R0305", "q": "CMV（地上視程換算値）への変換が適用できる最低気象条件はどれか。", "c": ["SSP体制実施時の離陸", "CAT-Ⅰ精密進入", "航空機区分Hの周回進入", "目的地の代替飛行場"], "a": 2, "e": "解説：AIM-J 642.\nCMVは、離陸、周回進入（航空機区分B以下の場合に限る）、代替飛行場には適用されない。"}, {"id": "R0305P4019", "term": "R0305", "q": "計器飛行方式で飛行中に通信機が故障した場合の飛行方法について誤りはどれか。", "c": ["有視界気象状態にある場合は、これを維持して安全に着陸できる最寄りの空港等に着陸する。", "計器気象状態にある場合は、承認された経路に従って目的地上空（目的飛行場の 上空又は計器進入方式の開始点として特定の航空保安無線施設若しくはフィックスがある場合はその上空）まで飛行を継続する。", "計器気象状態にある場合で目的地上空に到着したとき、故障前に進入許可を\n受けている場合は、進入は行わず離陸時刻に飛行計画書の所要時間を加えた時刻に降下を開始する。", "計器気象状態にある場合で目的地上空に到着したとき、待機指示と進入予定 時刻を受領している場合は、指示に従って待機した後、進入予定時刻に降下を開始する。"], "a": 3, "e": "解説：航空法施行規則 第206条【通信機の故障の場合の飛行】AIM-J 781.\n(a)(c)(d) ○の3つ\n(3) × 故障前に進入許可を受けていても安全のため進入は行わず→故障前に進入許可を受けていれば、進入は行い離陸時刻に飛行計画書の所要時間を加えた時刻に進入を開始する。"}, {"id": "R0305P4020", "term": "R0305", "q": "飛行中の錯覚について誤りはどれか。", "c": ["傾いた雲の稜線、不明瞭な水平線、地上の灯火と星の光とが入り混った暗闇、地上灯火のある種の幾何学的な配列などによって、飛行機の姿勢が実際の水平線に正しくアラインしていないように錯覚しがちである。", "地上物標のない場所、たとえば水面、暗い地域又は積雪に覆われた地形ではパイロットは実際の高度よりも低く飛んでいるように錯覚しがちである。", "暗闇の中で静止している灯光を何十秒間も見つめていると、その灯光が動きまわるような錯覚に陥り、パイロットがその灯光の見せかけの動きにだまされて飛行機の制御を失うことがある。", "飛行中に遭遇する各種の複雑な運動と外力及び外景の視認などによって、運動と位置の錯覚を生ずることがある。これらの錯覚に基づく空間識失調は、信頼できる地上の固定物標又は飛行計器を確実に視認することにより防止できる。"], "a": 2, "e": "解説：AIM-J 965.\n(2) × 低い→高い → 実際の高度よりも高く"}, {"id": "R0307P4007", "term": "R0307", "q": "航空情報用略語と意義の組み合わせで誤りはどれか。", "c": ["ARSR : 航空路監視レーダー", "ASR\t: 空港監視レーダー", "ASDA : 空港面探知レーダー", "ORSR : 洋上航空路監視レーダー"], "a": 3, "e": "解説：AIM-J 第11章 航空情報用略語表\n空港面探知レーダー：ASDE (Airport surface detection equipment)"}, {"id": "R0307P4008", "term": "R0307", "q": "最低利用可能フライトレベルが155になる場合のQNHはどれか。", "c": ["29.91 inHg ～ 29.42 inHg", "29.41 inHg ～ 28.92 inHg", "28.91 inHg ～ 28.42 inHg", "28.41 inHg ～ 27.92 inHg"], "a": 3, "e": "解説：AIP ENR 1.7 高度計規正方式 2. 高度計規正方式の基本 福岡FIR内を飛行する航空機の高度又はフライトレベルは下記の方式により維持するものとする。\n2.1一般方式 平均海面上14,000ft(FL140)以上→標準気圧値29.92インチ(1013.2ヘクトパスカル)により規正する。\n0.1インチHgの変化が100フィートに相当するため、0.5インチHgの変化は、高度に換算すると約500フィートになる。0.1インチHg ≒ 100フィート0.5インチHg ≒ 500フィート\nAIM-J 522.a.\n29.92以上 140\n29.91～29.42 145\n29.41～28.92 150\n28.91～28.42 155\n28.41～27.92 160"}, {"id": "R0307P4009", "term": "R0307", "q": "航空法について（a）～（d）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）計器気象状態とは、視程及び雲の状況を考慮して国土交通省令で定める視界上不良な気象状態をいう。\n（ｂ）計器飛行とは、航空機の姿勢、高度、速度及び距離の測定を計器にのみ依存して行う飛行をいう。\n（ｃ）航空機は、計器飛行方式により、航空交通管制圏若しくは航空交通情報圏に係る空港等から出発し、又は航空交通管制区、航空交通管制圏若しくは航空交通情報圏を飛行しようとするときは、国土交通省令で定めるところにより国土交通大臣に飛行計画を通報し、その承認を受けなければならない。\n（ｄ）航空機は、航空交通管制区若しくは航空交通管制圏のうち国土交通大臣が告示で指定する空域又は国土交通省令で定める高さ以上の空域においては、計器飛行方式により飛行してはならない。ただし、国土交通大臣の許可を受けた場合は、この限りでない。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": "解説：航空法93条\n(b)(c)(d) ○の3つ\n(a) × 計器飛行方式→計器飛行又は計器航法"}, {"id": "R0307P4010", "term": "R0307", "q": "レーダー管制下における速度調整について（a）～（d）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）離陸後の減速を制限する場合、「DO\tNOT\tEXCEED\t[specified\tspeed] KNOTS」の用語が使用される。\n（ｂ）速度調整は各管制機関で指示されるため、他管制機関にレーダーハンドオフされた場合は、前に指定された速度調整は無効となる。\n（ｃ）速度調整を受けた場合は、指定された速度の±20 ktの範囲内で飛行すべきである。\n（ｄ）減速と降下の指示が同時に発出される場合は、どちらの操作を先に行うべきか指示される。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": ""}, {"id": "R0307P4011", "term": "R0307", "q": "管制機関より「CLEARANCE VOID IF NOT OFF THE GROUND BY 01:00」と\n通報を受けた場合で正しいものはどれか。", "c": ["01:00までは地上におけるすべての管制許可は発出されない。", "01:00までにグランドと通信できれば、この管制承認は有効となる。", "01:00までに離陸しないときは、この管制承認は無効となる。", "出発制限を01:00に解除する。"], "a": 3, "e": "解説：AIM-J 第12章 主な管制用語と略語として使われることがある。"}, {"id": "R0307P4012", "term": "R0307", "q": "下表に示すアプローチチャートに記載される最低気象条件及び進入限界高度の例から読み取れる情報について（a）～（e）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n\n\n\n\n\n（ａ）飛行場標点の標高は、586 ftである。\n（ｂ）決心高度は、414 ftである。\n（ｃ）LOC単独進入（直線進入）の最低気象条件の値は、すべての航空機区分同一である。\n（ｄ）CIRCLINGによる着陸のための最低気象条件は地上視程が適用される。\n（ e ）周回進入は北側に限定する。", "c": ["１", "２", "３", "４", "５"], "a": 2, "e": "解説：AIM-J 第6章 P6-3 アプローチチャート記載例\n(c) の1つ\n(a) × 接地点→THR = Threshold elevation\n(b) × 900→1,000\n(c) × 同一→であるが一同一ではない"}, {"id": "R0307P4013", "term": "R0307", "q": "ATSルートについて（a）～（d）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）国内航空路は航空法施行規則により指定されている。\n（ｂ）RNAV経路以外の航空路であってVORによって構成される航空路で国内（内陸）航空路の保護空域は中心線の両側に最小2マイル幅の一次空域とその外側に最小 ４マイル幅の二次空域を有する。\n（ｃ）航空路は各区間でMEAが設定され航法無線施設で構成される経路にあっては常にMRAと等しい高度で設定されている。\n（ｄ）突発的な事故や悪天候により空港の処理容量が低下した場合にエンルートでの待機を行うために進入管制区外にエンルート待機経路が設定されている。", "c": ["１", "２", "３", "４", "５"], "a": 1, "e": "b×→4マイル"}, {"id": "R0307P4014", "term": "R0307", "q": "計器進入について（a）～（d）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）非精密進入とは最終進入を水平方向のみの航法情報によって行う計器進入である。\n（ｂ）最終進入における最低高度を最低降下高度といいDAと表記される。DAに至った地点を進入復行点として進入復行方式が設定されている。\n（ｃ）最終進入の途中にフィックスを設け、階段状に降下することによって低い最低降下高度を設定できる場合は、ステップダウンフィックスが設けられることがある。\n（ｄ）ローカライザー単独進入とは、ローカライザーとアウターマーカー等の位置情報を使用して行う計器進入であり、精密進入である。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": "ｄ×→非精密"}, {"id": "R0307P4015", "term": "R0307", "q": "飛行計画書の第８項「飛行方式および飛行の種類」のうち、飛行方式の記入要領で誤りはどれか。", "c": ["Y: IFRで出発し途中でVFRに変更する場合", "X: IFRで出発し途中でVFRに変更し再びIFRに変更する場合", "Z: VFRで出発し途中でIFRに変更する場合", "Z: VFRで出発し途中でIFRに変更し再びVFRに変更する場合"], "a": 2, "e": "解説：AIM-J 304. 第8項 飛行方式および飛行の種類\n飛行方式は次の4種類\nIFRで飛行する場合・・・I\nVFRで飛行する場合・・・V\nIFRで出発し途中で飛行方式を変更する場合・・Y\nVFRで出発し途中で飛行方式を変更する場合・・Z\n飛行の種類は問題の中に含まれていない。種類はS（定期便）、N（定期便以外の航空運送事業）、G（使用事業、訓練、訓練等）、M（Military）、Xその他"}, {"id": "R0307P4016", "term": "R0307", "q": "計器飛行方式による航空路の飛行について（a）～（d）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n \n（ａ）COPとは管制区管制所のセクター移行の際に周波数を変更する地点である。\n（ｂ）管制官から「RADAR\tCONTACT」と通報されてレーダー管制業務が開始された後「RADAR\tSERVICE\tTERMINATED」あるいは「RADAR\tCONTACT LOST」と通報されるまでは、特に指示されない限り位置通報を行う必要はない。\n（ｃ）AIPチャートに▲で示された地点は非義務位置通報点である。\n（ｄ）航法間隙（NAVIGATION\tGAP）とは機体の帯電や電子装置の磁気により、航空機に装備された航法機材に発生する誤差のことである。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": ""}, {"id": "R0307P4017", "term": "R0307", "q": "CMV（地上視程換算値）への変換が適用できる最低気象条件はどれか。", "c": ["離陸", "CAT-Ⅰ精密進入", "周回進入", "代替飛行場"], "a": 2, "e": "解説：AIM-J 642.\nCMVは、離陸、周回進入（航空機区分B以下の場合に限る）、代替飛行場には適用されない。"}, {"id": "R0307P4018", "term": "R0307", "q": "計器進入について（a）～（d）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）操縦士は、計器進入開始前において、目的飛行場の気象状態が公示、又は自己の進入を継続することができる着陸最低気象条件を満たさない場合は、管制機関 又は飛行場アドバイザリー業務実施機関にその旨通報するとともに、待機又は代替飛行場へのクリアランスを要求しなければならない。\n（ｂ）操縦士は、計器進入方式開始後（最終進入フィックス、アウターマーカー、飛行場標高から1,000 ftの地点、又は特に認められた地点における進入継続の可否判断を行った後）に当該飛行場の気象状態が公示、又は自己の最低気象条件を満たさなくなった場合であっても計器進入を継続することができる。\n（ｃ）操縦士は、最終進入を開始した後MAP（進入復行開始点）に到達するまでに進入 復行を指示された場合、又は気象状態悪化等のため進入継続を中止した場合は、 MAPまで計器飛行方式により飛行した後、公示又は事前に通報された進入復行方式に従って飛行しなければならない。この場合操縦士は降下を中止して決心高\n若しくは最低降下高度以上での水平飛行又は公示若しくは事前に通報された進入復行方式に規定された高度までの上昇を行うことができる。\n（ｄ）操縦士は、最終進入を開始した後MAPに到達するまでに気象状態悪化等のために進入継続を中止した場合は、その後の飛行（公示又は事前に通報された進入復行方式以外の飛行、待機、代替飛行場への飛行等）につきクリアランスを得てMAPの手前から計器進入経路を離脱することができる。", "c": ["１", "２", "３", "４", "なし"], "a": 4, "e": ""}, {"id": "R0307P4019", "term": "R0307", "q": "非与圧機における高々度飛行の影響について正しいものはどれか。", "c": ["夜間視力の低下が発生し始めるのは機内気圧が10,000 ft以上に相当する高度に達してからである。", "普通の健康なパイロットの場合18,000 ftまでは、低酸素症の影響は表れない。", "20,000 ftでは40～50分で修正操作と回避操作を行う能力が失われ、間もなく失神する。", "喫煙は低酸素症の発症高度を下げることがある。"], "a": 4, "e": "解説：AIM-J 962.\n(1) × 10,000→5,000\n(2) × 18,000→12,000\n(3) × 40分から50分 → 5～12分"}, {"id": "R0307P4020", "term": "R0307", "q": "飛行中の錯覚について誤りはどれか。", "c": ["傾いた雲の稜線、不明瞭な水平線、地上の灯火と星の光とが入り混った暗闇、 地上灯火のある種の幾何学的な配列などによって、飛行機の姿勢が実際の水平線に正しくアラインしていないように錯覚しがちである。", "地上物標のない場所、たとえば水面、暗い地域又は積雪に覆われた地形ではパイロットは実際の高度よりも高く飛んでいるように錯覚しがちである。", "暗闇の中で静止している灯光を何十秒間も見つめていると、その灯光が動きまわるような錯覚に陥り、パイロットがその灯光の見せかけの動きにだまされて飛行機の制御を失うことがある。", "飛行中に遭遇する各種の複雑な運動と外力及び外景の視認などによって、運動と位置の錯覚を生ずることがある。これらの錯覚に基づく空間識失調は、信頼できる地上の固定物標又は飛行計器を確実に視認しても防止することはできない。"], "a": 4, "e": ""}, {"id": "R0309P4007", "term": "R0309", "q": "受領したクリアランスが変更される場合に前置される用語で正しいものはどれか。", "c": ["RECLEARANCE", "REVISED CLEARANCE", "AMENDED CLEARANCE", "CHANGED CLEARANCE"], "a": 2, "e": "解説：AIM-J 433.\n(1)(3)(4) × これらの用語は定義されていない。"}, {"id": "R0309P4008", "term": "R0309", "q": "次の飛行場灯火と説明の組み合わせで誤りはどれか。", "c": ["滑走路末端灯: 離陸し、又は着陸しようとする航空機に滑走路の末端を示すために滑走路進入端及び滑走路終端に設置する灯火で非常用滑走路灯以外のもの", "滑走路中心線灯: 離陸し、又は着陸しようとする航空機に滑走路の中心線を示すためにその中心線に設置する灯火", "旋回灯: 滞空旋回中の航空機に滑走路の位置を示すために滑走路の外側に設置する灯火で滑走路の外側上方に灯光を発するもの", "進入灯: 離陸した航空機にその離陸後の飛行の経路を、又は着陸しようとする航空機にその最終進入の経路に至るまでの進入の経路を示すために設置する灯火"], "a": 4, "e": "解説：AIM-J 152, 157.c.\n(4) × は進入灯ではなく、進入角指示灯 (AGL: approach guidance lights) の説明"}, {"id": "R0309P4009", "term": "R0309", "q": "航空法第６９条（最近の飛行経験）に定める、計器飛行を行う航空機乗組員の飛行経験について正しいものはどれか。", "c": ["操縦する日からさかのぼって半年までの間に３回以上の計器着陸", "操縦する日からさかのぼって180日までの間に６回以上の計器着陸", "操縦する日からさかのぼって半年までの間に３時間以上の計器飛行（模擬計器飛行を含む。）", "操縦する日からさかのぼって180日までの間に６時間以上の計器飛行（模擬計器飛行を含む。）"], "a": 4, "e": "解説：AIM-J 1018.d. 航空法施行規則 第161条"}, {"id": "R0309P4010", "term": "R0309", "q": "航空情報用略語と意義の組み合わせで正しいものはどれか。", "c": ["MSA: 平均海面上", "MEA: 最低経路高度", "MRA: 最高受信可能高度", "MHA: 最低降下高度"], "a": 2, "e": "解説：AIP GEN 2.2 AIS出版物に使用される略語 AIM-J 11章「航空情報用略語表」\nMSA：最低扇形別高度 Minimum sector altitude\nMRA：最低受信可能高度 Minimum reception altitude\nMHA：最低待機高度 Minimum holding altitude"}, {"id": "R0309P4011", "term": "R0309", "q": "滑走路視距離（RVR）について誤りはどれか。", "c": ["変化傾向を示す記号は、対象とした10分間の前半5分間と後半5分間の平均値を 比較し、100メートル以上上昇した場合はU、100メートル以上下降した場合はＤ差が100メートル未満の場合はSが使われる。\n例：R34/1400U\t例：R34/0200D", "観測時間10分間における1分間平均値の極値が、10分間平均値から50メートルまたは平均値の20％のいずれか大きい値以上変動しているときは、10分間の  平均値に代えて1分間の最小値と最大値が示される。\n例：R34/0400V0800", "観測値が得られない場合、および滑走路灯/滑走路中心線灯の輝度情報を観測システムに取り込んでいる飛行場において滑走路灯または滑走路中心線灯が消灯した\n（灯火の要件を満たさない）場合は、当該滑走路番号を前置して/////が示される。例：R34/////", "RVR値が測定範囲の上限を超えている場合はPに続いて測定範囲の上限値が、下限を下廻っている場合はMに続いて測定範囲の下限値が示される。\n例：R34/P1800\t例：R34/M0200"], "a": 1, "e": "解説：AIM-J 811.7\n(1) × S→N(no change)"}, {"id": "R0309P4012", "term": "R0309", "q": "最低利用可能フライトレベルが145になる場合のQNHはどれか。", "c": ["29.91 inHg ～ 29.42 inHg", "29.41 inHg ～ 28.92 inHg", "28.91 inHg ～ 28.42 inHg", "28.41 inHg ～ 27.92 inHg"], "a": 1, "e": "解説：AIP ENR 1.7 高度計規正方式 2. 高度計規正方式の基本 福岡FIR内を飛行する航空機の高度又はフライトレベルは下記の方式により維持するものとする。\n2.1一般方式 平均海面上14,000ft(FL140)以上→標準気圧値29.92インチ(1013.2ヘクトパスカル)により規正する。\n0.1インチHgの変化が100フィートに相当するため、0.5インチHgの変化は、高度に換算すると約500フィートになる。0.1インチHg ≒ 100フィート0.5インチHg ≒ 500フィート\nAIM-J 522.a.\n29.92以上 140\n29.91～29.42 145\n29.41～28.92 150\n28.91～28.42 155\n28.41～27.92 160"}, {"id": "R0309P4013", "term": "R0309", "q": "IFRによる到着で速度調整について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）速度調整を受けたまま、他の管制機関にレーダーハンドオフされた場合、前に指定された速度調整は移管後自動的に終了される。\n（ｂ）ホールディングが指示された場合、それまでの速度調整は引き続き有効である。\n（ｃ）速度調整中に進入許可が発出された場合には、それまでの速度調整は自動的に終了される。\n（ｄ）レーダー進入に際して速度調整が指示されていた場合は、接地点から5 nmの地点または最終降下開始点のうちいずれか接地点から近い方の地点を通過した時点で、速度調整は自動的に終了される。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": "cのみ正。\nホールディングを指示された場合終了する。"}, {"id": "R0309P4014", "term": "R0309", "q": "離陸の最低気象条件について誤りはどれか。", "c": ["離陸の最低気象条件に、地上視程通報値のCMVへの変換は適用されない。", "通常運航を前提とするものであり、離陸中断及び臨界発動機不作動時の運航を勘案するものではない。", "多発機であって離陸の代替飛行場を設定し、出発飛行場においてCAT-Ⅰ精密進入を利用できる場合、離陸の最低気象条件として非精密進入のMDH（100 フィート単位に繰上げ）に等しい雲高、及び公示された最低気象条件の RVR値に等しい地上視程が適用される。", "SSP体制とはILS CAT-Ⅱ/Ⅲの運航を可能とする地上施設の要件が整っている状態であり、離陸の最低気象条件に関係がある。"], "a": 3, "e": "解説：AIM-J 304. ★第18項 404.b\n(b)(c) ○の2つ\n(a) × 双発機は2時間、3発以上の航空機は3時間→双発機は1時間、3発以上の航空機は2時間\n(d) × 代替飛行場名とZZZZ（離陸からの所要時間）→代替飛行場名または位置"}, {"id": "R0309P4015", "term": "R0309", "q": "下表に示すアプローチチャート（VORを使用する非精密進入方式）の断面図例から読取れる情報について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n\n\n\n\n\n\n\n（ａ）MISSED APPROACH後は、指示がない場合5,000 ftまで上昇する。\n（ｂ）最終進入フィックスは接地点から5.0 NMの位置にある。\n（ｃ）最終進入フィックスまでのOCHは1,670 ftである。\n（ｄ）最終進入フィックスから滑走路末端上50 ftまでの降下角は、PAPIの公示角と同じく3.2°である。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": "解説：AIM-J 第6章 P6-3 アプローチチャート記載例\n(c) の1つ\n(a) × 4,000→5,000\n(d) × 通常PAPI の角度は3.0°で設定されています。図ではパスが3.2°となっており、MISSED APPROACHの手順下部に「PAPI and descent angles are not coincident.」の表記があり同じではない。（例：RJFU VOR RWY 32）"}, {"id": "R0309P4016", "term": "R0309", "q": "CAT-Ⅰ精密進入方式の最低気象条件を決定するためのファシリティについて、飛行場灯火および飛行場標識の構成で正しいものはどれか。", "c": ["フル\t： 滑走路中心線標識、滑走路灯、滑走路末端灯、720 m未満の進入灯", "インターミディェット： 滑走路中心線標識、滑走路灯、滑走路末端灯、420 m以上 719 m以下の滑走路中心線灯", "ベーシック： 滑走路中心線標識、滑走路灯、滑走路末端灯、サイドバレットが運用されている420 m未満の進入灯", "進入灯等なし： ファシリティの要件を満たさない場合"], "a": 4, "e": "解説：AIM-J 152, 157.c.\n(4) × は進入灯ではなく、進入角指示灯 (AGL: approach guidance lights) の説明"}, {"id": "R0309P4017", "term": "R0309", "q": "非精密進入について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）非精密進入とは最終進入を水平方向のみの航法情報によって行う計器進入である。\n（ｂ）最終進入における最低高度を最低降下高度といいDAと表記される。DAに至った地点を進入復行点として進入復行方式が設定されている。\n（ｃ）最終進入の途中にフィックスを設け、階段状に降下することによって低い最低降下高度を設定できる場合は、ステップダウンフィックスが設けられることがある。\n（ｄ）ストレートインランディングを行う最終進入経路上には、航空機が接地点に向けて適切な降下を行うために必ずVDPが設定されている。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": "解説：AIM-J 634.\n(a)(c) ○の2つ\n(b) × 非精密進入の最終進入における最低高度は最低降下高度(MDA)が表記される。\n(d) × 必ず→必ずではない 前問（例題724223）参照"}, {"id": "R0309P4018", "term": "R0309", "q": "待機（HOLDING）中において、待機終了となる指示で（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n \n（ａ）進入許可\n（ｂ）待機フィックス以遠への直行指示\n（ｃ）磁針路の指示\n（ｄ）追加管制承認の発出", "c": ["１", "２", "３", "４", "なし"], "a": 4, "e": "解説：AIM-J 571.e\n4つすべて正しい\n待機が必要なくなった場合には、次の管制承認等が発出される\n1) 進入許可\n2) 待機フィックス以遠のフィックスへの直行指示\n3) 追加管制承認\n4) 待機フィックス以遠への直行指示\n5) PROCEED VIA LAST ROUTING CLEARED の指示"}, {"id": "R0309P4019", "term": "R0309", "q": "低酸素症に関する説明のうち正しいものはどれか。", "c": ["ハイパーベンチレーションと呼ばれ、人間の脳および他の機能に障害をきたす程に体内の酸素が不足する状態をいう。", "大気中に含まれる酸素の割合は一定であるため、飛行高度の増大、大気圧の減少に関わらず低酸素症の傾向は変化しない。", "普通の健康なパイロットであれば、12,000 フィート未満では低酸素症による夜間視力の低下以外の顕著な影響は表れないとされている。", "最も適切な酸素の使用方法としては、昼間においては15,000 フィートを超えたならばパイロットが補助酸素を使用することである。"], "a": 3, "e": "解説：AIM-J 962.\n(1) × ハイパーベンチレーション → ハイポキシャ\n(2) × 大気圧の減少に関わらず低酸素症の傾向は変化しない→大気圧の減少に対応して低酸素症の傾向は増大する\n(4) × 15,000→10,000"}, {"id": "R0309P4020", "term": "R0309", "q": "着陸失敗をもたらす錯覚について誤りはどれか。", "c": ["通常より狭い幅の滑走路に進入するときは、航空機が実際の高さよりも高い高度にあるような錯覚を生じやすい。", "上り勾配の滑走路または上り勾配の地形のいずれかまたは両方の場合、事実上の高さよりも低いところにいるような錯覚を起こす。", "風防に当たる雨はより高い高度にいるように見せかけ、大気の霞は滑走路までの距離をより遠くにいるように見せかける錯覚の原因となる。", "明るく輝く滑走路灯や進入灯が周囲の地形を照らしているようなときは、航空機が滑走路に実際よりも近づいているような錯覚を生じやすい。"], "a": 2, "e": "解説：AIM-J 965.\n(2) × 低い→高い"}, {"id": "R0311P4007", "term": "R0311", "q": "航空路及び経路について誤りはどれか。", "c": ["操縦士はやむを得ない場合を除き、航空路の中心線を飛行しなければならない。", "COP（Changeover Point）とは、VOR/DME、VORTACまたはTACANによって構成される航空路などの経路をMEAにて飛行する航空機が後方の無線施設を次の前方の無線施設へ切り換える地点のことである。", "VORを使用した国内航空路においては、中心線の両側にそれぞれ最小４マイル幅の一次区域とその外側に最小４マイル幅の二次区域を有している。", "航空路の幅の中であれば、管制機関に通報することなく操縦士の判断により悪天候を回避しながら飛行することができる。"], "a": 4, "e": "解説：AIM-J 112. 機上のVOR受信機は、VOR電波を受信してVOR局への方位を針路盤上に示したり、CI (Course Indicator) またはCDI (Course Deviation Indicator) によって設定コースとの関係位置を示すことができる。"}, {"id": "R0311P4008", "term": "R0311", "q": "次の飛行場灯火と説明の組み合わせで誤りはどれか。", "c": ["RTHL:　 離陸し、又は着陸しようとする航空機に滑走路の末端を示すために滑走路の滑走路進入端及び滑走路終端に設置する灯火で非常用滑走路灯以外のもの", "RCLL:　 離陸し、又は着陸しようとする航空機に滑走路の中心線を示すためにその中心線に設置する灯火", "CGL:　 滞空旋回中の航空機に滑走路の位置を示すために滑走路の外側に設置する灯火で滑走路の外側上方に灯光を発するもの", "ALS:　 離陸した航空機にその離陸後の飛行の経路を、又は着陸しようとする航空機にその最終進入の経路に至るまでの進入の経路を示すために設置する灯火"], "a": 4, "e": ""}, {"id": "R0311P4009", "term": "R0311", "q": "航空情報用略語と意義の組み合わせで誤りはどれか。", "c": ["EAT: 予想進入時刻", "EET: （特定の地点までの）所要時間", "ETD: 到着予定時刻又は到着予定", "ETO: 特定地点通過予定時刻"], "a": 3, "e": "解説：AIP GEN 2.2 AIS出版物に使用される略語 AIM-J 11章「航空情報用略語表」\nETD (estimate time of departure)：出発予定時刻または出発予定。到着予定時刻又は到着予定はETA"}, {"id": "R0311P4010", "term": "R0311", "q": "法に定める計器飛行等を行う航空機に装備すべき装置について（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）ジャイロ式姿勢指示器\n（ｂ）マグネティック・コンパス\n（ｃ）外気温度計\n（ｄ）分刻み時計", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": ""}, {"id": "R0311P4011", "term": "R0311", "q": "レーダー管制下における速度調整について（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）速度調整は特定速度への減速／増速あるいは特定速度の維持を指示される。\n（ｂ）速度調整を受けた場合は、指定された速度の±10 ktの範囲内で操縦士の任意の速度を維持して飛行すべきである。\n（ｃ）速度調整は各管制機関で指示されるため、他管制機関にレーダーハンドオフされた場合は、特に指示を受けた場合を除き新たに速度調整指示を受領しなければならない。\n（ｄ）減速と降下の指示が同時に発出される場合は、どちらの操作を先に行うべきか指示される。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": "bは任意ではない\ndは〇"}, {"id": "R0311P4012", "term": "R0311", "q": "MVA（Minimum Vectoring Altitude）の説明として誤りはどれか。", "c": ["レーダー覆域において細分化されたそれぞれの区画に適用される最低誘導高度のことである。", "レーダー誘導が行われる航空機に、当該機が誘導目標を通過するまで適用される最低高度である。", "障害物の標高に1,000フィート（ASR）または2,000フィート（ARSR）以上の垂直間隔を加え、さらにレーダー覆域等を加味して定められた高度である。", "いずれのMVAも航空路のMEAと等しい値となる高度である。"], "a": 4, "e": "解説：AIM-J 624.\nMVAは障害物の標高に1,000ft(ASR)または2,000ft(ARSR)以上の垂直間隔を加え、さらにレーダー覆域等を加味して定められた高度であり、航空路のMEAとは設定手法が異なる。"}, {"id": "R0311P4013", "term": "R0311", "q": "航空法第６９条（最近の飛行経験）に定める、計器飛行を行う航空機乗組員の飛行経験について正しいものはどれか。", "c": ["操縦する日からさかのぼって半年までの間に３回以上の計器着陸", "操縦する日からさかのぼって180日までの間に６回以上の計器着陸", "操縦する日からさかのぼって半年までの間に３時間以上の計器飛行（模擬計器飛行を含む。）", "操縦する日からさかのぼって180日までの間に６時間以上の計器飛行（模擬計器飛行を含む。）"], "a": 4, "e": "解説：AIM-J 1018.d. 航空法施行規則 第161条"}, {"id": "R0311P4014", "term": "R0311", "q": "標準計器出発方式（SID）及びトランジションルートについて正しいものはどれか。", "c": ["SIDとは飛行場又は飛行場の指定滑走路と重要地点（エンルート段階開始点。原則としてATSルート上）とを接続する出発方式であり、高度について制限が設定されることはない。", "トランジションルートとはSIDを補足するものとして、SIDの終了するフィックスから航空路上のフィックスまでの間に設定された飛行経路等である。", "SID及びトランジションルートを構成する無線施設が短時間（４時間程度以内）停波した場合、レーダー管制が実施されていても、レーダー誘導によるATCクリアランスは発出されない。", "SID及びトランジションルートはRNAV経路により設計されることはない。"], "a": 2, "e": "解説：AIM-J 446.\nトランジションはSIDが航空路に至らない場合の、SIDに引き続いて航空路上のフィックスに至るまでの経路である。"}, {"id": "R0311P4015", "term": "R0311", "q": "ILS進入（ILSの機能の一部が停止した場合を含む。）における進入復行点の設定として（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）最終進入を行って決心高度に至った地点\n（ｂ）グライドスロープが使用できない場合はミドルマーカーの上空またはDMEフィックス\n（ｃ）アウターマーカーまたはDMEが使用できない場合はグライドスロープに会合した地点から所定の時間を経過した地点\n（ｄ）滑走路末端から0.6 nmの地点", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": ""}, {"id": "R0311P4016", "term": "R0311", "q": "計器飛行方式で飛行中に通信機が故障した場合の飛行方法についての記述（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）有視界気象状態にある場合は、これを維持して安全に着陸できる最寄りの空港等に着陸する。\n（ｂ）計器気象状態にある場合は、承認された経路に従って目的地上空まで飛行を継続する。\n（ｃ）計器気象状態にある場合は、承認されていた高度若しくは最低高度のいずれか高い高度及び指示されていた速度を維持して、レーダー管制業務が行われていない空域では、義務位置通報点における通報ができなかった時点から15分間飛行し、その後通報した飛行計画による高度及び速度を維持して飛行する。\n（ｄ）計器気象状態にある場合は、承認されていた高度若しくは最低高度のいずれか高い高度及び指示されていた速度を維持して、レーダー管制業務が行われている空域では、承認されていた高度若しくは最低高度に到達した時間またはトランスポンダーを7600にセットした時間のうち最も遅い時間から7分間飛行し、その後通報した飛行計画による高度及び速度を維持して飛行する。", "c": ["１", "２", "３", "４", "なし"], "a": 3, "e": "解説：航空法施行規則 第206条【通信機の故障の場合の飛行】\n(a)(c)(d) ○の3つ"}, {"id": "R0311P4017", "term": "R0311", "q": "操縦士は、ILS（CAT-Ⅰ）、PAR進入及び非精密進入にあっては、進入限界高度（DA/H、又はMDA/H）において適切な目視物標を少なくとも1つ視認し、継続的に識別の維持が可能である場合のみ、進入限界高度未満へ着陸のための進入を行うことができる。この場合における目視物標として誤りはどれか。", "c": ["風向灯", "接地帯", "滑走路末端識別灯", "滑走路灯"], "a": 1, "e": "解説：AIP 6.10. 最低気象条件等に係る一般適用事項 6.10.、最低気象条件 6.10.1.1、絶則2）操縦士は、進入限界高度(DA/H又はMDA/H)において適切な目視物標を少なくとも1つ視認し、継続的に識別の維持が可能である場合のみ、進入限界高度未満へ着陸のための進入を行うことができる。\ni) 進入灯の一部\nii) 滑走路進入端\niii) 滑走路進入端標識\niv) 滑走路末端灯\nv) 滑走路末端識別灯\nvi) 進入角指示灯\nvii) 接地帯または接地帯標識\nviii) 接地帯灯\nix) 滑走路灯\nx) 滑走路と同時昼用として直線進入用進入路指示灯\nxi) 指示標識"}, {"id": "R0311P4018", "term": "R0311", "q": "管制機関から通報されるRVR値について正しいものはどれか。", "c": ["地上視程が1,500ｍ以下またはRVR2,000m（空港により1,800m）以下の場合に通報される。", "RVR観測機器が複数設置されている場合は、タッチダウン、センターポイント、ストップエンドの順に通報される。", "RVR観測機器が1地点のみに設置されている場合は当該RVR値が通報される。観測機器が欠測の場合は、その旨と地上視程からCMV（地上視程換算値）により換算された値が通報される。", "すでに通報されたRVR値から値が変化した場合には、到着機のみに通報される。"], "a": 1, "e": "解説：AIM-J 265. RVR値の通報\n(2) × センターポイント→ミッドポイント\n(3) × その旨と地上視程からCMV（地上視程換算値）→その旨と地上視程\n(4) × 到着機のみ→出発機と到着機"}, {"id": "R0311P4019", "term": "R0311", "q": "着陸失敗をもたらす錯覚について飛行中の状況と陥りやすい錯覚の組み合わせで\n誤りはどれか。\n【飛行中の状況】\t\t【陥りやすい錯覚】", "c": ["霞などによる視程障害\t：\t実際よりも滑走路から遠くにいる", "風防に当たる雨\t：\t実際よりも高い高度にいる", "霧の中への進入\t：\t実際よりも機首が上がっている", "明るく輝く進入灯や滑走路灯が周囲の地形を照らす\t：\t実際よりも滑走路から遠くにいる"], "a": 4, "e": "解説：AIM-J 965.\n(4) × 滑走路から遠くにいる→近づいているような"}, {"id": "R0311P4020", "term": "R0311", "q": "着氷に遭遇した場合の注意事項で誤りはどれか。", "c": ["舵面上に微細な氷が付着してコントロールフラッターが発生することがある。その場合、巡航中であれば、操縦桿に小刻みな振動を感じたら増速する。", "ピトー管や静圧孔への着氷によりIASがおかしくなってきたら、なるべく一定の飛行姿勢を維持して飛行する。", "非常に激しい着氷のおきる気層の厚さは200～500フィート程度が普通であるから、高度の変更が有効である。", "強い着氷状態ではオートパイロットを使用せずに、操縦系統が凍結しないように\t常時動かしておく方がよい。"], "a": 1, "e": "解説：AIM-J 856. C. (1) × 舵の効きを良くするため増速する→少し減速する"}, {"id": "R0401P4007", "term": "R0401", "q": "計器飛行証明を有していなければ行えない飛行で該当しないものはどれか。", "c": ["計器飛行", "110 km又は30分を超えて行う計器航法による飛行", "185 km又は30分を超えて行う夜間飛行", "計器飛行方式による飛行"], "a": 3, "e": "解説：AIM-J 1007.\n(3) × 夜間飛行についての時間は規定されていない。"}, {"id": "R0401P4008", "term": "R0401", "q": "最低利用可能フライトレベルが150になる場合のQNHはどれか。", "c": ["29.45 inHg", "28.97 inHg", "28.82 inHg", "28.39 inHg"], "a": 2, "e": ""}, {"id": "R0401P4009", "term": "R0401", "q": "METARに使用される記号と意味の組み合わせで誤りはどれか。", "c": ["VCVA:　\t飛行場周辺の火山灰", "SHRA:　\tしゅう雨性の雨", "DRSA:　\t低い風じん", "FZDZ:　\t強い霧雨"], "a": 4, "e": "解説：AIM-J 811.\n(1) × もや→霧"}, {"id": "R0401P4010", "term": "R0401", "q": "管制用語の意味として正しいものはどれか。", "c": ["HOLD ON THE GROUND:\t　待機の必要はありません。", "RECLEARED DIRECT SDE:\t　SDEへの直行を承認します。", "CLEARED FOR APPROACH:\t　着陸を許可します。", "NO DELAY EXPECTED:\t　速やかに行動してください。"], "a": 2, "e": "解説：AIM-J 第12章 主な管制用語\n(1) × 地上で待機してください\n(3) × 着陸→進入\n(4) × NO DELAY EXPECTED：遅延の予定ありません。第5管制業務処理規程6待機機 (Ⅱ)-6-2"}, {"id": "R0401P4011", "term": "R0401", "q": "飛行計画書の第８項「飛行方式および飛行の種類」のうち、飛行方式の記入要領で誤りはどれか。", "c": ["Y: IFRで出発し途中でVFRに変更する場合", "X: IFRで出発し途中でVFRに変更し再びIFRに変更する場合", "Z: VFRで出発し途中でIFRに変更する場合", "Z: VFRで出発し途中でIFRに変更し再びVFRに変更する場合"], "a": 2, "e": "解説：AIM-J 304. 第8項 飛行方式および飛行の種類\n飛行方式は次の4種類\nIFRで飛行する場合・・・I\nVFRで飛行する場合・・・V\nIFRで出発し途中で飛行方式を変更する場合・・Y\nVFRで出発し途中で飛行方式を変更する場合・・Z\n飛行の種類は問題の中に含まれていない。種類はS（定期便）、N（定期便以外の航空運送事業）、G（使用事業、訓練、訓練等）、M（Military）、Xその他"}, {"id": "R0401P4012", "term": "R0401", "q": "ILSについて誤りはどれか。", "c": ["日本国内に設置されているグライドスロープのグライドパスは全て３°に設定されている。", "ILS進入の運用にあたっては、視覚情報施設として進入灯、接地帯灯、滑走路灯、滑走路中心線灯等が設置されている。", "ILSの識別符号はモールス信号で、I（･ ･）で始まる３文字から成りローカライザー周波数により発信されている。", "ローカライザー信号のコース幅は滑走路進入端で約210 m（700 ft）になるように調整されているので、滑走路の長さによって異なる。"], "a": 1, "e": ""}, {"id": "R0401P4013", "term": "R0401", "q": "離陸の最低気象条件について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）単発機の場合及び離陸の代替飛行場を設定しない多発機において、利用できる進入方式がCAT-Ⅰ精密進入の場合にあっては、非精密進入のMDHに等しい雲高（100ft単位に切り上げ）及び最低気象条件の値に等しい地上視程を適用する。\n（ｂ）単発機の場合及び離陸の代替飛行場を設定しない多発機において、利用できる進入方式が非精密進入の場合にあっては、非精密進入のMDHに200ftを加えた雲高（100ft単位に切り上げ）及び最低気象条件に対して1,000mを加えた地上視程を適用する。\n（ｃ）単発機の場合及び離陸の代替飛行場を設定しない多発機において、利用できる進入方式が周回進入の場合にあっては、周回進入のMDHに等しい雲高（100ft単位に切り上げ）及び最低気象条件の値に等しい地上視程を適用する。\n（ｄ）RVRが利用できない場合にあっては、地上視程通報値をCMVに変換することができる。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": "解説：AIM-J 304. ★第18項 404.b\n(b)(c) ○の2つ\n(a) × 双発機は2時間、3発以上の航空機は3時間→双発機は1時間、3発以上の航空機は2時間\n(d) × 代替飛行場名とZZZZ（離陸からの所要時間）→代替飛行場名または位置"}, {"id": "R0401P4014", "term": "R0401", "q": "航空路及び経路について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）計器飛行方式により飛行する航空機はやむを得ない場合を除き、航空路の中心線上を飛行しなければならない。\n（ｂ）計器飛行方式による飛行において悪天候を回避するために飛行経路を逸脱する必要がある場合は、管制承認を要求し承認を得なければならない。\n（ｃ）VORを使用した国内航空路においては、中心線の両側にそれぞれ最小４マイル幅の一次区域とその外側に最小４マイル幅の二次区域を有している。\n（ｄ）直行経路とはSIDの最終フィックスと航空路を結ぶ経路のことである。", "c": ["１", "２", "３", "４", "なし"], "a": 3, "e": "解説：AIM-J 501. ATSルート\n(a)(b)(c) ○の3つ\n(d) × 直行経路：航法無線施設を利用して比較的短距離の直行飛行を行うときの飛行経路であって航空路、洋上転移経路およびRNAV経路以外のものであり、AIPに公示されている。 P1-12, AIM-J 501.f)"}, {"id": "R0401P4015", "term": "R0401", "q": "計器飛行方式で飛行中に通信機が故障した場合の飛行方法について誤りはどれか。", "c": ["有視界気象状態にある場合は、これを維持して安全に着陸できると思われる最寄りの飛行場に着陸する。", "計器気象状態にある場合は、承認された経路に従って目的地上空（目的飛行場の 上空又は計器進入方式の開始点として特定の航空保安無線施設若しくはフィックスがある場合はその上空）まで飛行を継続する。", "計器気象状態にある場合であって、故障前に進入許可を受けているときは、進入は行わず離陸時刻に飛行計画書の所要時間を加えた時刻に降下を開始する。", "計器気象状態にある場合で、待機指示と進入開始予定時刻を受領している場合は指示に従って待機した後、進入開始予定時刻に降下を開始する。"], "a": 3, "e": "解説：航空法施行規則 第206条【通信機の故障の場合の飛行】AIM-J 781.\n(a)(c)(d) ○の3つ\n(3) × 故障前に進入許可を受けていても安全のため進入は行わず→故障前に進入許可を受けていれば、進入は行い離陸時刻に飛行計画書の所要時間を加えた時刻に進入を開始する。"}, {"id": "R0401P4016", "term": "R0401", "q": "次の飛行場灯火と説明の組み合わせで誤りはどれか。", "c": ["REDL:　 離陸し、又は着陸しようとする航空機に滑走路の末端を示すために滑走路の両末端に設置する灯火で非常用滑走路灯以外のもの", "RCLL:　 離陸し、又は着陸しようとする航空機に滑走路の中心線を示すためにその中心線に設置する灯火", "CGL:　 滞空旋回中の航空機に滑走路の位置を示すために滑走路の外側に設置する灯火で滑走路の外側上方に灯光を発するもの", "AGL:　 離陸した航空機にその離陸後の飛行の経路を、又は着陸しようとする航空機にその最終進入の経路に至るまでの進入の経路を示すために設置する灯火"], "a": 1, "e": ""}, {"id": "R0401P4017", "term": "R0401", "q": "操縦士は、進入限界高度において適切な目視物標を少なくとも1つ視認し、継続的に識別の維持が可能である場合のみ、進入限界高度未満へ着陸のための進入を行うことができる。非精密進入、ILS（CAT-Ⅰ）及びPAR進入における適切な目視物標について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）滑走路進入端\n（ｂ）滑走路末端識別灯\n（ｃ）進入角指示灯\n（ｄ）接地帯灯", "c": ["１", "２", "３", "４", "なし"], "a": 4, "e": "解説：AIP 6.10. 最低気象条件等に係る一般適用事項 6.10.、最低気象条件 6.10.1.1、絶則2）操縦士は、進入限界高度(DA/H又はMDA/H)において適切な目視物標を少なくとも1つ視認し、継続的に識別の維持が可能である場合のみ、進入限界高度未満へ着陸のための進入を行うことができる。\ni) 進入灯の一部\nii) 滑走路進入端\niii) 滑走路進入端標識\niv) 滑走路末端灯\nv) 滑走路末端識別灯\nvi) 進入角指示灯\nvii) 接地帯または接地帯標識\nviii) 接地帯灯\nix) 滑走路灯\nx) 滑走路と同時昼用として直線進入用進入路指示灯\nxi) 指示標識"}, {"id": "R0401P4018", "term": "R0401", "q": "目視降下点について正しいものはどれか。", "c": ["視認進入（ビジュアルアプローチ）において飛行場を視認した後、着陸のための降下が可能になる位置をいう。", "PAR進入を行う場合において、適切な目視物標を視認できたときに、決心高度以下に降下を開始する位置をいう。", "直線進入から引き続き行われる周回進入において、最終進入経路から周回経路へ移行を開始する位置であり、航空機の区分ごとに滑走路の末端からの距離で\n設定される。", "非精密進入により直線進入を通常降下により行う場合において、進入灯又は滑走路末端（滑走路進入端）を識別できる視覚援助施設を視認できたときに、最低降下高度以下に降下を開始する位置をいう。"], "a": 4, "e": "解説：AIM-J 634.a.d\n(a)(c)(d) ○の3つ\n(b) × （飛行方式設定基準 I-4-5-14）"}, {"id": "R0401P4019", "term": "R0401", "q": "乱気流に遭遇した場合の対処法について（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）「FLY ATTITUDE」が大切であり、エンジン出力と機首姿勢（ピッチ）の修正は最小限にとどめる。\n（ｂ）航法計器の監視とエンジン計器のチェックを行う。\n（ｃ）雲の観察、気象レーダー、外気温度、他機からの情報などにより、大気の状態を把握し乱気流空域の広がりや規模を考えて、必要なら離脱方法を検討する。\n（ｄ）強度にかかわらず、航空機の運航に影響すると判断した場合は、できるだけ早く管制機関等に通報する。", "c": ["１", "２", "３", "４", "なし"], "a": 4, "e": "解説：AIM-J 834\n4つすべて正しい。"}, {"id": "R0401P4020", "term": "R0401", "q": "飛行中の錯覚について誤りはどれか。", "c": ["傾いた雲の稜線、不明瞭な水平線、地上の灯火と星の光とが入り混じった暗闇、地上灯火のある種の幾何学的な配列などによって、飛行機の姿勢が実際の水平線に 正しくアラインしていないように錯覚しがちである。", "上昇から水平直線飛行に急激に移行すると、パイロットは前方に傾くような錯覚を生じる。そのために急激に機首を引き上げようとし、錯覚がさらに増幅され易くなる。", "暗闇の中で静止している灯光を何十秒間も見つめていると、その灯光が動きまわるような錯覚に陥り、パイロットがその灯光の見せかけの動きにだまされて飛行機の制御を失うことがある。", "飛行中に遭遇する各種の複雑な運動と外力及び外景の視認などによって、運動と位置の錯覚を生ずることがある。これらの錯覚に基づく空間識失調は、信頼できる地上の固定物標又は飛行計器を確実に視認することにより防止できる。"], "a": 2, "e": "解説：AIM-J 965.\n(2) × 低い→高い → 実際の高度よりも高く"}, {"id": "R0403P4007", "term": "R0403", "q": "計器飛行を行う航空機乗組員に求められる最近の飛行経験について正しいものはどれか。", "c": ["操縦する日からさかのぼって半年までの間に３時間以上の計器飛行（模擬計器飛行を含む。）", "操縦する日からさかのぼって180日までの間に６時間以上の計器飛行（模擬計器飛行を含む。）", "操縦する日からさかのぼって半年までの間に３時間以上の計器航法による飛行", "操縦する日からさかのぼって180日までの間に６時間以上の計器航法による飛行"], "a": 2, "e": "解説：AIM-J 1018.d. 航空法施行規則 第161条"}, {"id": "R0403P4008", "term": "R0403", "q": "次の飛行場灯火と説明の組み合わせで誤りはどれか。", "c": ["ABN: 航行中の航空機に空港等の位置を示すために空港等又はその周辺の地域に設置する灯火で補助飛行場灯台以外のもの", "ALB: 着陸しようとする航空機に進入区域内の要点を示すために設置する灯火で進入灯以外のもの", "ALS: 着陸しようとする航空機にその最終進入の経路を示すために進入区域内及び着陸帯内に設置する灯火", "REDL: 離陸し、又は着陸しようとする航空機に滑走路の末端を示すために滑走路の両末端に設置する灯火で非常用滑走路灯以外のもの"], "a": 4, "e": "解説：AIM-J 154.\nREDL(Runway Edge Light)滑走路灯は、離陸しまたは着陸しようとする航空機に滑走路を示すための灯火。\nRTHL：滑走路末端灯。(4)はRTHL (Runway Threshold Lights)の説明"}, {"id": "R0403P4009", "term": "R0403", "q": "法に定める計器飛行等を行う航空機に装備しなければならない装置について\n（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）ジャイロ式姿勢指示器\n（ｂ）マグネティックコンパス\n（ｃ）精密高度計\n（ｄ）機内用温度計", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": ""}, {"id": "R0403P4010", "term": "R0403", "q": "ブロックアルティチュードの説明について正しいものはどれか。", "c": ["気圧が標準大気圧以下になってもQNHで飛行している航空機との必要な垂直間隔を維持するために最低利用可能フライトレベルを下回るフライトレベルをブロックすること", "乱気流や編隊飛行等の理由により、２つ（またはそれ以上）のIFR高度の空間を占有して飛行するために複数にわたる高度間を同時使用すること", "計器進入において各ブロックに応じてステップダウンフィックスと高度が指定され、各フィックスで指定されている高度まで階段状に降下すること", "自衛隊高高度訓練空域／試験空域が存在し、その空域内で通過が制限される高度帯のこと"], "a": 2, "e": "解説：AIM-J 962.【高高度の影響】\n(3) × 30～40分→5～12分"}, {"id": "R0403P4011", "term": "R0403", "q": "計器飛行証明を受けていなければ行ってはならない飛行方法について（ａ）～（ｄ）のうち、該当するものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）有視界気象状態のもと航空機の位置および針路の測定を計器のみに依存して行う飛行で国土交通省令で定める距離又は時間を超えて行うもの\n（ｂ）計器気象状態のもと国土交通大臣の許可を受けて行う特別有視界飛行方式による飛行\n（ｃ）雲中において航空機の姿勢、高度、位置および針路の測定を計器のみに依存して行う飛行\n（ｄ）有視界気象状態のもと管制圏、管制区内を国土交通大臣が定める経路又は国土交通大臣が与える指示による経路により、かつその他の飛行の方法について国土交通大臣の指示に常時従って行う飛行", "c": ["１", "２", "３", "４", "なし"], "a": 3, "e": ""}, {"id": "R0403P4012", "term": "R0403", "q": "管制用語の意味として正しいものはどれか。", "c": ["HOLD ON THE GROUND\t：グランドの周波数への変更は、指示があるまで待機してください。", "DESCEND AT PILOT'S DISCRETION\t：パイロットの判断で降下してください。", "CLEARED FOR APPROACH\t：着陸を許可します。", "EDCT AT [１３：００]\t：降下の指示は[１３：００]に出す予定です。"], "a": 2, "e": "解説：AIM-J 562. 降下クリアランスに\"AT PILOT'S DISCRETION\"の用語が付された場合は、降下を開始する時期がパイロットの判断に任される。そして降下を開始した後も一時的な水平飛行を含む降下率の調整を通脱なくて行うことができる。ただし一度通過した高度に再び上昇してはいけない。"}, {"id": "R0403P4013", "term": "R0403", "q": "通信機が故障した場合の飛行方法について、計器気象状態においてレーダー誘導指示を受けている場合の対処で誤りはどれか。", "c": ["誘導開始の際、誘導目標としてフィックスが指示された場合は当該フィックスに直行する。", "誘導開始の際、誘導目標として航空路、経路等が指示された場合は当該経路にある目的地に向かって最寄りのフィックスに直行する。", "誘導目標の指示がない場合は、誘導開始前において最後に承認された経路にある目的地に向かって最寄りのフィックスに直行する。", "フィックスに直行する際は、制限空域等を回避せず最短の経路を飛行すること。"], "a": 4, "e": "解説：AIM-J 781.\n(4) × 制限空域等を回避せず最短の経路を飛行すること → 制限空域に入ってはならない"}, {"id": "R0403P4014", "term": "R0403", "q": "計器飛行方式における位置通報について（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）AIPチャートの▲で示された地点は非義務位置通報点である。\n（ｂ）レーダー管制業務を受けている場合は、特に指示されない限り位置通報を行う必要はない。\n（ｃ）位置通報はACCまたはATMCに対して行うか、直接交信できなければ最寄りのレディオかタワーなどを通じて行う。\n（ｄ）国内を飛行する場合の位置通報は、コールサイン、位置通報点名、速度、残存燃料、次の予定位置通報点及び予定通過時刻の順に行う。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": "解説：AIM-J 552.a, 550, 551, 553.a.\n(b)(c) ○の2つ\n(a) × 非義務位置通報点→義務位置通報点\n(d) × 速度、残存燃料は通報不要"}, {"id": "R0403P4015", "term": "R0403", "q": "CMV（地上視程換算値）への変換が適用できる最低気象条件について（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）離陸\n（ｂ）CAT-Ⅰ精密進入\n（ｃ）周回進入を除く非精密進入\n（ｄ）代替飛行場", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": "解説：AIM-J 642.\nCMVは、離陸、周回進入（航空機区分B以下の場合に限る）、代替飛行場には適用されない。"}, {"id": "R0403P4016", "term": "R0403", "q": "下表に示すアプローチチャート（VORを使用する非精密進入方式）の断面図例から読取れる情報について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n\n\n\n\n\n\n\n\n\n\n\n（ａ）基礎旋回はPPEから11.0DMEまでに終了しなければならない。\n（ｂ）基礎旋回終了時までに1,900 ftに降下するよう指定高度が設定されている。\n（ｃ）最終進入フィックスまでのOCAは1,700 ftである。\n（ｄ）最終進入フィックスから滑走路末端上50 ftまでの降下角は、PAPIの公示角と同じく3.2°である。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": "解説：AIM-J 第6章 P6-3 アプローチチャート記載例\n(c) の1つ\n(a) × 4,000→5,000\n(d) × 通常PAPI の角度は3.0°で設定されています。図ではパスが3.2°となっており、MISSED APPROACHの手順下部に「PAPI and descent angles are not coincident.」の表記があり同じではない。（例：RJFU VOR RWY 32）"}, {"id": "R0403P4017", "term": "R0403", "q": "レーダー誘導について誤りはどれか。", "c": ["旋回方向の指示がない場合は指示されたヘディングに近い方向へ旋回する。", "レーダー誘導はヘディングの指示によって開始され、指示されるヘディングは常に磁方位である。", "レーダー誘導は、原則として MEA 以上の高度で行われる。", "管制機関は当該機の現針路が不明で、かつ、それを確認する余裕がない場合、旋回の度数及び旋回方向を指定する。"], "a": 3, "e": "解説：AIM-J 450.\n(1)(2)(4) ○の3つ\n(3) × MEA→MVA(minimum vectoring altitude)"}, {"id": "R0403P4018", "term": "R0403", "q": "空港等付近の航行方法についての記述（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）計器飛行方式による進入の方式その他当該空港等について定められた飛行の方式に従うこと。\n（ｂ）計器飛行方式により離陸しようとする場合であって、空港等における気象状態が離陸することができる最低の気象条件未満であるときは、離陸しないこと。\n（ｃ）計器飛行方式により着陸しようとする場合であって、進入限界高度よりも高い高度の特定の地点を通過する時点において空港等における気象状態が当該空港等への着陸のための進入を継続することができる最低の気象条件未満であるときは、着陸のための進入を継続しないこと。\n（ｄ）計器飛行方式により着陸しようとする場合であって、進入限界高度以下の高度において目視物標を引き続き視認かつ識別することによる当該航空機の位置の確認ができなくなったときは、着陸のための進入を継続しないこと。", "c": ["１", "２", "３", "４", "なし"], "a": 4, "e": ""}, {"id": "R0403P4019", "term": "R0403", "q": "強い着氷に遭遇した場合の注意事項で誤りはどれか。", "c": ["着氷はまず風防やエンジン空気取入口から始まるので、風防の状態によく気を付ける。", "ピトー管や静圧孔への着氷によりIASがおかしくなってきたら、なるべく一定の飛行姿勢を維持し減速を行う。", "非常に激しい着氷のおきる気層の厚さは200～500フィート程度が普通であるから、高度の変更が有効である。", "強い着氷状態ではオートパイロットを使用せずに、操縦系統が凍結しないように常時動かしておく方がよい。"], "a": 2, "e": "解説：AIM-J 856. C. (1) × 舵の効きを良くするため増速する→少し減速する"}, {"id": "R0403P4020", "term": "R0403", "q": "低酸素症に関する記述で正しいものはどれか。", "c": ["低酸素症の兆候が現れたら、呼吸の速さと深さを自分で意識的に調整していれば通常は２～３分で治まる。鼻から息を吸い込み、唇を強めに締めて口からできるだけ時間をかけて吐き出す腹式呼吸が効果的である。", "低酸素症は血液の酸素運搬能力が大きく関係するため、通常、飲酒や服薬、体調並びに精神状態の影響は受けにくい。", "大気中に酸素の占める割合は、地上からはるか上空に至るまで一定であるため、飛行高度の増大に対応して低酸素症の傾向も増大する。", "低酸素症の兆候は個人差が大きく、通常それらがゆっくり進行するときはその影響を自ら認識することは容易である。"], "a": 3, "e": "解説：AIM-J 962.\n(1) × 10,000→5,000\n(2) × 18,000→12,000\n(3) × 40分から50分 → 5～12分"}, {"id": "R0405P4007", "term": "R0405", "q": "最低利用可能フライトレベルが155になる場合のQNHはどれか。", "c": ["29.45 inHg", "28.97 inHg", "28.82 inHg", "28.39 inHg"], "a": 3, "e": "解説：AIP ENR 1.7 高度計規正方式 2. 高度計規正方式の基本 福岡FIR内を飛行する航空機の高度又はフライトレベルは下記の方式により維持するものとする。\n2.1一般方式 平均海面上14,000ft(FL140)以上→標準気圧値29.92インチ(1013.2ヘクトパスカル)により規正する。\n0.1インチHgの変化が100フィートに相当するため、0.5インチHgの変化は、高度に換算すると約500フィートになる。0.1インチHg ≒ 100フィート0.5インチHg ≒ 500フィート\nAIM-J 522.a.\n29.92以上 140\n29.91～29.42 145\n29.41～28.92 150\n28.91～28.42 155\n28.41～27.92 160"}, {"id": "R0405P4008", "term": "R0405", "q": "ATSルートについて（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）国内航空路は航空法施行規則により指定されている。\n（ｂ）RNAV経路以外の航空路であってVORによって構成される航空路で国内（内陸）航空路の保護空域は中心線の両側に最小４nm幅の一次空域とその外側に最小 ４nm幅の二次空域を有する。\n（ｃ）航空路は各区間でMEAが設定され航法無線施設で構成される経路にあっては常に MRAと等しい高度で設定されている。\n（ｄ）突発的な事故や悪天候により空港の処理容量が低下した場合にエンルートでの待機を行うために進入管制区外にエンルート待機経路が設定されている。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": ""}, {"id": "R0405P4009", "term": "R0405", "q": "航空情報用略語と意義の組み合わせで誤りはどれか。", "c": ["MHA: 最低待機高度", "MCA: 最低通過高度", "MSL: 最低扇形別高度", "MOC: 最低必要障害物間隔"], "a": 3, "e": ""}, {"id": "R0405P4010", "term": "R0405", "q": "計器飛行方式で出発し、香川 VOR（KTE）から有視界飛行方式に変更して真対気速度160 ktで飛行する場合、飛行計画書の第15項「経路」について、香川 VOR以降の記入例として適切なものはどれか。", "c": ["KTE / N0160VFR VFR", "KTE / N0160 IFR\tVFR", "KTE / IFR N0160VFR", "KTE / IFR N0160VFR VFR"], "a": 1, "e": "解説：AIM-J 304. 第15項\n（参考）VFRからIFRに切り替える場合は「地点/KTEN160A090 IFR」"}, {"id": "R0405P4011", "term": "R0405", "q": "下表に示すアプローチチャート（ILSを使用する進入方式）の断面図例から読取れる情報について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n\n\n\n\n\n\n\n\n（ａ）グライドパス角は3.0°に設定されている。\n（ｂ）ローカライザー進入の場合、FAF通過高度は2541 ftに指定されている。\n（ｃ）進入復行開始時の許容損失高度は54 ftである。\n（ｄ）進入復行はFAFからの時間経過により行うこともできるように設定されている。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": "解説：AIM-J P6-3, P6-18 表6-7\n(d)(e) ○の2つ\n(a) × 接地点→THR = Threshold elevation\n(b) × 900→1,000\n(c) × 同一である→一同一ではない"}, {"id": "R0405P4012", "term": "R0405", "q": "ILSについて誤りはどれか。", "c": ["地上施設は基本的にローカライザーおよびグライドスロープの２つの無指向性電波を発射する送信装置とDMEにより構成されている。", "ILS進入の運用にあたっては、視覚情報施設として進入灯、接地帯灯、滑走路灯、滑走路中心線灯等が設置されている。", "ILSの識別符号はモールス信号で、I（･ ･）で始まる３文字から成りローカライザー周波数により発信されている。", "ローカライザー信号のコース幅は滑走路進入端で約210 m（700 ft）になるように調整されているので、滑走路の長さによって異なる。"], "a": 1, "e": "解説：AIM-J 131.\n(1) × 無指向性→指向性\n(2) (3) (4) ○\n(4) ローカライザー信号のコース幅は滑走路進入端で約210 m (700ft) になるように調整されているので、滑走路の長さによって異なる。"}, {"id": "R0405P4013", "term": "R0405", "q": "レーダー管制下における速度調整について（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）指定された速度に対し、±10 ktの誤差は認められている。\n（ｂ）待機が指示された場合、速度調整は自動的に終了する。\n（ｃ）減速の要求と降下の指示が同時に発出される場合、どちらの操作を先に行うか指示される。\n（ｄ）速度調整を受けたまま他の管制機関にレーダーハンドオフされた場合、前に指定されていた速度調整は移管後も有効である。", "c": ["１", "２", "３", "４", "なし"], "a": 4, "e": ""}, {"id": "R0405P4014", "term": "R0405", "q": "最終進入経路について誤りはどれか。", "c": ["基礎旋回もしくは方式旋回の終了点から進入復行点（MAPｔ）に至る部分。", "FAFから進入復行点（MAPｔ）に至る部分。", "VOR進入ではFAPから進入復行点（MAPｔ）に至る部分。", "計器進入方式はすべて最終進入のセグメントを有している。"], "a": 3, "e": ""}, {"id": "R0405P4015", "term": "R0405", "q": "ホールディングについて（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）14,000 ftを超える高度でのアウトバゥンドレグ飛行時間は２分である。\n（ｂ）14,000 ft以下の高度でのアウトバゥンドレグ飛行時間は１分である。\n（ｃ）スタンダードパターンでの旋回方向は右回りである。\n（ｄ）最低待機高度（MHA）は待機区域内の地上障害物から最小984 ftの垂直間隔を確保し、さらに待機区域周辺5 nmの緩衝区域内の障害物に対する間隔も考慮されている。", "c": ["１", "２", "３", "４", "なし"], "a": 3, "e": ""}, {"id": "R0405P4016", "term": "R0405", "q": "次の飛行場灯火に係る略語とその説明の組み合わせで誤りはどれか。", "c": ["ALS: 着陸しようとする航空機にその最終進入の経路を示す灯火である。", "PAPI: 着陸しようとする航空機にその着陸の進入角の良否を示す灯火である。", "RTHL: 滑走路を走行中の航空機に滑走路の先方の末端からの距離を示す灯火である。", "RCLL: 離陸し、または着陸しようとする航空機に滑走路の中心線を示す灯火である。"], "a": 3, "e": ""}, {"id": "R0405P4017", "term": "R0405", "q": "レーダー誘導について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）レーダー誘導はヘディングの指示によって開始され、指示されるヘディングは常に磁方位である。\n（ｂ）旋回方向の指示がない場合は指示されたヘディングに近い方向へ旋回する。\n（ｃ）管制機関は当該機の現針路が不明で、かつ、それを確認する余裕がない場合、旋回の度数及び旋回方向を指定する。\n（ｄ）レーダー誘導は、原則として MEA 以下の高度で行われる。", "c": ["１", "２", "３", "４", "なし"], "a": 3, "e": ""}, {"id": "R0405P4018", "term": "R0405", "q": "CMV（地上視程換算値）への変換が適用できる最低気象条件はどれか。", "c": ["多発機であって離陸の代替飛行場を指定した場合の離陸", "周回進入（航空機区分B以下の場合に限る）", "単発機によるCAT-Ⅰ精密進入", "目的地の代替飛行場"], "a": 3, "e": "解説：AIM-J 304. ★第18項 404.b\n(b)(c) ○の2つ\n(a) × 双発機は2時間、3発以上の航空機は3時間→双発機は1時間、3発以上の航空機は2時間\n(d) × 代替飛行場名とZZZZ（離陸からの所要時間）→代替飛行場名または位置"}, {"id": "R0405P4019", "term": "R0405", "q": "計器飛行方式で飛行中に通信機が故障した場合の飛行方法について誤りはどれか。", "c": ["有視界気象状態にある場合は、これを維持して安全に着陸できる最寄りの空港等に着陸する。", "計器気象状態にある場合は、承認された経路に従って目的地上空（目的飛行場の 上空又は計器進入方式の開始点として特定の航空保安無線施設若しくはフィックスがある場合はその上空）まで飛行を継続する。", "計器気象状態にある場合であって、故障前に進入許可を受けているときは、進入は行わず離陸時刻に飛行計画書の所要時間を加えた時刻に降下を開始する。", "計器気象状態にある場合で、待機指示と進入予定時刻を受領している場合は指示に従って待機した後、進入予定時刻に降下を開始する。"], "a": 3, "e": "解説：航空法施行規則 第206条【通信機の故障の場合の飛行】AIM-J 781.\n(a)(c)(d) ○の3つ\n(3) × 故障前に進入許可を受けていても安全のため進入は行わず→故障前に進入許可を受けていれば、進入は行い離陸時刻に飛行計画書の所要時間を加えた時刻に進入を開始する。"}, {"id": "R0405P4020", "term": "R0405", "q": "飛行中の錯覚について誤りはどれか。", "c": ["傾いた雲の稜線、不明瞭な水平線、地上の灯火と星の光とが入り混じった暗闇、地上灯火のある種の幾何学的な配列などによって、飛行機の姿勢が実際の水平線に 正しくアラインしていないように錯覚しがちである。", "地上物標のない場所、たとえば水面、暗い地域又は積雪に覆われた地形ではパイロットは実際の高度よりも低く飛んでいるように錯覚しがちである。", "暗闇の中で静止している灯光を何十秒間も見つめていると、その灯光が動きまわ るような錯覚に捉われ、パイロットがその灯光の見せかけの動きにだまされて飛行機の制御を失うことがある。", "飛行中に遭遇する各種の複雑な運動と外力及び外景の視認などによって、運動と位置の錯覚を生ずることがある。これらの錯覚に基づく空間識失調は、信頼できる地上の固定物標又は飛行計器を確実に視認することにより防止できる。"], "a": 2, "e": "解説：AIM-J 965.\n(2) × 低い→高い → 実際の高度よりも高く"}, {"id": "R0407P4007", "term": "R0407", "q": "航空情報用略語と意義の組み合わせで誤りはどれか。", "c": ["ARSR : 航空路監視レーダー", "ASR: 空港監視レーダー", "WXR: 空港面探知レーダー", "ORSR : 洋上航空路監視レーダー"], "a": 3, "e": "解説：AIM-J 第11章 航空情報用略語表\n空港面探知レーダー：ASDE (Airport surface detection equipment)"}, {"id": "R0407P4008", "term": "R0407", "q": "METARに使用される記号と意味の組み合わせで誤りはどれか。", "c": ["VCVA:　\t飛行場周辺の火山灰", "SHRA:　\tしゅう雨性の雨", "DRSA:　\t低い風じん", "FZDZ:　\t強い霧雨"], "a": 4, "e": "解説：AIM-J 811.\n(1) × もや→霧"}, {"id": "R0407P4009", "term": "R0407", "q": "航空法について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）計器気象状態とは、視程及び雲の状況を考慮して国土交通省令で定める視界上不良な気象状態をいう。\n（ｂ）計器飛行とは、航空機の姿勢、高度、速度及び距離の測定を計器にのみ依存して行う飛行をいう。\n（ｃ）航空機は、計器飛行方式により、航空交通管制圏若しくは航空交通情報圏に係る空港等から出発し、又は航空交通管制区、航空交通管制圏若しくは航空交通情報圏を飛行しようとするときは、国土交通省令で定めるところにより国土交通大臣に飛行計画を通報し、その承認を受けなければならない。\n（ｄ）航空機は、航空交通管制区若しくは航空交通管制圏のうち国土交通大臣が告示で指定する空域又は国土交通省令で定める高さ以上の空域においては、計器飛行方式により飛行してはならない。ただし、国土交通大臣の許可を受けた場合は、この限りでない。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": "解説：航空法93条\n(b)(c)(d) ○の3つ\n(a) × 計器飛行方式→計器飛行又は計器航法"}, {"id": "R0407P4010", "term": "R0407", "q": "レーダー管制下における速度調整について（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）速度調整では、特定速度への減速／増速あるいは特定速度の維持を指示される。\n（ｂ）速度調整を受けた場合は、指定された速度の±10 ktの範囲内で操縦士の任意の速度を維持して飛行すべきである。\n（ｃ）速度調整は各管制機関で指示されるため、他管制機関にレーダーハンドオフされた場合は、前に指定された速度調整は無効となる。\n（ｄ）減速と降下の指示が同時に発出される場合は、どちらの操作を先に行うべきか指示される。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": "b/dが正"}, {"id": "R0407P4011", "term": "R0407", "q": "管制機関より「CLEARANCE VOID IF NOT OFF THE GROUND BY 01:00」と\n通報を受けた場合で正しいものはどれか。", "c": ["01:00までは地上におけるすべての管制許可は発出されない。", "01:00までにグランドと通信できれば、この管制承認は有効となる。", "01:00までに離陸しないときは、この管制承認は無効となる。", "出発制限を01:00に解除する。"], "a": 3, "e": "解説：AIM-J 第12章 主な管制用語と略語として使われることがある。"}, {"id": "R0407P4012", "term": "R0407", "q": "下表に示すアプローチチャートに記載される最低気象条件及び進入限界高度の例から読み取れる情報について（ａ）～（ｅ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n\n\n\n\n\n\n\n（ａ）飛行場標点の標高は、586 ftである。\n（ｂ）決心高度は、600 ftである。\n（ｃ）LOC単独進入（直線進入）の最低気象条件の値は、すべての航空機区分同一であり雲高は700 ftである。\n（ｄ）CIRCLINGによる着陸のための最低気象条件は地上視程が適用される。\n（ｅ）周回進入は北側に限定する。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": "解説：AIM-J 第6章 P6-3 アプローチチャート記載例\n(c) の1つ\n(a) × 接地点→THR = Threshold elevation\n(b) × 900→1,000\n(c) × 同一→であるが一同一ではない"}, {"id": "R0407P4013", "term": "R0407", "q": "ATSルートについて（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）国内航空路は航空法施行規則により指定されている。\n（ｂ）RNAV経路以外の航空路であってVORによって構成される航空路で国内（内陸）航空路の保護空域は中心線の両側に最小４マイル幅の一次空域とその外側に最小 ４マイル幅の二次空域を有する。\n（ｃ）航空路は各区間でMEAが設定され航法無線施設で構成される経路にあっては常にMRAと等しい高度で設定されている。\n（ｄ）突発的な事故や悪天候により空港の処理容量が低下した場合にエンルートでの待機を行うために進入管制区外にエンルート待機経路が設定されている。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": ""}, {"id": "R0407P4014", "term": "R0407", "q": "計器進入について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）精密進入とは最終進入を水平方向のみの航法情報によって行う計器進入である。\n（ｂ）非精密進入の最終進入における最低高度を最低降下高度といい、MDAと表記される。\n（ｃ）直線進入に限り、最終進入の途中にフィックスを設け、階段状に降下することに よって低い最低降下高度を設定できる場合に、ステップダウンフィックスが設けられることがある。\n（ｄ）ローカライザー単独進入とは、ローカライザーとアウターマーカー等の位置情報を使用して行う計器進入であり、非精密進入である。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": ""}, {"id": "R0407P4015", "term": "R0407", "q": "無線航法援助施設について誤りはどれか。", "c": ["VORTACとは、VORとTACANの２つの施設により構成されている施設である。", "VORの作動原理は、まず航空機のVOR機器から特定の質問信号が発射され、これを受信した地上施設が応答信号を送り返し、航空機のVOR機器がこれを受信し地上施設への方位を表示するものである。", "VORTACの識別符号はアルファベット3文字であり原則として末尾にCを用いる。", "TACANはUHF帯の周波数を使用しており、機上DME装置によってDME局として利用することができる。"], "a": 2, "e": "解説：AIM-J 112. 機上のVOR受信機は、VOR電波を受信してVOR局への方位を針路盤上に示したり、CI (Course Indicator) またはCDI (Course Deviation Indicator) によって設定コースとの関係位置を示すことができる。"}, {"id": "R0407P4016", "term": "R0407", "q": "計器飛行方式で飛行中に通信機が故障した場合の飛行方法について誤りはどれか。", "c": ["最寄りの管制機関又は対空援助業務実施機関と通信設定を行う。", "有視界気象状態にある場合は、これを維持して安全に着陸できると思われる最寄りの空港等に着陸する。", "計器気象状態にある場合であって、故障前に進入許可を受けているときは、 離陸時刻に飛行計画書の所要時間を加えた時刻まで待機し、降下を開始する。", "計器気象状態にある場合で、待機指示と進入予定時刻を受領している場合は指示に従って待機した後、進入予定時刻に降下を開始する。"], "a": 3, "e": "解説：航空法施行規則 第206条【通信機の故障の場合の飛行】AIM-J 781.\n(a)(c)(d) ○の3つ\n(3) × 故障前に進入許可を受けていても安全のため進入は行わず→故障前に進入許可を受けていれば、進入は行い離陸時刻に飛行計画書の所要時間を加えた時刻に進入を開始する。"}, {"id": "R0407P4017", "term": "R0407", "q": "CMV（地上視程換算値）への変換が適用できる最低気象条件はどれか。", "c": ["単発機によるCAT-Ⅰ精密進入", "進入灯および滑走路灯が運用している場合の離陸", "多発機における目的地の代替飛行場", "周回進入（航空機区分B以下の場合に限る）"], "a": 1, "e": "解説：AIM-J 642.\nCMVは、離陸、周回進入（航空機区分B以下の場合に限る）、代替飛行場には適用されない。"}, {"id": "R0407P4018", "term": "R0407", "q": "計器進入について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n\n（ａ）操縦士は、計器進入開始前において、目的飛行場の気象状態が公示、又は自己の進入を継続することができる最低気象条件を満たさない場合は、管制機関又は飛行場対空援助業務実施機関にその旨通報するとともに、待機又は代替飛行場へのクリアランスを要求しなければならない。\n（ｂ）操縦士は、計器進入方式開始後（最終進入フィックス、アウターマーカー、決心高若しくは最低降下高から1,000 ftの地点、又は特に認められた地点における進入継続の可否判断を行った後）に当該飛行場の気象状態が公示、又は自己の最低気象条件を満たさなくなった場合であっても計器進入を継続することができる。\n（ｃ）操縦士は、最終進入を開始した後MAP（進入復行開始点）に到達するまでに進入 復行を指示された場合、又は気象状態悪化等のため進入継続を中止した場合は、 MAPまで計器飛行方式により飛行した後、公示又は事前に通報された進入復行方式に従って飛行しなければならない。この場合、操縦士は降下を中止して決心高\n若しくは最低降下高度以上での水平飛行又は公示若しくは事前に通報された進入復行方式に規定された高度までの上昇を行うことができる。\n（ｄ）操縦士は、最終進入を開始した後MAPに到達するまでに気象状態悪化等のために進入継続を中止した場合は、その後の飛行（公示又は事前に通報された進入復行方式以外の飛行、待機、代替飛行場への飛行等）につきクリアランスを得てMAPの手前から計器進入経路を離脱することができる。", "c": ["１", "２", "３", "４", "なし"], "a": 3, "e": "bは飛行場標高？"}, {"id": "R0407P4019", "term": "R0407", "q": "非与圧機における高々度飛行の影響について正しいものはどれか。", "c": ["夜間視力の低下が発生し始めるのは機内気圧が10,000 ft以上に相当する高度に達してからである。", "普通の健康なパイロットの場合18,000 ftまでは、低酸素症の影響は表れない。", "20,000 ftでは40～50分で適切な操作を行う能力が失われ、間もなく失神する。", "喫煙は低酸素症の発症高度を下げる。"], "a": 4, "e": "解説：AIM-J 962.\n(1) × 10,000→5,000\n(2) × 18,000→12,000\n(3) × 40分から50分 → 5～12分"}, {"id": "R0407P4020", "term": "R0407", "q": "飛行中の錯覚について誤りはどれか。", "c": ["傾いた雲の稜線、不明瞭な水平線、地上の灯火と星の光とが入り混った暗闇、 地上灯火のある種の幾何学的な配列などによって、飛行機の姿勢が実際の水平線に正しくアラインしていないように錯覚しがちである。", "地上物標のない場所、たとえば水面、暗い地域又は積雪に覆われた地形ではパイロットは実際の高度よりも高く飛んでいるように錯覚しがちである。", "暗闇の中で静止している灯光を何十秒間も見つめていると、その灯光が動きまわるような錯覚に陥り、パイロットがその灯光の見せかけの動きにだまされて飛行機の制御を失うことがある。", "飛行中に遭遇する各種の複雑な運動と外力及び外景の視認などによって、運動と位置の錯覚を生ずることがある。これらの錯覚に基づく空間識失調は、信頼できる地上の固定物標又は飛行計器を確実に視認しても防止することはできない。"], "a": 4, "e": ""}, {"id": "R0409P4007", "term": "R0409", "q": "計器飛行証明が必要な飛行について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）計器飛行\n（ｂ）計器飛行以外の航空機の位置及び針路の測定を計器にのみ依存して行う飛行で国土交通省令で定める距離または時間を越えて行うもの\n（ｃ）有視界気象状態における計器飛行方式による飛行\n（ｄ）計器気象状態における計器飛行方式による飛行", "c": ["１", "２", "３", "４", "なし"], "a": 4, "e": "解説：AIM-J 1007. ○の3つ 【法34条】【規則65条の2】【規則66条】\n(b) × 100kmの距離または20分→110kmの距離または30分"}, {"id": "R0409P4008", "term": "R0409", "q": "ATSルートについて（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）国内航空路は航空法施行規則により指定されている。\n（ｂ）RNAV経路以外の航空路であってVORによって構成される航空路で国内（内陸）航空路の保護空域は中心線の両側に最小４マイル幅の一次空域とその外側に最小 ４マイル幅の二次空域を有する。\n（ｃ）航空路は各区間でMEAが設定され航法無線施設で構成される経路にあっては常に\nMRAと等しい高度で設定されている。\n（ｄ）突発的な事故や悪天候により空港の処理容量が低下した場合にエンルートでの待機を行うために進入管制区外にエンルート待機経路が設定されている。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": ""}, {"id": "R0409P4009", "term": "R0409", "q": "航空情報用略語と意義の組み合わせで誤りはどれか。", "c": ["ARSR : 航空路監視レーダー", "ASR\t: 空港監視レーダー", "ORSR : 洋上航空路監視レーダー", "ASDA : 空港面探知レーダー"], "a": 4, "e": "解説：AIM-J 第11章 航空情報用略語表\n空港面探知レーダー：ASDE (Airport surface detection equipment)"}, {"id": "R0409P4010", "term": "R0409", "q": "計器飛行方式で出発し、香川 VOR（KTE）から有視界飛行方式に変更して真対気速度160ktで飛行する場合、飛行計画書の第15項「経路」について、香川 VOR以降の記入例として適切なものはどれか。", "c": ["KTE / N0160VFR VFR", "KTE / N0160 IFR\tVFR", "KTE / IFR N0160VFR", "KTE / IFR N0160VFR VFR"], "a": 1, "e": "解説：AIM-J 304. 第15項\n（参考）VFRからIFRに切り替える場合は「地点/KTEN160A090 IFR」"}, {"id": "R0409P4011", "term": "R0409", "q": "視認進入について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n \n（ａ）視認進入の許可は、当該管制機関に先行機の視認およびVMCを維持可能な状態を通報すれば発出される。\n（ｂ）視認進入は、地上視程1,500 m以上でかつ雲高の値に飛行場標高を加えた高さが MVAよりも500 ft以上高い場合に実施される。\n（ｃ）パイロットから視認進入を要求しても承認されない場合がある。\n（ｄ）視認進入の許可が発出された後、VMCを維持しての飛行、障害物との衝突防止、視認している先行機との間隔維持および後方乱気流の回避はパイロットの責任である。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": "解説：AIM-J 672.\n(c)(d) ○の2つ\n(a) × パイロット先行機や飛行場の視認が通報された後、管制機関等によりクリアランスが発出される。\n(b) × 操縦士からの要求により→タワー空港の場合、タワー管制官が目視進入のクリアランスを発出することができる。× MVA以上で→MVA + 500ft以上で"}, {"id": "R0409P4012", "term": "R0409", "q": "ILSについて誤りはどれか。", "c": ["地上施設は基本的にローカライザーおよびグライドスロープの２つの無指向性電波を発射する送信装置とDMEにより構成されている。", "ILS進入の運用にあたっては、視覚情報施設として進入灯、接地帯灯、滑走路灯、滑走路中心線灯等が設置されている。", "ILSの識別符号はモールス信号で、I（･ ･）で始まる３文字から成りローカライザー電波により発信されている。", "ローカライザー信号のコース幅は滑走路進入端で約210 m（700 ft）になるように調整されているので、滑走路の長さによって異なる。"], "a": 1, "e": "解説：AIM-J 131.\n(1) × 無指向性→指向性\n(2) (3) (4) ○\n(4) ローカライザー信号のコース幅は滑走路進入端で約210 m (700ft) になるように調整されているので、滑走路の長さによって異なる。"}, {"id": "R0409P4013", "term": "R0409", "q": "レーダー管制下における速度調整について（ａ）～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）指定された速度に対し、±10 ktの誤差は認められている。\n（ｂ）待機が指示された場合、速度調整は自動的に終了する。\n（ｃ）減速の要求と降下の指示が同時に発出される場合、どちらの操作を先に行うか指示される。\n（ｄ）速度調整を受けたまま他の管制機関にレーダーハンドオフされた場合、前に指定されていた速度調整は移管後も有効である。", "c": ["１", "２", "３", "４", "なし"], "a": 4, "e": ""}, {"id": "R0409P4014", "term": "R0409", "q": "最終進入経路について誤りはどれか。", "c": ["基礎旋回もしくは方式旋回の終了点から進入復行点（MAPｔ）に至る部分。", "FAFから進入復行点（MAPｔ）に至る部分。", "VOR進入ではFAPから進入復行点（MAPｔ）に至る部分。", "計器進入方式はすべて最終進入のセグメントを有している。"], "a": 3, "e": "3:VOR→ILS進入では"}, {"id": "R0409P4015", "term": "R0409", "q": "ホールディングについて（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）スタンダードパターンでの旋回方向は左回りである。\n（ｂ）14,000 ft以下の高度でのアウトバゥンドレグ飛行時間は１分である。\n（ｃ）14,000 ftを超える高度でのアウトバゥンドレグ飛行時間は２分である。\n（ｄ）最低待機高度（MHA）は待機区域内の地上障害物から最小984 ftの垂直間隔を確保し、さらに待機区域周辺4 nmの緩衝区域内の障害物に対する間隔も考慮されている。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": ""}, {"id": "R0409P4016", "term": "R0409", "q": "CAT-Ⅰ精密進入方式における最低気象条件を決定するためのファシリティについて、飛行場灯火及び飛行場標識の構成で正しいものはどれか。", "c": ["フル•ファシリティ：\n滑走路中心線標識、720 m以上の進入灯、滑走路灯及び接地帯灯", "インターミディェット•ファシリティ：\n滑走路中心線標識、320 m以上719 ｍ以下の進入灯、滑走路灯及び滑走路末端灯", "ベーシック•ファシリティ：\n滑走路中心線標識、ストップバーが運用されている420 m未満の進入灯、滑走路灯及び滑走路末端灯", "進入灯等なし：ファシリティの要件を満たさない場合"], "a": 4, "e": "解説：AIM-J 152, 157.c.\n(4) × は進入灯ではなく、進入角指示灯 (AGL: approach guidance lights) の説明"}, {"id": "R0409P4017", "term": "R0409", "q": "レーダー誘導について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）レーダー誘導はヘディングの指示によって開始され、指示されるヘディングは常に磁方位である。\n（ｂ）旋回方向の指示がない場合は指示されたヘディングに近い方向へ旋回する。\n（ｃ）管制機関は当該機の現針路が不明で、かつ、それを確認する余裕がない場合、旋回の度数及び旋回方向を指定する。\n（ｄ）レーダー誘導は、原則として MRA 以上の高度で行われる。", "c": ["１", "２", "３", "４", "なし"], "a": 3, "e": ""}, {"id": "R0409P4018", "term": "R0409", "q": "管制機関から通報されるRVR値について正しいものはどれか。", "c": ["地上視程が1,600 ｍ以下またはRVR2,200 m（空港により1,800 m）以下の場合に通報される。", "RVR観測機器が複数設置されている場合は、タッチダウン、ミッドポイント、ストップエンドの順に通報される。", "RVR観測機器が1地点のみに設置されている場合は当該RVR値が通報される。観測機器が欠測の場合は、その旨と地上視程からCMV（地上視程換算値）により換算された値が通報される。", "すでに通報されたRVR値から値が変化した場合には、到着機のみに通報される。"], "a": 2, "e": "解説：AIM-J 265. RVR値の通報\n(2) × センターポイント→ミッドポイント\n(3) × その旨と地上視程からCMV（地上視程換算値）→その旨と地上視程\n(4) × 到着機のみ→出発機と到着機"}, {"id": "R0409P4019", "term": "R0409", "q": "計器飛行方式で飛行中に通信機が故障した場合の飛行方法について誤りはどれか。", "c": ["有視界気象状態にある場合は、これを維持して安全に着陸できると思われる最寄りの飛行場に着陸する。", "計器気象状態にある場合は、承認された経路に従って目的地上空（目的飛行場の 上空又は計器進入方式の開始点として特定の航空保安無線施設若しくはフィックスがある場合はその上空）まで飛行を継続する。", "計器気象状態にある場合であって、故障前に進入許可を受けているときは、進入は行わず離陸時刻に飛行計画書の所要時間を加えた時刻に降下を開始する。", "計器気象状態にある場合で、待機指示と進入予定時刻を受領している場合は指示に従って待機した後、進入予定時刻に降下を開始する。"], "a": 3, "e": "解説：航空法施行規則 第206条【通信機の故障の場合の飛行】AIM-J 781.\n(a)(c)(d) ○の3つ\n(3) × 故障前に進入許可を受けていても安全のため進入は行わず→故障前に進入許可を受けていれば、進入は行い離陸時刻に飛行計画書の所要時間を加えた時刻に進入を開始する。"}, {"id": "R0409P4020", "term": "R0409", "q": "飛行中の錯覚について誤りはどれか。", "c": ["傾いた雲の稜線、不明瞭な水平線、地上の灯火と星の光とが入り混った暗闇、地上灯火のある種の幾何学的な配列などによって、飛行機の姿勢が実際の水平線に正しくアラインしていないように錯覚しがちである。", "地上物標のない場所、たとえば水面、暗い地域又は積雪に覆われた地形ではパイロットは実際の高度よりも低く飛んでいるように錯覚しがちである。", "暗闇の中で静止している灯光を何十秒間も見つめていると、その灯光が動きまわるような錯覚に陥り、パイロットがその灯光の見せかけの動きにだまされて飛行機の制御を失うことがある。", "飛行中に遭遇する各種の複雑な運動と外力及び外景の視認などによって、運動と位置の錯覚を生ずることがある。これらの錯覚に基づく空間識失調は、信頼できる地上の固定物標又は飛行計器を確実に視認することにより防止できる。"], "a": 2, "e": "解説：AIM-J 965.\n(2) × 低い→高い → 実際の高度よりも高く"}, {"id": "R0411P4007", "term": "R0411", "q": "受領したクリアランスが変更される場合に前置される用語で正しいものはどれか。", "c": ["RECLEARANCE", "REVISED CLEARANCE", "AMENDED CLEARANCE", "CHANGED CLEARANCE"], "a": 2, "e": "解説：AIM-J 433.\n(1)(3)(4) × これらの用語は定義されていない。"}, {"id": "R0411P4008", "term": "R0411", "q": "次の飛行場灯火と説明の組み合わせで誤りはどれか。", "c": ["REDL: 離陸し、又は着陸しようとする航空機に滑走路の末端を示すために滑走路の両末端に設置する灯火で非常用滑走路灯以外のもの", "RCLL: 離陸し、又は着陸しようとする航空機に滑走路の中心線を示すためにその中心線に設置する灯火", "CGL: 滞空旋回中の航空機に滑走路の位置を示すために滑走路の外側に設置する灯火で滑走路の外側上方に灯光を発するもの", "AGL: 離陸した航空機にその離陸後の飛行の経路を、又は着陸しようとする航空機にその最終進入の経路に至るまでの進入の経路を示すために設置する灯火"], "a": 1, "e": ""}, {"id": "R0411P4009", "term": "R0411", "q": "出発方式について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）SIDの経路上に「cross[fix]at specified altitude」と記載されている場合、管制機関から当該フィックスの通過高度が指示されるので、そのフィックスを当該高度で通過し、指示がなければ当該フィックスの高度制限はないこととなる。\n（ｂ）SIDの経路上に「cross[fix]at assigned or specified altitude」と記載されている場合、当該フィックスを管制機関から特定の高度が指示されれば当該高度で、指示がなければ維持すべき高度として指定されていた高度で通過しなければなら ない。\n（ｃ）離陸後レーダーコンタクトの後にレーダー誘導が開始された場合は、承認された SIDにかかわらず誘導の指示が優先する。\n（ｄ）SIDが指定されていても、離陸前に離陸後のヘディングが指示された場合においては、離陸後安全な範囲で速やかに指示されたヘディングに旋回する。", "c": ["１", "２", "３", "４", "なし"], "a": 4, "e": "解説：AIM-J 441, 445, 446.\n4つすべて正しい。"}, {"id": "R0411P4010", "term": "R0411", "q": "航空法及び同施行規則について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）航空機は、地上物標を利用してその位置及び針路を知ることができるときは、計器飛行方式による飛行を行ってはならない。\n（ｂ）計器飛行を行う航空機乗組員は、操縦する日からさかのぼって180日までの間に ６時間以上の計器飛行（模擬計器飛行を含む。）を行った経験を有しなければならない。\n（ｃ）計器飛行方式により飛行する航空機は、管制区又は管制圏内の航空路を飛行しようとするときは、やむを得ない場合を除き、当該航空路の中心線上を飛行しなければならない。\n（ｄ）航空機は、計器気象状態においては、航空交通管制区、航空交通管制圏又は航空交通情報圏にあっては計器飛行方式により飛行しなければならず、その他の空域にあっては飛行してはならない。ただし、予測することができない急激な天候の悪化その他のやむを得ない事由がある場合又は国土交通大臣の許可を受けた場合は、この限りでない。", "c": ["１", "２", "３", "４", "なし"], "a": 3, "e": ""}, {"id": "R0411P4011", "term": "R0411", "q": "航空法第60条の規定により計器飛行を行う航空機に装備しなければならない航空機の\n安全を確保するための装置について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n \n（ａ）ジャイロ式方向指示器\n（ｂ）マグネティックコンパス\n（ｃ）精密高度計\n（ｄ）凍結防止装置付失速警報装置", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": "解説：AIM-J 1011.a.i) (a)(c) ○の2つ 【航空法施行規則145条】\n1. ジャイロ式姿勢指示器・・・1\n2. ジャイロ式方向指示器・・・1\n3. ジャイロ式旋回計・・・1\n4. すべり計・・・1\n5. 精密高度計・・・1\n6. 昇降計・・・1\n7. ピトー管凍結防止装置付速度計・・1\n8. 外気温度計・・・1\n9. 秒刻み時計・・・1\n10. 機上DME装置・・・1"}, {"id": "R0411P4012", "term": "R0411", "q": "アルティメタセッティングについて誤りはどれか。", "c": ["出発時には出発地のQNH、出発時のQNHが入手できない場合は出発飛行場の標高をセットする。", "平均海面上14,000 ft未満は最寄りの飛行経路上の地点のQNHをセットする。", "平均海面上14,000 ft以上はQNEをセットする。", "富士山から半径5 nm以内の空域をIFRで飛行する場合の最低利用可能なフライトレベルは180である。"], "a": 4, "e": "解説：AIM-J 520.\n(4) × 180→160 AIP ENR 1.7-2.1"}, {"id": "R0411P4013", "term": "R0411", "q": "FRによる到着で速度調整について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）速度調整を受けたまま、他の管制機関にレーダーハンドオフされた場合、前に指定された速度調整は移管後自動的に終了される。\n（ｂ）ホールディングが指示された場合、それまでの速度調整は引き続き有効である。\n（ｃ）速度調整中に進入許可が発出された場合には、それまでの速度調整は自動的に終了される。\n（ｄ）レーダー進入に際して速度調整が指示されていた場合は、接地点から５ nmの地点または最終降下開始点のうちいずれか接地点から近い方の地点を通過した時点で、速度調整は自動的に終了される。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": ""}, {"id": "R0411P4014", "term": "R0411", "q": "離陸の最低気象条件（飛行方式設定基準）について誤りはどれか。", "c": ["離陸の最低気象条件に、地上視程通報値のCMVへの変換は適用されない。", "通常運航を前提とするものであり、離陸中断及び臨界発動機不作動時の運航を勘案するものではない。", "離陸の代替飛行場を設定しない場合でCAT-Ⅰ精密進入を利用できる場合は、当該飛行場で利用できる非精密進入のMDH（100 フィート単位に繰上げ）に等しい雲高、及び公示された着陸の最低気象条件のRVR値に等しい地上視程が適用される。", "夜間における離陸には、滑走路灯及び滑走路末端灯（滑走路終端を示す赤灯）が運用されていなければならない。"], "a": 3, "e": "解説：AIM-J 304. ★第18項 404.b\n(b)(c) ○の2つ\n(a) × 双発機は2時間、3発以上の航空機は3時間→双発機は1時間、3発以上の航空機は2時間\n(d) × 代替飛行場名とZZZZ（離陸からの所要時間）→代替飛行場名または位置"}, {"id": "R0411P4015", "term": "R0411", "q": "操縦士は、進入限界高度において適切な目視物標を少なくとも1つ視認し、継続的に識別の維持が可能である場合のみ、進入限界高度未満へ着陸のための進入を行うことができる。非精密進入、ILS（CAT-Ⅰ）及びPAR進入における適切な目視物標について（ａ）\n～（ｄ）のうち、正しいものはいくつあるか。（１）～（５）の中から選べ。\n（ａ）進入灯の一部\n（ｂ）指示標識\n（ｃ）進入角指示灯\n（ｄ）滑走路末端識別灯", "c": ["１", "２", "３", "４", "なし"], "a": 4, "e": "解説：AIP 6.10. 最低気象条件等に係る一般適用事項 6.10.、最低気象条件 6.10.1.1、絶則2）操縦士は、進入限界高度(DA/H又はMDA/H)において適切な目視物標を少なくとも1つ視認し、継続的に識別の維持が可能である場合のみ、進入限界高度未満へ着陸のための進入を行うことができる。\ni) 進入灯の一部\nii) 滑走路進入端\niii) 滑走路進入端標識\niv) 滑走路末端灯\nv) 滑走路末端識別灯\nvi) 進入角指示灯\nvii) 接地帯または接地帯標識\nviii) 接地帯灯\nix) 滑走路灯\nx) 滑走路と同時昼用として直線進入用進入路指示灯\nxi) 指示標識"}, {"id": "R0411P4016", "term": "R0411", "q": "下表に示すアプローチチャート（VORを使用する非精密進入方式）の断面図例から読取れる情報について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n\n\n\n\n\n\n\n\n\n（ａ）MISSED APPROACH後は、指示がない場合5,000 ftまで上昇する。\n（ｂ）最終進入フィックスは接地点から5.0 NMの位置にある。\n（ｃ）最終進入フィックスまでのOCHは1,670 ftである。\n（ｄ）最終進入フィックスから滑走路末端上50 ftまでの降下角は、PAPIの公示角と同じく3.2°である。", "c": ["１", "２", "３", "４", "なし"], "a": 1, "e": "解説：AIM-J 第6章 P6-3 アプローチチャート記載例\n(c) の1つ\n(a) × 4,000→5,000\n(d) × 通常PAPI の角度は3.0°で設定されています。図ではパスが3.2°となっており、MISSED APPROACHの手順下部に「PAPI and descent angles are not coincident.」の表記があり同じではない。（例：RJFU VOR RWY 32）"}, {"id": "R0411P4017", "term": "R0411", "q": "CAT-Ⅰ精密進入方式の最低気象条件を決定するためのファシリティについて、飛行場灯火及び飛行場標識の構成で正しいものはどれか。", "c": ["フル\t： 滑走路中心線標識、滑走路灯、滑走路末端灯、720 m未満\nの進入灯", "インターミディェット： 滑走路中心線標識、滑走路灯、滑走路末端灯、420 m以上 719 m以下の滑走路中心線灯", "ベーシック： 滑走路中心線標識、滑走路灯、滑走路末端灯、サイドバレットが運用されている420 m未満の進入灯", "進入灯等なし： ファシリティの要件を満たさない場合"], "a": 4, "e": "解説：AIM-J 152, 157.c.\n(4) × は進入灯ではなく、進入角指示灯 (AGL: approach guidance lights) の説明"}, {"id": "R0411P4018", "term": "R0411", "q": "VOR進入について（ａ）～（ｄ）のうち、正しいものはいくつあるか。\n（１）～（５）の中から選べ。\n（ａ）VOR進入とは最終進入を水平方向のみの航法情報によって行う計器進入である。\n（ｂ）最終進入における最低高度を最低降下高度といいDAと表記される。DAに至った地点を進入復行点として進入復行方式が設定されている。\n（ｃ）最終進入の途中にフィックスを設け、階段状に降下することによって低い最低降下高度を設定できる場合は、ステップダウンフィックスが設けられることがある。\n（ｄ）最終進入経路上には、ストレートインランディングおよび周回進入を行う航空機が接地点に向けて適切な降下を行うために必ずVDPが公示されている。", "c": ["１", "２", "３", "４", "なし"], "a": 2, "e": ""}, {"id": "R0411P4019", "term": "R0411", "q": "着氷に遭遇した場合の注意事項で誤りはどれか。", "c": ["舵面上に微細な氷が付着してコントロールフラッターが発生することがある。その場合、巡航中であれば、操縦桿に小刻みな振動を感じたら少し減速する。", "ピトー管の着氷は注意する必要があるが、静圧孔への着氷は発生しない。", "非常に激しい着氷のおきる気層の厚さは200～500フィート程度が普通であるから、高度の変更が有効である。", "強い着氷状態ではオートパイロットを使用せずに、操縦系統が凍結しないように常時動かしておく方がよい。"], "a": 2, "e": "解説：AIM-J 856. C. (1) × 舵の効きを良くするため増速する→少し減速する"}, {"id": "R0411P4020", "term": "R0411", "q": "低酸素症に関する説明のうち正しいものはどれか。", "c": ["ハイパーベンチレーションと呼ばれ、人間の脳および他の機能に障害をきたす程に体内の酸素が不足する状態をいう。", "大気中に含まれる酸素の割合は一定であるため、飛行高度の増大、大気圧の減少に関わらず低酸素症の傾向は変化しない。", "普通の健康なパイロットであれば、12,000 フィート未満では低酸素症による夜間視力の低下以外の顕著な影響は表れないとされている。", "最も適切な酸素の使用方法としては、昼間においては15,000 フィートを超えたならばパイロットが補助酸素を使用することである。"], "a": 3, "e": "解説：AIM-J 962.\n(1) × ハイパーベンチレーション → ハイポキシャ\n(2) × 大気圧の減少に関わらず低酸素症の傾向は変化しない→大気圧の減少に対応して低酸素症の傾向は増大する\n(4) × 15,000→10,000"}, {"id": "R0501P4007", "term": "R0501", "q": "計器飛行証明を有していなければ行えない飛行で該当しないものはどれか。", "c": ["計器飛行", "110 km又は30分を超えて行う計器航法による飛行", "有視界気象状態における模擬計器飛行", "計器飛行方式による飛行"], "a": 3, "e": "解説：AIM-J 1007.\n(3) × 夜間飛行についての時間は規定されていない。"}, {"id": "R0501P4008", "term": "R0501", "q": "最低利用可能フライトレベルが150になる場合のQNHはどれか。", "c": ["29.45 inHg", "28.97 inHg", "28.82 inHg", "28.39 inHg"], "a": 2, "e": ""}, {"id": "R0501P4009", "term": "R0501", "q": "METARに使用される記号と意味の組み合わせで誤りはどれか。", "c": ["VCFG:\t飛行場周辺のもや", "SHRA:\tしゅう雨性の雨", "DRSA:\t低い風じん", "FZDZ:\t着氷性のある霧雨"], "a": 1, "e": "解説：AIM-J 811.\n(1) × もや→霧"}, {"id": "R0501P4010", "term": "R0501", "q": "管制用語の意味として正しいものはどれか。", "c": ["HOLD ON THE GROUND：グランドの周波数への変更は、指示があるまで待機してください。", "DESCEND AT PILOT'S\tDISCRETION：パイロットの判断で降下してください。", "CLEARED FOR APPROACH：着陸を許可します。", "EDCT AT [１３：００]\t：降下の指示は[１３：００]に出す予定です。"], "a": 2, "e": "解説：AIM-J 562. 降下クリアランスに\"AT PILOT'S DISCRETION\"の用語が付された場合は、降下を開始する時期がパイロットの判断に任される。そして降下を開始した後も一時的な水平飛行を含む降下率の調整を通脱なくて行うことができる。ただし一度通過した高度に再び上昇してはいけない。"}, {"id": "R0501P4011", "term": "R0501", "q": "飛行計画書の第８項「飛行方式および飛行の種類」のうち、飛行方式の記入要領で誤りはどれか。", "c": ["Y: IFRで出発し途中でVFRに変更する場合", "X: IFRで出発し途中でVFRに変更し再びIFRに変更する場合", "Z: VFRで出発し途中でIFRに変更する場合", "Z: VFRで出発し途中でIFRに変更し再びVFRに変更する場合"], "a": 2, "e": "解説：AIM-J 304. 第8項 飛行方式および飛行の種類\n飛行方式は次の4種類\nIFRで飛行する場合・・・I\nVFRで飛行する場合・・・V\nIFRで出発し途中で飛行方式を変更する場合・・Y\nVFRで出発し途中で飛行方式を変更する場合・・Z\n飛行の種類は問題の中に含まれていない。種類はS（定期便）、N（定期便以外の航空運送事業）、G（使用事業、訓練、訓練等）、M（Military）、Xその他"}, {"id": "R0501P4012", "term": "R0501", "q": "ILSについて誤りはどれか。", "c": ["地上施設は基本的にローカライザーおよびグライドスロープの２つの無指向性電波を発射する送信装置とDMEにより構成されている。", "ILS進入の運用にあたっては、視覚情報施設として進入灯、接地帯灯、滑走路灯、滑走路中心線灯等が設置されている。", "ILSの識別符号はモールス信号で、I（･ ･）で始まる３文字から成りローカライ
